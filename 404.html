<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
  // GitHub Pages SPA redirect trick
  // Saves the path to sessionStorage then redirects to index.html
  var path = window.location.pathname + window.location.search + window.location.hash;
  sessionStorage.setItem('spa-redirect', path);
  window.location.replace('/BAF3M/');
</script>
</head>
<body></body>
</html>
