<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAF3M - Grade 11 Financial Accounting Fundamentals</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-7C9MRF1MJH"></script>
<script>
  window.dataLayer=window.dataLayer||[];
  function gtag(){dataLayer.push(arguments);}
  gtag('js',new Date());
  gtag('config','G-7C9MRF1MJH');
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;transition:background .2s,color .2s;}

:root{
  --serif:'Lora',Georgia,serif;
  --sans:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono','Courier New',monospace;
  --r:10px;--r-sm:7px;
  --accent:#2f54a0;
  --accent-light:#e8eef8;
  --accent-mid:#5b7ec4;
  --green:#1a6b3a;--green-bg:#e8f5ee;
  --red:#b91c1c;--red-bg:#fef2f2;
  --amber:#92400e;--amber-bg:#fffbeb;
  --l1:#1a6b3a;--l2:#2f54a0;--l3:#6d28d9;--lpink:#9d174d;
  --ease:.18s ease;
}

/* ── LIGHT (default) ── */
:root{
  --bg:#eeeef0;
  --bg-page:#e8e8eb;
  --surface:#f7f7f9;
  --surface2:#ededef;
  --surface3:#e4e4e7;
  --surface4:#d8d8dc;
  --border:#d0d0d5;
  --border2:#c0c0c7;
  --border3:#a0a0aa;
  --text:#1a1a24;
  --text2:#4a4a5a;
  --text3:#8a8a9a;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --shadow-sm:0 1px 2px rgba(0,0,0,.06);
  --nav-bg:rgba(238,238,240,.94);
  --card-bg:#f7f7f9;
}

/* ── DARK ── */
html[data-theme="dark"]{
  --bg:#111115;
  --bg-page:#0e0e12;
  --surface:#18181e;
  --surface2:#1e1e26;
  --surface3:#25252f;
  --surface4:#2d2d38;
  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.13);
  --border3:rgba(255,255,255,.22);
  --text:#e8e8f0;
  --text2:#9898b0;
  --text3:#58587a;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 4px 20px rgba(0,0,0,.5);
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --nav-bg:rgba(17,17,21,.92);
  --card-bg:#18181e;
  --accent:#6b8dd4;
  --accent-light:rgba(107,141,212,.12);
  --green:#34d479;--green-bg:rgba(52,212,121,.1);
  --red:#f87171;--red-bg:rgba(248,113,113,.1);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,.1);
}

body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  line-height:1.5;
}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ══ NAV ══ */
.nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  height:64px;padding:0 32px;gap:16px;flex-shrink:0;
  background:var(--nav-bg);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
.nav-left{display:flex;align-items:center;gap:16px;min-width:0;flex:1;}
.wordmark{
  display:flex;align-items:center;gap:11px;
  cursor:pointer;flex-shrink:0;user-select:none;
}
.wordmark-icon{
  width:34px;height:34px;border-radius:8px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:15px;font-weight:700;color:#fff;
  flex-shrink:0;letter-spacing:-.01em;
}
.wordmark-text{
  font-family:var(--serif);font-size:18px;font-weight:600;
  color:var(--text);letter-spacing:-.02em;
}
.wordmark-text sup{
  font-family:var(--sans);font-size:9px;font-weight:500;
  color:var(--text3);letter-spacing:.02em;vertical-align:super;
}
.nav-sep{width:1px;height:16px;background:var(--border2);flex-shrink:0;}
.crumbs{display:flex;align-items:center;gap:5px;font-size:12.5px;min-width:0;overflow:hidden;}
.crumb{
  color:var(--text3);cursor:pointer;font-weight:400;
  white-space:nowrap;transition:color var(--ease);
}
.crumb:hover{color:var(--text2);}
.crumb-sep{color:var(--text3);opacity:.5;flex-shrink:0;font-size:11px;}
.crumb-cur{color:var(--text2);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.q-chips{display:flex;gap:6px;}
.q-chip{
  display:flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:5px;
  background:var(--surface2);border:1px solid var(--border);
  font-size:11.5px;font-weight:500;font-family:var(--mono);
  color:var(--text2);
}
.contact-link{
  padding:9px 20px;border-radius:8px;
  background:transparent;border:1px solid var(--border2);
  color:var(--text2);font-size:14px;font-weight:500;
  font-family:var(--sans);cursor:pointer;
  transition:all var(--ease);
}
.contact-link:hover{background:var(--surface2);color:var(--text);border-color:var(--border3);}
.theme-btn{
  width:38px;height:38px;border-radius:8px;
  border:1px solid var(--border2);background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:17px;color:var(--text2);flex-shrink:0;
  transition:all var(--ease);
}
.theme-btn:hover{background:var(--surface3);border-color:var(--border3);}

/* ══ PROGRESS RAIL ══ */
.prog-rail{height:2px;background:var(--border);flex-shrink:0;}
.prog-fill{height:100%;background:var(--accent);transition:width .5s cubic-bezier(.4,0,.2,1);}

/* ══ QUIZ BAR ══ */
.quiz-bar{
  display:none;align-items:center;gap:12px;
  padding:6px 28px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.quiz-bar.on{display:flex;}
.q-mode-tag{
  padding:2px 9px;border-radius:4px;
  font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  background:var(--surface3);color:var(--text3);
  border:1px solid var(--border);font-family:var(--mono);
}
.quiz-prog{flex:1;height:2px;background:var(--surface3);border-radius:99px;overflow:hidden;}
.quiz-prog-fill{height:100%;background:var(--accent);transition:width .4s cubic-bezier(.4,0,.2,1);}
.quiz-pct{font-size:11px;font-family:var(--mono);color:var(--text3);min-width:32px;text-align:right;}
.back-link{
  background:transparent;border:1px solid var(--border2);
  border-radius:var(--r-sm);color:var(--text2);
  font-size:12.5px;font-weight:500;font-family:var(--sans);
  cursor:pointer;transition:all var(--ease);white-space:nowrap;
  padding:4px 11px;
}
.back-link:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-light);}

/* ══ LAYOUT ══ */
.wrap{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px 100px;}
.inner{width:100%;max-width:720px;}

/* ══ HOME ══ */
.home-page{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:72px 24px 100px;
}
.hero{text-align:center;margin-bottom:52px;max-width:680px;width:100%;display:flex;flex-direction:column;align-items:center;}
.hero-label{
  font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--text3);margin-bottom:16px;font-family:var(--sans);
}
.hero h1{
  font-family:var(--serif);
  font-size:clamp(32px,5vw,52px);
  font-weight:600;letter-spacing:-.03em;line-height:1.1;
  margin-bottom:16px;color:var(--text);
  font-style:italic;
}
.hero h1 em{font-style:normal;color:var(--accent);}
.hero-sub{
  font-size:15px;color:var(--text2);line-height:1.75;
  font-weight:400;margin-bottom:6px;max-width:520px;text-align:center;
}
.hero-meta{display:flex;gap:20px;flex-wrap:wrap;}
.hero-m{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px;}
.hero-m b{color:var(--text2);font-weight:600;}
.hero-divider{width:1px;height:12px;background:var(--border2);}

/* ══ LANDING PAGE ══ */
.landing{
  min-height:calc(100vh - 64px);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:60px 24px 80px;
  position:relative;
}
.landing-content{
  display:flex;flex-direction:column;
  align-items:center;text-align:center;
  max-width:600px;width:100%;
}
.landing-label{
  font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--text3);margin-bottom:20px;font-family:var(--sans);
}
.landing-h1{
  font-family:var(--serif);
  font-size:clamp(40px,7vw,72px);
  font-weight:600;letter-spacing:-.04em;line-height:1.05;
  margin-bottom:22px;color:var(--text);
}
.landing-h1 em{font-style:normal;color:var(--accent);}
.landing-sub{
  font-size:16px;color:var(--text2);line-height:1.8;
  font-weight:400;margin-bottom:36px;max-width:480px;
}
.start-btn{
  display:inline-flex;align-items:center;justify-content:center;
  padding:16px 48px;
  border-radius:var(--r);
  border:none;
  background:var(--accent);
  color:#fff;
  font-family:var(--serif);font-size:18px;font-weight:600;
  letter-spacing:-.01em;
  cursor:pointer;transition:all var(--ease);
  margin-bottom:22px;
  box-shadow:0 2px 12px rgba(47,84,160,.25);
}
.start-btn:hover{
  background:var(--accent-hover,#264890);
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(47,84,160,.32);
}
.start-btn:active{transform:translateY(0);}
.landing-links{
  display:flex;align-items:center;gap:10px;
  margin-bottom:0;
}
.landing-link{
  background:none;border:none;
  font-size:13px;font-weight:500;color:var(--text3);
  font-family:var(--sans);cursor:pointer;
  transition:color var(--ease);padding:0;
  text-decoration:underline;text-underline-offset:3px;
  text-decoration-color:transparent;
}
.landing-link:hover{color:var(--accent);text-decoration-color:var(--accent);}
.landing-link-sep{color:var(--text3);font-size:12px;opacity:.5;}
.landing-boxes{
  display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
  width:100%;max-width:400px;
}
.landing-box{
  flex:1;min-width:140px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 20px;
  border-radius:var(--r-sm);
  border:1px solid var(--border2);
  background:var(--surface);
  color:var(--text2);
  font-family:var(--sans);font-size:13.5px;font-weight:500;
  cursor:pointer;transition:all var(--ease);
  letter-spacing:-.01em;
}
.landing-box:hover{
  background:var(--surface2);
  border-color:var(--accent);
  color:var(--accent);
}
.landing-box-icon{font-size:14px;}
.landing-box-label{}
.landing-scroll-hint{
  position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  font-size:12px;color:var(--text3);cursor:pointer;
  transition:color var(--ease);letter-spacing:.04em;
  font-family:var(--sans);
}
.landing-scroll-hint:hover{color:var(--accent);}

/* ══ CHAPTER LIST HEADER ══ */
.chapter-list-header{margin-bottom:20px;}
.chapter-list-title{
  font-family:var(--serif);font-size:22px;font-weight:600;
  letter-spacing:-.02em;color:var(--text);margin-bottom:4px;
}
.chapter-list-sub{font-size:13px;color:var(--text3);}

/* ══ CHAPTER LIST ══ */
.ch-list{display:flex;flex-direction:column;width:100%;max-width:680px;}
.ch-item{
  display:flex;align-items:center;gap:16px;
  padding:16px 20px;
  background:var(--card-bg);
  border:1px solid var(--border);
  border-top:none;
  cursor:pointer;transition:background var(--ease);
  position:relative;
}
.ch-item:first-child{border-top:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;}
.ch-item:last-child{border-radius:0 0 var(--r) var(--r);}
.ch-item:only-child{border-radius:var(--r);}
.ch-item:hover{background:var(--surface2);}
.ch-num{
  width:36px;height:36px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:11px;font-weight:500;
}
.ch-content{flex:1;min-width:0;}
.ch-name{
  font-size:14px;font-weight:500;letter-spacing:-.01em;
  margin-bottom:1px;color:var(--text);
}
.ch-meta{font-size:12px;color:var(--text3);font-weight:400;}
.ch-trail{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ch-badge{
  font-size:10.5px;font-weight:500;padding:2px 8px;
  border-radius:4px;font-family:var(--mono);
  background:var(--surface3);color:var(--text3);
  border:1px solid var(--border);
}
.ch-arrow{color:var(--text3);font-size:14px;transition:all var(--ease);}
.ch-item:hover .ch-arrow{color:var(--accent);transform:translateX(2px);}

/* ══ MODE SELECT ══ */
.mode-page{display:flex;flex-direction:column;width:100%;}
.mode-header{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.mode-eyebrow{
  font-family:var(--sans);font-size:11px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);margin-bottom:6px;
}
.mode-title{
  font-family:var(--serif);font-size:22px;font-weight:600;
  letter-spacing:-.02em;color:var(--text);line-height:1.2;
}
.sec-head{
  font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);margin-bottom:10px;padding-bottom:6px;
  border-bottom:1px solid var(--border);
}
.lvl-row{display:flex;gap:8px;flex-wrap:wrap;width:100%;margin-bottom:28px;}
.lvl-tile{
  flex:1;min-width:130px;
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:var(--r);padding:16px 14px 14px;
  cursor:pointer;transition:all var(--ease);text-align:left;
}
.lvl-tile:hover{background:var(--surface2);border-color:var(--border2);}
.tile-icon{font-size:18px;margin-bottom:10px;display:block;}
.tile-name{
  font-family:var(--serif);font-size:14px;font-weight:600;
  letter-spacing:-.01em;margin-bottom:2px;color:var(--text);
}
.tile-sub{
  font-size:10px;font-weight:600;letter-spacing:.07em;
  text-transform:uppercase;color:var(--text3);margin-bottom:6px;
}
.tile-desc{font-size:12px;color:var(--text3);line-height:1.5;}
.tile-count{
  display:inline-block;margin-top:10px;
  font-size:10px;font-weight:500;padding:2px 7px;
  border-radius:3px;background:var(--surface3);
  color:var(--text3);font-family:var(--mono);
  border:1px solid var(--border);
}
.unit-stack{display:flex;flex-direction:column;}
.unit-tile{
  display:flex;align-items:center;gap:12px;
  background:var(--card-bg);border:1px solid var(--border);
  border-top:none;padding:11px 16px;
  cursor:pointer;transition:background var(--ease);
}
.unit-tile:first-child{border-top:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;}
.unit-tile:last-child{border-radius:0 0 var(--r) var(--r);}
.unit-tile:hover{background:var(--surface2);}
.unit-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--accent-mid,var(--accent));flex-shrink:0;
}
.unit-body{flex:1;}
.unit-label{font-size:13px;font-weight:500;color:var(--text);letter-spacing:-.01em;}
.unit-cnt{font-size:11px;color:var(--text3);font-family:var(--mono);}
.unit-go{font-size:13px;color:var(--text3);transition:all var(--ease);}
.unit-tile:hover .unit-go{color:var(--accent);transform:translateX(2px);}

/* ══ TYPE TAG ══ */
.ttag{
  display:inline-block;
  font-family:var(--mono);font-size:9.5px;font-weight:500;
  letter-spacing:.08em;text-transform:uppercase;
  padding:2px 8px;border-radius:3px;margin-bottom:14px;
  background:var(--surface3);color:var(--text3);
  border:1px solid var(--border);
}

/* ══ QUESTION CARD ══ */
.qcard{
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:var(--r);padding:26px 24px 22px;
  transition:border-color .2s,box-shadow .2s;
  box-shadow:var(--shadow-sm);
}
.qcard.c-ok{border-color:var(--green);border-left:3px solid var(--green);}
.qcard.c-no{border-color:var(--red);border-left:3px solid var(--red);}
.qcard.c-close{border-color:var(--amber);border-left:3px solid var(--amber);}
.qcard.c-skip{border-color:var(--border2);}
.fb-close{background:var(--amber-bg);border:1px solid rgba(146,64,14,.2);color:var(--amber);}
[data-theme="dark"] .fb-close{color:#fcd34d;}
.q-num{
  font-family:var(--mono);font-size:10px;font-weight:500;
  letter-spacing:.06em;text-transform:uppercase;
  color:var(--text3);margin-bottom:10px;
}
.q-body{
  font-family:var(--sans);font-size:15.5px;font-weight:500;
  line-height:1.65;margin-bottom:20px;color:var(--text);
  letter-spacing:-.01em;
}

/* ══ OPTIONS ══ */
.opts{display:flex;flex-direction:column;}
.opt-btn{
  display:flex;align-items:flex-start;gap:12px;
  padding:11px 15px;
  border:1px solid var(--border);
  border-top:none;
  cursor:pointer;font-size:13.5px;line-height:1.5;
  transition:background var(--ease);
  background:var(--card-bg);
  color:var(--text2);text-align:left;width:100%;
  font-family:var(--sans);
}
.opt-btn:first-child{border-top:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;}
.opt-btn:last-child{border-radius:0 0 var(--r) var(--r);}
.opt-btn:hover:not([disabled]){background:var(--surface2);color:var(--text);}
.opt-key{
  width:22px;height:22px;min-width:22px;border-radius:4px;
  border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:var(--text3);
  font-family:var(--mono);flex-shrink:0;margin-top:1px;
  transition:all var(--ease);
}
.opt-btn.ans-ok{
  background:var(--green-bg)!important;
  border-color:var(--green)!important;
  color:var(--text)!important;
}
.opt-btn.ans-ok .opt-key{background:var(--green);border-color:var(--green);color:#fff;font-size:11px;}
.opt-btn.ans-no{
  background:var(--red-bg)!important;
  border-color:var(--red)!important;
  color:var(--text)!important;
}
.opt-btn.ans-no .opt-key{background:var(--red);border-color:var(--red);color:#fff;font-size:11px;}
.opt-btn[disabled]{cursor:default;}

/* ══ FEEDBACK ══ */
.fb{
  margin-top:14px;padding:13px 16px;border-radius:var(--r-sm);
  font-size:13px;line-height:1.75;display:none;
  font-family:var(--sans);font-weight:400;
}
.fb.show{display:block;}
.fb-ok{background:var(--green-bg);border:1px solid rgba(26,107,58,.25);color:var(--green);}
.fb-no{background:var(--red-bg);border:1px solid rgba(185,28,28,.22);color:var(--red);}
.fb-skip{background:var(--amber-bg);border:1px solid rgba(146,64,14,.18);color:var(--amber);}
.fb strong{font-weight:600;color:inherit;}

/* ══ SHORT ANSWER ══ */
.sa-input{
  width:100%;background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--r-sm);padding:11px 14px;font-size:14px;color:var(--text);
  font-family:var(--sans);resize:vertical;min-height:88px;
  outline:none;transition:border-color var(--ease),box-shadow var(--ease);
  line-height:1.65;
}
.sa-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-light);
}
.sa-input[disabled]{opacity:.5;cursor:default;}

/* ══ CLICK-TO-MATCH ══ */
.mc-instr{font-size:13px;color:var(--text3);margin-bottom:14px;}
.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.mc-col-head{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;font-family:var(--mono);}
.mc-term,.mc-def{
  padding:10px 12px;border-radius:var(--r-sm);
  border:1px solid var(--border2);
  background:var(--surface2);
  cursor:pointer;transition:all var(--ease);
  margin-bottom:6px;font-size:13px;color:var(--text2);
  display:flex;align-items:center;gap:8px;
  user-select:none;
}
.mc-term:hover,.mc-def:hover{border-color:var(--accent);color:var(--text);}
.mc-term.mc-selected,.mc-def.mc-selected{
  border-color:var(--accent);
  background:var(--accent-light);
  color:var(--accent);
}
.mc-term.mc-connected{border-color:var(--border2);color:var(--text2);background:var(--surface3);}
.mc-def.mc-connected{border-color:var(--border2);color:var(--text2);background:var(--surface3);}
.mc-term.mc-correct{border-color:var(--green)!important;background:var(--green-bg)!important;color:var(--text)!important;cursor:default;}
.mc-term.mc-wrong{border-color:var(--red)!important;background:var(--red-bg)!important;color:var(--text)!important;cursor:default;}
.mc-def.mc-def-correct{border-color:var(--green)!important;background:var(--green-bg)!important;color:var(--text)!important;cursor:default;}
.mc-def.mc-def-wrong{border-color:var(--red)!important;background:var(--red-bg)!important;cursor:default;}
.mc-badge{
  width:20px;height:20px;min-width:20px;border-radius:4px;
  background:var(--surface3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;font-family:var(--mono);
  color:var(--text3);flex-shrink:0;
}
.mc-text{flex:1;line-height:1.45;}
.mc-arrow{
  font-family:var(--mono);font-size:11px;font-weight:700;
  color:var(--accent);min-width:16px;text-align:right;flex-shrink:0;
}
.mc-dnum{
  font-family:var(--mono);font-size:11px;font-weight:700;
  color:var(--accent);min-width:16px;flex-shrink:0;
}
@media(max-width:640px){.mc-grid{grid-template-columns:1fr;}}

/* ══ MATCHING (old input style - kept for fallback) ══ */

/* ══ ACTION ROW ══ */
.act-row{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;}
.btn-next{
  flex:1;padding:10px 16px;border-radius:var(--r-sm);border:none;
  background:var(--accent);color:#fff;
  font-size:13.5px;font-weight:600;font-family:var(--sans);
  cursor:pointer;display:none;letter-spacing:-.01em;
  transition:opacity var(--ease),transform var(--ease);
}
.btn-next:hover{opacity:.88;transform:translateY(-1px);}
.btn-skip{
  padding:10px 16px;border-radius:var(--r-sm);
  border:1px solid var(--border2);background:transparent;
  color:var(--text3);font-size:13.5px;font-family:var(--sans);
  cursor:pointer;transition:all var(--ease);white-space:nowrap;
}
.btn-skip:hover{background:var(--surface2);color:var(--text2);}
.btn-reveal{
  flex:1;padding:10px 16px;border-radius:var(--r-sm);
  border:1px solid var(--border2);
  background:var(--surface2);color:var(--text2);
  font-size:13.5px;font-weight:500;font-family:var(--sans);
  cursor:pointer;transition:all var(--ease);
}
.btn-reveal:hover:not([disabled]){border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.btn-reveal[disabled]{opacity:.4;cursor:not-allowed;}

/* ══ ANIMATION ══ */
@keyframes up{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.pop{animation:up .3s cubic-bezier(.2,0,.4,1) both;}
.fade{animation:fadeIn .25s ease both;}

/* ══ DONE SCREEN ══ */
.done{text-align:center;padding:20px 0 8px;}
.done-title{
  font-family:var(--serif);font-size:26px;font-weight:600;
  letter-spacing:-.03em;margin-bottom:6px;color:var(--text);
}
.done-sub{font-size:14px;color:var(--text3);margin-bottom:28px;line-height:1.7;max-width:340px;margin-left:auto;margin-right:auto;}
.done-grid{display:flex;gap:8px;justify-content:center;margin-bottom:28px;flex-wrap:wrap;}
.done-stat{
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:var(--r);padding:14px 20px;min-width:84px;text-align:center;
}
.done-n{font-family:var(--mono);font-size:26px;font-weight:500;letter-spacing:-.02em;}
.done-l{font-size:10px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.07em;font-weight:600;}
.done-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.btn-outline{
  padding:8px 16px;border-radius:var(--r-sm);
  border:1px solid var(--border2);background:transparent;
  color:var(--text2);font-size:13px;font-weight:500;font-family:var(--sans);
  cursor:pointer;transition:all var(--ease);
}
.btn-outline:hover{background:var(--surface2);border-color:var(--border3);color:var(--text);}
.btn-fill{
  padding:8px 16px;border-radius:var(--r-sm);border:none;
  background:var(--accent);color:#fff;
  font-size:13px;font-weight:600;font-family:var(--sans);
  cursor:pointer;transition:opacity var(--ease),transform var(--ease);
}
.btn-fill:hover{opacity:.88;transform:translateY(-1px);}
.skip-log{margin-top:22px;text-align:left;}
.skip-log-head{
  font-size:10px;font-weight:600;color:var(--amber);
  margin-bottom:8px;letter-spacing:.09em;text-transform:uppercase;
}
.skip-row{
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:8px 12px;margin-bottom:5px;
  font-size:12.5px;color:var(--text3);
}
.skip-row strong{
  color:var(--text2);display:block;margin-bottom:2px;
  font-size:10px;font-family:var(--mono);font-weight:600;
}

/* ══ CONTACT ══ */
.contact-pg{padding:8px 0;}
.contact-head{
  font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);margin-bottom:8px;
}
.contact-title{
  font-family:var(--serif);font-size:28px;font-weight:600;
  letter-spacing:-.03em;margin-bottom:8px;color:var(--text);
}
.contact-bio{font-size:14px;color:var(--text3);line-height:1.75;margin-bottom:28px;max-width:380px;}
.contact-list{display:flex;flex-direction:column;}
.c-card{
  display:flex;align-items:center;gap:16px;
  padding:14px 18px;background:var(--card-bg);
  border:1px solid var(--border);border-top:none;
  text-decoration:none;transition:background var(--ease);
}
.c-card:first-child{border-top:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;}
.c-card:last-child{border-radius:0 0 var(--r) var(--r);}
.c-card:hover{background:var(--surface2);}
.c-icon{
  width:38px;height:38px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;
  background:var(--surface3);border:1px solid var(--border);
}
.c-body{flex:1;}
.c-label{
  font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;
  color:var(--text3);margin-bottom:3px;
}
.c-val{font-size:13.5px;font-weight:500;color:var(--text);}
.c-go{font-size:14px;color:var(--text3);transition:all var(--ease);}
.c-card:hover .c-go{color:var(--accent);transform:translateX(2px);}

/* ══ HERO ACTIONS ══ */
.hero-actions{
  display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:4px;
}
.hero-actions .tutorial-btn{margin-top:0;}

/* ══ COURSE PAGE ══ */
.course-pg{padding:4px 0;}
.course-header{margin-bottom:28px;padding-bottom:22px;border-bottom:1px solid var(--border);}
.course-eyebrow{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.course-title{font-family:var(--serif);font-size:26px;font-weight:600;letter-spacing:-.02em;color:var(--text);margin-bottom:14px;}
.course-code-row{display:flex;flex-wrap:wrap;gap:7px;}
.course-tag{
  font-size:11px;font-weight:600;padding:3px 10px;border-radius:4px;
  background:var(--accent-light);color:var(--accent);
  border:1px solid var(--border2);font-family:var(--mono);letter-spacing:.02em;
}
.course-body{display:flex;flex-direction:column;}
.course-section{padding:18px 0;border-bottom:1px solid var(--border);}
.course-section:last-child{border-bottom:none;}
.course-section-label{
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);margin-bottom:8px;
}
.course-section-text{
  font-size:14px;color:var(--text2);line-height:1.78;font-weight:400;
}
.course-fees{display:flex;flex-direction:column;gap:6px;}
.course-fee-row{
  display:flex;justify-content:space-between;align-items:center;
  font-size:14px;color:var(--text2);
  padding:9px 14px;background:var(--surface2);
  border:1px solid var(--border);border-radius:var(--r-sm);
}
.course-fee-amt{font-family:var(--mono);font-weight:600;color:var(--text);font-size:14px;}
.course-link{
  color:var(--accent);text-decoration:none;font-size:14px;font-weight:500;
  border-bottom:1px solid transparent;transition:border-color var(--ease);
}
.course-link:hover{border-bottom-color:var(--accent);}

/* ══ BACK NAV ══ */
.back-nav{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:22px;
  padding:9px 18px;
  border-radius:var(--r-sm);
  border:1px solid var(--border2);
  background:var(--surface2);
  color:var(--text2);
  font-size:13.5px;font-weight:500;
  font-family:var(--sans);cursor:pointer;
  transition:all var(--ease);
}
.back-nav:hover{
  background:var(--surface3);
  border-color:var(--accent);
  color:var(--accent);
}

/* ══ TUTORIAL BUTTON ══ */
.tutorial-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:22px;
  padding:11px 24px;
  border-radius:var(--r-sm);
  border:1px solid var(--border2);
  background:var(--surface2);
  color:var(--text2);font-size:13.5px;font-weight:500;
  font-family:var(--sans);cursor:pointer;
  transition:all var(--ease);letter-spacing:-.01em;
  text-align:center;width:100%;max-width:220px;
}
.tutorial-btn:hover{
  background:var(--surface3);border-color:var(--accent);color:var(--accent);
}
.tutorial-btn-icon{
  width:18px;height:18px;border-radius:50%;
  border:1px solid currentColor;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;flex-shrink:0;
  opacity:.7;
}

/* ══ TUTORIAL PAGE ══ */
.tutorial-pg{padding:4px 0;}
.tut-header{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.tut-eyebrow{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.tut-title{font-family:var(--serif);font-size:24px;font-weight:600;letter-spacing:-.02em;color:var(--text);}
.tut-steps{display:flex;flex-direction:column;gap:0;}
.tut-step{
  display:flex;align-items:flex-start;gap:16px;
  padding:20px 0;border-bottom:1px solid var(--border);
}
.tut-step:last-child{border-bottom:none;}
.tut-num{
  width:28px;height:28px;min-width:28px;border-radius:50%;
  border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:12px;font-weight:600;
  color:var(--accent);flex-shrink:0;margin-top:1px;
  background:var(--accent-light);
}
.tut-body{}
.tut-step-title{
  font-family:var(--serif);font-size:15px;font-weight:600;
  color:var(--text);margin-bottom:5px;letter-spacing:-.01em;
}
.tut-step-desc{font-size:13.5px;color:var(--text3);line-height:1.7;font-weight:400;}
.tut-modes{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.tut-mode{
  padding:10px 14px;border-radius:var(--r-sm);
  background:var(--surface2);border:1px solid var(--border);
}
.tut-mode-name{font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:2px;}
.tut-mode-desc{font-size:12px;color:var(--text3);line-height:1.6;}

/* ══ CHAPTER LIST EXTRA SECTION ══ */
.cl-section-head{
  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);margin:24px 0 10px;
  padding-bottom:6px;border-bottom:1px solid var(--border);
}
.cl-extra-row{display:flex;flex-direction:column;gap:6px;}
.cl-extra-card{
  display:flex;align-items:center;gap:16px;
  padding:16px 20px;
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:var(--r);cursor:pointer;
  transition:var(--trans);
}
.cl-extra-card:hover{background:var(--surface2);border-color:rgba(20,184,166,.4);}
.cl-extra-icon{font-size:22px;flex-shrink:0;}
.cl-extra-body{flex:1;}
.cl-extra-title{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-.01em;margin-bottom:3px;}
.cl-extra-sub{font-size:12px;color:var(--text3);}
.cl-extra-arrow{font-size:16px;color:var(--text3);transition:var(--trans);}
.cl-extra-card:hover .cl-extra-arrow{color:#14b8a6;transform:translateX(3px);}

/* ══ EXAM PREP ══ */
.exam-regen{text-align:center;margin-bottom:12px;}
.exam-regen-btn{background:transparent;border:1px solid var(--border2);border-radius:6px;padding:6px 16px;font-size:12.5px;font-weight:500;font-family:var(--sans);color:var(--text3);cursor:pointer;transition:all var(--ease);}
.exam-regen-btn:hover{border-color:var(--accent);color:var(--accent);}
.exam-wrap{width:100%;max-width:1100px;margin:0 auto;padding:28px 20px 100px;}
.exam-section-wide .ws-outer,.exam-section-wide .ws-scroll,.exam-section-wide .ws-table{min-width:100%!important;}
.exam-header{background:var(--surface);border:2px solid var(--text);border-radius:var(--r);padding:20px 24px;margin-bottom:24px;text-align:center;}
.exam-school{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;}
.exam-title{font-family:var(--serif);font-size:24px;font-weight:700;color:var(--text);margin-bottom:14px;}
.exam-meta-row{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;font-size:14px;color:var(--text2);}
.exam-name-input{border:none;border-bottom:1px solid var(--border3);background:transparent;font-family:var(--sans);font-size:14px;color:var(--text);outline:none;width:160px;padding:2px 4px;}
.exam-section{margin-bottom:28px;border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;}
.exam-section-wide{margin-bottom:28px;border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;}
.exam-section-title{font-family:var(--serif);font-size:15px;font-weight:700;padding:11px 18px;background:var(--surface2);border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;}
.exam-marks{font-size:11px;font-weight:600;font-family:var(--mono);color:var(--text3);background:var(--surface3);padding:3px 9px;border-radius:4px;}
.exam-instructions{font-size:13px;color:var(--text2);padding:10px 18px 6px;line-height:1.7;font-style:italic;border-bottom:1px solid var(--border);}
.exam-scenario{font-size:13px;color:var(--text2);padding:10px 18px 12px;line-height:1.85;background:rgba(92,110,248,.04);border-bottom:1px solid var(--border);}
.exam-check-btn{margin:14px 18px 4px;padding:9px 22px;border-radius:var(--r-sm);border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:opacity var(--ease);display:block;}
.exam-check-btn:hover{opacity:.88;}
.exam-feedback{display:none;margin:0 18px 16px;padding:12px 16px;border-radius:var(--r-sm);background:var(--surface2);border:1px solid var(--border);font-size:13px;line-height:2;}
.exam-feedback.show{display:block;}
.exam-result{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--text);}
/* Word bank */
.exam-wordbank{padding:8px 18px 4px;}
.exam-wordbank-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.exam-wordbank-chips{display:flex;flex-wrap:wrap;gap:7px;}
.wb-chip{padding:4px 12px;border-radius:4px;background:var(--surface3);border:1px solid var(--border2);font-size:13px;font-weight:500;color:var(--text2);}
.exam-fitb-list{padding:10px 18px 4px;}
.exam-fitb-row{display:flex;align-items:baseline;gap:8px;margin-bottom:12px;font-size:14px;color:var(--text);}
.exam-fitb-num{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text3);min-width:20px;}
.exam-fitb-q{line-height:1.8;flex:1;}
.exam-blank{border:none;border-bottom:2px solid var(--border3);background:transparent;font-family:var(--sans);font-size:14px;color:var(--accent);outline:none;width:160px;padding:2px 4px;margin:0 4px;}
.exam-blank:focus{border-bottom-color:var(--accent);}
/* Journal */
.journal-wrap{overflow-x:auto;padding:0 18px 4px;}
.journal-table{width:100%;border-collapse:collapse;font-size:13px;}
.journal-table th{background:var(--surface2);padding:8px 10px;border:1px solid var(--border2);font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);text-align:center;}
.journal-table td{border:1px solid var(--border2);padding:1px 4px;vertical-align:middle;}
.jt-date{width:80px;}
.jt-desc{min-width:240px;}
.jt-pr{width:50px;}
.jt-amt{width:110px;}
.jt-input{width:100%;background:transparent;border:none;outline:none;font-family:var(--sans);font-size:13px;color:var(--text);padding:6px 6px;}
.jt-num-input{text-align:right;font-family:var(--mono);}
.jt-indent{padding-left:24px!important;}
.jt-pr-input{text-align:center;}
/* Worksheet */
.ws-outer{padding:0 18px 8px;}
.ws-title{text-align:center;font-size:13px;line-height:1.9;padding:10px 0 8px;color:var(--text);}
.ws-scroll{overflow-x:auto;}
.ws-table{border-collapse:collapse;font-size:13px;width:100%;}
.ws-table th,.ws-table td{border:1px solid var(--border3);}
.ws-header-top th,.ws-header-sub th{background:var(--surface2);padding:7px 8px;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text2);text-align:center;border-color:var(--text);}
.ws-sec-head{border-bottom:2px solid var(--text)!important;border-right:2px solid var(--text)!important;border-left:2px solid var(--text)!important;}
.ws-row-num-h{width:26px;min-width:26px;background:var(--surface3)!important;border-color:var(--border3)!important;}
.ws-rn{width:26px;text-align:center;font-size:10px;font-family:var(--mono);color:var(--text3);background:var(--surface2);padding:2px;}
.ws-acct-head{min-width:200px;text-align:left!important;padding-left:10px!important;}
.ws-acct-no-h{width:52px;text-align:center!important;border-right:2px solid var(--text)!important;}
.ws-acct-cell{padding:0 10px!important;font-size:13px;color:var(--text);border-right:2px solid var(--text)!important;min-width:200px;white-space:nowrap;height:32px;}
.ws-acct-given{color:var(--text2);}
.ws-acct-input{text-align:left!important;font-size:13px;height:30px;padding:4px 8px!important;}
.ws-acct-no{width:52px;text-align:center;padding:0!important;border-right:2px solid var(--text)!important;}
.ws-given-val{font-size:12px;color:var(--text3);text-align:center;padding:4px 2px!important;}
.ws-no-input{text-align:center!important;font-size:12px;width:46px;}
.ws-num-cell{text-align:right;padding:0!important;min-width:100px;border-right:1px solid var(--border3);}
.ws-num-cell:nth-child(6),.ws-num-cell:nth-child(8),.ws-num-cell:nth-child(10){border-right:2px solid var(--text)!important;}
.ws-input{width:100%;background:transparent;border:none;outline:none;text-align:right;font-family:var(--mono);font-size:13px;color:var(--text);padding:6px 8px;height:32px;}
.ws-input:focus{background:rgba(92,110,248,.06);outline:none;box-shadow:none;}
.ws-given{display:block;text-align:right;padding:6px 8px;font-family:var(--mono);font-size:13px;color:var(--text2);}
.ws-total-row{background:var(--surface2);}
.ws-total-input{font-weight:700;}
.ws-col-head{min-width:100px;}
.ws-double-border{border-top:3px double var(--text)!important;border-bottom:3px double var(--text)!important;}
.ws-greyed{background:var(--surface3)!important;pointer-events:none;}
.ws-divider-row{background:var(--surface3);}
.ws-divider-label{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);padding:4px 10px!important;border-top:2px solid var(--text)!important;text-align:left!important;}
.ws-final-row{background:var(--surface3);}
/* Accounting Paper (Balance Sheet) */
.ap-outer{padding:0 18px 8px;overflow-x:auto;}
.ap-heading{text-align:center;font-size:13.5px;line-height:1.9;padding:10px 0 8px;color:var(--text);}
.ap-table{border-collapse:collapse;width:100%;max-width:700px;margin:0 auto;font-size:13.5px;}
.ap-col-label{width:55%;}
.ap-col-num{width:15%;}
.ap-table td{border:1px solid var(--border3);padding:0;height:30px;}
.ap-label{padding:3px 12px;color:var(--text);font-size:13.5px;border-right:2px solid var(--text)!important;}
.ap-num{text-align:right;border-right:1px solid var(--border3);}
.ap-num:last-child{border-right:2px solid var(--text)!important;}
.ap-input{width:90%;background:transparent;border:none;outline:none;text-align:right;font-family:var(--mono);font-size:13px;color:var(--text);padding:4px 6px;}
.ap-input:focus{background:rgba(92,110,248,.06);outline:none;box-shadow:none;}
.ap-section-row td{background:var(--surface2);font-weight:700;padding:6px 12px;border-top:2px solid var(--text)!important;border-bottom:1px solid var(--border3)!important;}
.ap-subsection-row td{padding:5px 12px;font-style:italic;color:var(--text2);background:rgba(0,0,0,.02);border-bottom:1px solid var(--border2)!important;}
.ap-subtotal-row td{border-top:1px solid var(--text)!important;}
.ap-total-row td{border-top:2px solid var(--text)!important;border-bottom:3px double var(--text)!important;font-weight:700;background:var(--surface2);}
.ap-blank-row{height:14px!important;}
/* Accounting Cycle */
.cycle-wrap{padding:16px 18px;display:flex;flex-direction:column;align-items:center;gap:0;}
.cycle-item{display:flex;flex-direction:column;align-items:center;width:100%;max-width:500px;}
.cycle-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:var(--mono);margin-bottom:4px;flex-shrink:0;}
.cycle-box{width:100%;padding:8px 16px;border:1px solid var(--border2);border-radius:6px;background:var(--surface);font-size:13.5px;color:var(--text);min-height:36px;display:flex;align-items:center;text-align:center;justify-content:center;}
.cycle-given{background:var(--surface2);border-color:var(--border3);}
.cycle-blank{background:var(--surface);border-color:var(--accent);border-style:dashed;}
.cycle-input{width:100%;background:transparent;border:none;outline:none;text-align:center;font-family:var(--sans);font-size:13.5px;color:var(--accent);padding:2px;}
.cycle-arrow{font-size:18px;color:var(--text3);margin:4px 0;}


/* ══ PRINCIPLES GRID ══ */
.principles-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:10px;margin-top:4px;
}
.principle-card{
  padding:16px 18px;border-radius:var(--r);
  border:1px solid var(--pc,var(--border));
  background:color-mix(in srgb,var(--pc,var(--accent)) 6%,var(--surface));
  cursor:pointer;transition:all var(--ease);
}
.principle-card:hover{
  transform:translateY(-2px);
  box-shadow:0 4px 16px color-mix(in srgb,var(--pc,var(--accent)) 20%,transparent);
  border-color:var(--pc,var(--accent));
}
.pc-name{font-size:13.5px;font-weight:700;color:var(--pc,var(--accent));margin-bottom:5px;letter-spacing:-.01em;}
.pc-short{font-size:12px;color:var(--text3);line-height:1.5;}

/* ══ PRINCIPLE DETAIL ══ */
.pd-header{
  padding:20px 22px;border-radius:var(--r);
  border:1px solid;margin-bottom:20px;
}
.pd-name{font-family:var(--serif);font-size:20px;font-weight:700;letter-spacing:-.02em;margin-bottom:10px;}
.pd-desc{font-size:14.5px;color:var(--text2);line-height:1.8;}
.pd-section-label{
  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);margin-bottom:12px;padding-bottom:6px;
  border-bottom:1px solid var(--border);
}
.pd-q-list{display:flex;flex-direction:column;gap:14px;}
.pd-q-item{display:flex;gap:12px;align-items:flex-start;}
.pd-q-num{
  min-width:26px;height:26px;border-radius:50%;
  background:var(--surface3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:11px;font-weight:700;
  color:var(--text3);flex-shrink:0;margin-top:2px;
}
.pd-q-body{flex:1;}
.pd-q-text{font-size:14px;font-weight:500;color:var(--text);margin-bottom:8px;line-height:1.6;}
.pd-opts{margin:0 0 6px 16px;padding:0;display:flex;flex-direction:column;gap:4px;}
.pd-opts li{font-size:13px;color:var(--text3);line-height:1.5;list-style:upper-alpha;}
.pd-correct{color:var(--green)!important;font-weight:600;}
.pd-exp{font-size:12.5px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 12px;line-height:1.65;margin-top:4px;}

/* ══ FILL IN THE BLANK ══ */
.ttag-fitb{background:rgba(20,184,166,.1);color:#14b8a6;}
.lvl-tile.t-fitb:hover{border-color:rgba(20,184,166,.4);box-shadow:0 8px 32px rgba(20,184,166,.1);}
.fitb-q{white-space:pre-wrap;}
.fitb-wrap{display:flex;gap:8px;margin-top:4px;}
.fitb-input{
  flex:1;background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--r-sm);padding:11px 15px;
  font-size:15px;color:var(--text);font-family:var(--sans);
  outline:none;transition:all var(--ease);
}
.fitb-input:focus{border-color:#14b8a6;box-shadow:0 0 0 3px rgba(20,184,166,.12);}
.fitb-input[disabled]{opacity:.55;cursor:default;}
.fitb-check-btn{
  padding:11px 22px;border-radius:var(--r-sm);border:none;
  background:#14b8a6;color:#fff;
  font-size:14px;font-weight:600;font-family:var(--sans);
  cursor:pointer;transition:opacity var(--ease);white-space:nowrap;
}
.fitb-check-btn:hover{opacity:.88;}

/* ══ PRACTICE TEST ══ */
.pt-header{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.pt-eyebrow{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.pt-title{font-family:var(--serif);font-size:26px;font-weight:600;letter-spacing:-.02em;color:var(--text);margin-bottom:8px;}
.pt-sub{font-size:14px;color:var(--text3);line-height:1.7;}
.pt-config{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px 22px 18px;}
.pt-section-label{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
.pt-ch-grid{display:flex;flex-direction:column;gap:6px;}
.pt-ch-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:var(--r-sm);
  border:1px solid var(--border);background:var(--surface2);
  cursor:pointer;transition:all var(--ease);
}
.pt-ch-row:hover{border-color:var(--border2);background:var(--surface3);}
.pt-ch-check{accent-color:var(--accent);width:15px;height:15px;cursor:pointer;flex-shrink:0;}
.pt-ch-name{font-size:13px;font-weight:500;color:var(--text2);}
.pt-btn-row{display:flex;gap:7px;flex-wrap:wrap;}
.pt-toggle{
  padding:7px 16px;border-radius:var(--r-sm);
  border:1px solid var(--border2);background:var(--surface2);
  color:var(--text3);font-size:13px;font-weight:500;
  font-family:var(--sans);cursor:pointer;transition:all var(--ease);
}
.pt-toggle:hover{border-color:var(--border3);color:var(--text2);}
.pt-toggle.active{
  background:var(--accent-light);border-color:var(--accent);
  color:var(--accent);font-weight:600;
}
.pt-error{
  font-size:13px;color:var(--red);margin-top:10px;
  padding:10px 14px;background:var(--red-bg);
  border:1px solid var(--red);border-radius:var(--r-sm);
}

/* ══ SAVE TOGGLE ══ */
.save-toggle{
  display:flex;align-items:center;gap:6px;
  cursor:pointer;user-select:none;flex-shrink:0;
}
.save-toggle input[type="checkbox"]{
  width:14px;height:14px;cursor:pointer;accent-color:var(--accent);
}
.save-toggle-label{
  font-size:12px;font-weight:500;color:var(--text3);
  white-space:nowrap;transition:color var(--ease);
}
.save-toggle:hover .save-toggle-label{color:var(--text2);}
.save-toggle input:checked ~ .save-toggle-label{color:var(--accent);}

/* ══ RESUME CARD ══ */
.resume-card{
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:var(--r);padding:32px 28px;
  text-align:center;max-width:480px;margin:0 auto;
}
.resume-icon{font-size:32px;margin-bottom:14px;}
.resume-title{
  font-family:var(--serif);font-size:20px;font-weight:600;
  letter-spacing:-.02em;color:var(--text);margin-bottom:10px;
}
.resume-sub{
  font-size:14px;color:var(--text3);line-height:1.7;margin-bottom:24px;
}
.resume-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

/* ══ SAVE BAR ══ */
.save-bar{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r-sm);margin-bottom:16px;flex-wrap:wrap;
}
.save-btn{
  padding:8px 18px;border-radius:var(--r-sm);border:1px solid var(--border2);
  background:var(--surface);color:var(--text2);
  font-size:13px;font-weight:600;font-family:var(--sans);
  cursor:pointer;transition:all var(--ease);white-space:nowrap;
}
.save-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
.save-hint{font-size:12px;color:var(--text3);}
.save-confirm{font-size:13px;font-weight:500;padding:4px 0;}

/* ══ PROGRESS TABLE ══ */
.prog-empty{
  font-size:14px;color:var(--text3);line-height:1.75;
  padding:24px 0;text-align:center;
}
.prog-table{display:flex;flex-direction:column;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:8px;}
.prog-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:0;border-bottom:1px solid var(--border);}
.prog-row:last-child{border-bottom:none;}
.prog-header{background:var(--surface2);}
.prog-header .prog-cell{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);}
.prog-cell{padding:11px 14px;font-size:13px;color:var(--text2);display:flex;align-items:center;}
.prog-ch{
  font-family:var(--mono);font-size:10px;font-weight:600;
  padding:2px 7px;border-radius:3px;
  background:var(--surface3);color:var(--text3);
  margin-right:6px;flex-shrink:0;
}

/* ══ DONE RING ══ */
.done-ring{
  width:76px;height:76px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;margin:0 auto 18px;
  background:var(--surface2);border:2px solid var(--border2);
}

/* ══ FOOTER ══ */
.footer{
  text-align:center;padding:16px 24px 22px;
  font-size:12px;color:var(--text3);letter-spacing:.02em;
  flex-shrink:0;border-top:1px solid var(--border);
}

/* ══ MOBILE ══ */
@media(max-width:640px){
  .nav{padding:0 16px;height:56px;}
  .landing{padding:40px 16px 60px;}
  .landing-h1{font-size:38px;}

  .qcard{padding:20px 16px 18px;}
  .m-grid{grid-template-columns:1fr;}
  .lvl-row{gap:7px;}
  .lvl-tile{min-width:120px;}
  .hero h1{font-size:30px;}
}

<script>
// ── THEME ──────────────────────────────────────────────────────────
function toggleTheme(){
  var t=document.documentElement.getAttribute('data-theme')==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeBtn').textContent=t==='dark'?'🌙':'☀️';
  try{localStorage.setItem('baf3m-theme',t);}catch(e){}
}

// Global Enter key — press Enter to go to next question when Next is visible
document.addEventListener('keydown', function(e){
  if(e.key !== 'Enter') return;
  // Don't fire if user is typing in a text input (except fitbInput which handles its own)
  var tag = document.activeElement ? document.activeElement.tagName : '';
  var id  = document.activeElement ? document.activeElement.id : '';
  // Allow Enter on fitbInput (handled by checkFITB), block on other inputs/textareas
  if((tag==='INPUT'||tag==='TEXTAREA') && id!=='fitbInput') return;
  // If Next button is visible, click it
  var btn = document.getElementById('btnNext');
  if(btn && btn.style.display !== 'none' && !btn.disabled){
    e.preventDefault();
    btn.click();
  }
});
(function(){
  try{
    var saved=localStorage.getItem('baf3m-theme');
    var pref=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
    var t=saved||pref;
    document.documentElement.setAttribute('data-theme',t);
    document.getElementById('themeBtn').textContent=t==='dark'?'🌙':'☀️';
  }catch(e){}
})();
// ═══════════════════════════════════════════════════════════════════
//  DATA - All chapters
// ═══════════════════════════════════════════════════════════════════

var CHAPTERS = [
{
  id:'C1',
  title:'Financial Position & Business Transactions',
  units:'Units 1 & 2',
  color:'#4fa3e8', bg:'rgba(79,163,232,0.12)',
  levels:{
    L1:[
      {type:'mcq',q:"TRUE or FALSE: Assets are things a business owns or is owed.",opts:["True","False"],ans:0,exp:"True. Assets include things OWNED (Cash, Equipment) and things OWED TO the business (Accounts Receivable)."},
      {type:'mcq',q:"TRUE or FALSE: Liabilities represent the owner's share of the business.",opts:["True","False"],ans:1,exp:"False. OWNER'S EQUITY is the owner's share. Liabilities are debts owed to outside parties."},
      {type:'mcq',q:"TRUE or FALSE: The accounting equation is: Assets = Liabilities + Owner's Equity.",opts:["True","False"],ans:0,exp:"True. This is the fundamental ALOE equation that every transaction must keep balanced."},
      {type:'mcq',q:"TRUE or FALSE: On a balance sheet, assets are listed in order of how long they have been owned.",opts:["True","False"],ans:1,exp:"False. Assets are listed in order of LIQUIDITY - how quickly they can be converted to cash."},
      {type:'mcq',q:"TRUE or FALSE: The Cost Principle means assets are recorded at their current market value.",opts:["True","False"],ans:1,exp:"False. The Cost Principle records assets at their ORIGINAL PURCHASE PRICE - not current market value."},
      {type:'mcq',q:"TRUE or FALSE: IFRS is used by publicly traded Canadian companies.",opts:["True","False"],ans:0,exp:"True. IFRS is for PUBLIC companies; ASPE is for private companies."},
      {type:'mcq',q:"TRUE or FALSE: A creditor is someone who OWES money to your business.",opts:["True","False"],ans:1,exp:"False. A creditor is someone YOUR BUSINESS owes money TO. A debtor is someone who owes money to you."},
      {type:'mcq',q:"TRUE or FALSE: The Business Entity Principle requires personal and business finances to be kept separate.",opts:["True","False"],ans:0,exp:"True. Personal transactions must never be mixed with business records under the Business Entity Principle."},
      {type:'mcq',q:"Which of the following is NOT part of the ALOE equation?",opts:["Assets","Liabilities","Net Income","Owner's Equity"],ans:2,exp:"Net Income is reported on the income statement - not a component of the balance sheet equation Assets = Liabilities + Owner's Equity."},
      {type:'mcq',q:"What is an asset?",opts:["Money a business owes","A resource of value owned by a business","The owner's personal savings","A type of expense"],ans:1,exp:"An asset is something of value that a business OWNS - like cash, equipment, or land. Liabilities are what you owe."},
      {type:'mcq',q:"What is a liability?",opts:["Something a business owns","Money the business has in the bank","A debt or amount the business owes","The owner's share of the business"],ans:2,exp:"A liability is a DEBT - something the business owes to someone else, like a bank loan or unpaid supplier bill."},
      {type:'mcq',q:"What is owner's equity?",opts:["Total revenue earned","The business's bank balance","The owner's claim on assets after paying all debts","Total liabilities"],ans:2,exp:"Owner's Equity = Assets − Liabilities. It's what belongs to the owner after all debts are settled."},
      {type:'mcq',q:"The balance sheet equation is:",opts:["Revenue − Expenses = Profit","Assets + Liabilities = Owner's Equity","Assets − Liabilities = Owner's Equity","Cash − Debts = Net Worth"],ans:2,exp:"ALOE: Assets − Liabilities = Owner's Equity. This must always stay balanced after every transaction."},
      {type:'mcq',q:"A balance sheet shows a company's finances:",opts:["Over a full year","At a specific date (point in time)","Only for the current month","Whenever the owner wants"],ans:1,exp:"The balance sheet is a snapshot on a SPECIFIC DATE - like a photograph of finances on that day."},
      {type:'mcq',q:"Which of these is an asset?",opts:["Bank loan","Accounts Payable","Cash","Mortgage Payable"],ans:2,exp:"Cash is an asset - the business owns it. Bank loans, accounts payable, and mortgages are all liabilities (debts)."},
      {type:'mcq',q:"Which of these is a liability?",opts:["Cash","Accounts Receivable","Land","Bank Loan"],ans:3,exp:"A bank loan is a liability - money the business OWES to the bank. Cash, A/R, and land are assets."},
      {type:'mcq',q:"What does 'Accounts Receivable' mean?",opts:["Money you owe to suppliers","Money customers owe to YOU","Your bank account balance","Money set aside for expenses"],ans:1,exp:"Accounts Receivable = money owed TO your business by customers who bought on credit. It's a current asset."},
      {type:'mcq',q:"What does 'Accounts Payable' mean?",opts:["Money customers owe you","Money you owe to suppliers","Your business profits","Owner's investment"],ans:1,exp:"Accounts Payable = money your business owes to suppliers for goods/services already received. It's a current liability."},
      {type:'mcq',q:"Cash is listed first among current assets because:",opts:["It has the highest value","It is the most liquid asset","It is the easiest to lose","The owner prefers it first"],ans:1,exp:"Cash is the most LIQUID - it's already money and doesn't need to be converted."},
      {type:'mcq',q:"The Business Entity Principle means:",opts:["A business must use IFRS","Business and personal finances must be kept separate","All assets are recorded at market value","Transactions must be approved daily"],ans:1,exp:"Business Entity Principle: the business and owner are treated as SEPARATE entities. Personal finances never mix with business records."},
      {type:'mcq',q:"Under the Cost Principle, an asset is recorded at:",opts:["Its current market value","What someone offers to pay","The actual price paid to acquire it","The owner's estimate"],ans:2,exp:"Cost Principle (ASPE): record assets at their ACTUAL PURCHASE COST - not guesses or market value."},
      {type:'mcq',q:"Which standard do PUBLIC companies in Canada use?",opts:["ASPE","GAAP","IFRS","CPA rules"],ans:2,exp:"Public companies in Canada MUST use IFRS (International Financial Reporting Standards). No exceptions."},
      {type:'mcq',q:"What is bookkeeping?",opts:["Analyzing and interpreting financial data","Preparing and recording daily financial transactions","Making business decisions from reports","Calculating taxes owed"],ans:1,exp:"Bookkeeping = the RECORDING step. It's preparing and writing down day-to-day financial transactions."},
      {type:'mcq',q:"A 'creditor' is someone who:",opts:["Owes money to your business","Your business owes money to","Manages the accounting","Works at the bank"],ans:1,exp:"Creditor = person or business you OWE money TO. Example: the bank that gave you a loan is your creditor."},
      {type:'mcq',q:"A 'debtor' is someone who:",opts:["Your business owes money to","Owes money to your business","Runs the business","Pays the wages"],ans:1,exp:"Debtor = someone who owes money TO your business. Example: a customer who bought on credit."},
      {type:'mcq',q:"What is a transaction?",opts:["A type of financial report","An exchange of value that causes a financial change","A bank account deposit only","A type of asset"],ans:1,exp:"A transaction = an exchange of items of value. Something is given and something is received. Always affects at least two accounts."},
      {type:'mcq',q:"Net worth equals:",opts:["Revenue minus expenses","Total cash owned","Assets minus liabilities","Liabilities plus equity"],ans:2,exp:"Net Worth = Assets − Liabilities. Same as Owner's Equity - what's left after all debts are paid."},
      {type:'mcq',q:"What is financial position?",opts:["How much profit a business makes","A snapshot of assets, liabilities, and equity at a specific date","Total cash flow for the year","The number of employees"],ans:1,exp:"Financial position = the overall picture of what a business owns, owes, and the owner's stake, at one point in time."},
      {type:'mcq',q:"A single ruled line on a financial report means:",opts:["Grand total","An error","A column is being added or subtracted","A new account starts"],ans:2,exp:"Single ruled line = a math operation (addition or subtraction). Double underline = the FINAL total."},
      {type:'mcq',q:"Land appears first among non-current assets because:",opts:["It has the highest value","It has the longest useful life","It is the easiest to sell","It is the most liquid"],ans:1,exp:"Non-current assets are ordered by useful life - longest first. Land lasts forever, so it's listed first."},
      {type:'mcq',q:"Business ethics means:",opts:["Following tax law exactly","Doing what is morally right in business, beyond just laws","Preparing accurate financial statements","Hiring qualified accountants"],ans:1,exp:"Business ethics = making morally right decisions in business. It goes BEYOND the law - it's about honesty and integrity."},
      {type:'mcq',q:"An accounting period is:",opts:["The time between two transactions","The length of time covered by financial statements","The due date of a bill","A type of financial report"],ans:1,exp:"Accounting period = the time span your financial statements cover (e.g., one month, one quarter, or one year)."},
      {type:'match',pairs:[
        {term:"Asset",def:"Something of value owned by the business."},
        {term:"Liability",def:"A debt - something the business owes."},
        {term:"Owner's Equity",def:"What belongs to the owner after paying all debts."},
        {term:"Cash",def:"The most liquid current asset."},
        {term:"Accounts Receivable",def:"Money customers owe TO your business."},
        {term:"Accounts Payable",def:"Money your business owes to suppliers."},
        {term:"Balance Sheet",def:"Statement of assets, liabilities, and equity on a specific date."},
        {term:"Creditor",def:"A person or business your business owes money to."},
        {term:"Debtor",def:"A person or business that owes money to your business."},
        {term:"Net Worth",def:"Assets minus liabilities."},
        {term:"Transaction",def:"An exchange of value causing a financial change."},
        {term:"Land",def:"Non-current asset listed first - has the longest useful life."},
      ]},
      {type:'sa',q:"Write the balance sheet equation (ALOE) and explain what each part means in simple words.",model:"Assets − Liabilities = Owner's Equity.\nAssets = things the business owns.\nLiabilities = debts the business owes.\nOwner's Equity = what's left for the owner after paying all debts."},
      {type:'sa',q:"What is the Business Entity Principle? Give one example of why it matters.",model:"The Business Entity Principle says a business and its owner are treated as completely separate entities. Personal finances must never be mixed with business finances.\nExample: If the owner buys a personal car, it cannot appear on the business balance sheet - even if they sometimes use it for work."},
    ],
    L2:[
      {type:'mcq',q:"TRUE or FALSE: A business transaction must always involve an exchange of cash.",opts:["True","False"],ans:1,exp:"False. Transactions can involve credit, services rendered, or asset exchanges - cash does not need to change hands."},
      {type:'mcq',q:"TRUE or FALSE: Every business transaction affects at least two items in the accounting equation.",opts:["True","False"],ans:0,exp:"True. Double-entry accounting requires every transaction to affect at least two accounts."},
      {type:'mcq',q:"TRUE or FALSE: Ethics in accounting only matters for large public corporations.",opts:["True","False"],ans:1,exp:"False. Ethics applies to ALL businesses regardless of size."},
      {type:'mcq',q:"TRUE or FALSE: A code of ethics might include rules about accepting gifts from clients.",opts:["True","False"],ans:0,exp:"True. Conflicts of interest - like accepting gifts - are a common code of ethics topic."},
      {type:'mcq',q:"TRUE or FALSE: IFRS and ASPE use identical accounting standards.",opts:["True","False"],ans:1,exp:"False. IFRS and ASPE are two different frameworks with different requirements."},
      {type:'mcq',q:"TRUE or FALSE: The accounting period concept allows a business's life to be divided into time periods for reporting.",opts:["True","False"],ans:0,exp:"True. This allows monthly, quarterly, or annual financial statements to be prepared."},
      {type:'mcq',q:"Which of the following would NOT be covered in a code of ethics?",opts:["Conflicts of interest","Reporting financial fraud","How to calculate straight-line depreciation","Confidentiality of client data"],ans:2,exp:"Calculating depreciation is an accounting procedure - not an ethical issue. Codes of ethics address conduct and professional responsibility."},
      {type:'mcq',q:"Which is NOT one of the four transaction analysis questions?",opts:["What items change?","Do they increase or decrease?","Who signed the cheque?","Is the ALOE equation still balanced?"],ans:2,exp:"'Who signed the cheque' is not one of the four questions. The four are: What changes? Increase or decrease? By how much? Is ALOE balanced?"},
      {type:'mcq',q:"A business has assets of $120,000 and liabilities of $45,000. What is the owner's equity?",opts:["$165,000","$45,000","$75,000","$120,000"],ans:2,exp:"Owner's Equity = Assets − Liabilities = $120,000 − $45,000 = $75,000."},
      {type:'mcq',q:"If owner's equity is $55,000 and liabilities are $30,000, what are total assets?",opts:["$25,000","$55,000","$85,000","$30,000"],ans:2,exp:"Assets = Liabilities + Owner's Equity = $30,000 + $55,000 = $85,000."},
      {type:'mcq',q:"Which sequence correctly orders current assets on a balance sheet?",opts:["Supplies → Accounts Receivable → Cash","Accounts Receivable → Cash → Supplies","Cash → Accounts Receivable → Supplies","Supplies → Cash → Accounts Receivable"],ans:2,exp:"Liquidity order: Cash → Accounts Receivable (~30 days) → Supplies (must be used first)."},
      {type:'mcq',q:"Which correctly orders these liabilities?",opts:["Mortgage → Bank Loan → Accounts Payable","Bank Loan → Mortgage → Accounts Payable","Accounts Payable → Bank Loan → Mortgage","Accounts Payable → Mortgage → Bank Loan"],ans:2,exp:"Shortest to longest maturity: Accounts Payable (~30 days) → Bank Loan (1–5 yrs) → Mortgage (25 yrs)."},
      {type:'mcq',q:"A clinic buys equipment for $8,000 cash. How does this affect the balance sheet?",opts:["Assets increase $8,000; liabilities increase $8,000","Cash decreases $8,000; Equipment increases $8,000 - equity unchanged","Assets decrease $8,000 overall","Liabilities decrease $8,000"],ans:1,exp:"Cash (asset) down $8,000 and Equipment (asset) up $8,000. Total assets unchanged - one asset traded for another."},
      {type:'mcq',q:"A business borrows $15,000 from the bank. What is the effect?",opts:["Assets increase $15,000; equity increases $15,000","Only liabilities increase $15,000","Cash increases $15,000; Bank Loan increases $15,000 - equity unchanged","Assets decrease; liabilities decrease"],ans:2,exp:"Cash (asset) up $15,000 AND Bank Loan (liability) up $15,000. ALOE balanced. Owner's equity unchanged."},
      {type:'mcq',q:"ASPE uses the __ principle; IFRS uses the __ principle.",opts:["fair value; cost","cost; fair value","matching; cost","revenue; fair value"],ans:1,exp:"ASPE = cost principle (record at purchase price). IFRS = fair value principle (record at current market value)."},
      {type:'mcq',q:"Under IFRS, a building bought for $300,000 now worth $380,000 is recorded at:",opts:["$300,000","$340,000","$380,000","Owner's choice"],ans:2,exp:"IFRS uses fair value - the current market value of $380,000. Under ASPE it would stay at $300,000."},
      {type:'mcq',q:"Why do accounting standards exist?",opts:["To make accounting more complicated","To ensure consistency and comparability","To help avoid taxes","To limit who can be an accountant"],ans:1,exp:"Standards ensure consistency - financial statements from different companies can be fairly compared."},
      {type:'mcq',q:"A customer pays $600 cash for services. Which accounts change?",opts:["Accounts Receivable increases; Cash decreases","Cash increases $600; Owner's Equity increases $600","Only Cash increases","Liabilities increase $600"],ans:1,exp:"Cash (asset) up $600 and Revenue increases $600 (flows to Owner's Equity). ALOE stays balanced."},
      {type:'mcq',q:"Which asset appears LAST among non-current assets?",opts:["Land","Building","Office Equipment","Physiotherapy Equipment"],ans:2,exp:"Non-current assets go longest life first: Land → Building → Physio Equipment → Office Equipment (shortest life, listed last)."},
      {type:'mcq',q:"A doctor's personal mortgage stays off the clinic's balance sheet due to:",opts:["Cost Principle","IFRS Fair Value","Business Entity Principle","Matching Principle"],ans:2,exp:"Business Entity Principle: owner's personal finances are completely separate from the business."},
      {type:'mcq',q:"The four transaction analysis questions include all EXCEPT:",opts:["What items change?","Do items increase or decrease?","Is the equation still balanced?","Did the manager approve it?"],ans:3,exp:"The four questions are about what changes, up or down, by how much, and does ALOE balance. Approval is NOT one of them."},
      {type:'mcq',q:"Which user of financial information needs it to decide whether to grant a loan?",opts:["Owner","Employee","Banker / Creditor","Investor"],ans:2,exp:"Bankers and creditors review financials to determine whether a business can repay before approving a loan."},
      {type:'mcq',q:"A conflict of interest means:",opts:["Two businesses have different standards","A personal interest could bias professional judgment","Two creditors both want payment","An asset and liability are equal"],ans:1,exp:"Conflict of interest = personal gain that might influence professional decisions unfairly."},
      {type:'mcq',q:"Which body created IFRS and where is it based?",opts:["AcSB - Toronto","CPA Canada - Ottawa","IASB - London, England","SEC - New York"],ans:2,exp:"IASB (International Accounting Standards Board) is based in London, England. It creates IFRS."},
      {type:'mcq',q:"TRUE or FALSE: Current assets can be converted to cash within one year.",opts:["True","False"],ans:0,exp:"True. Current assets are short-term assets expected to be converted to cash or used up within one year or one operating cycle."},
      {type:'mcq',q:"TRUE or FALSE: Fixed assets (plant and equipment) are listed before current assets on a classified balance sheet.",opts:["True","False"],ans:1,exp:"False. Current assets are listed FIRST on a classified balance sheet (in order of liquidity), followed by fixed assets."},
      {type:'mcq',q:"TRUE or FALSE: Prepaid expenses are classified as current liabilities.",opts:["True","False"],ans:1,exp:"False. Prepaid expenses (like Prepaid Insurance) are CURRENT ASSETS - they represent future economic benefits already paid for."},
      {type:'mcq',q:"TRUE or FALSE: A mortgage payable due in 20 years is a long-term liability.",opts:["True","False"],ans:0,exp:"True. Long-term liabilities are debts not due for more than one year. A 20-year mortgage clearly qualifies as a long-term liability."},
      {type:'mcq',q:"TRUE or FALSE: The statement of owner's equity shows how the capital account changed during the period.",opts:["True","False"],ans:0,exp:"True. The statement of owner's equity starts with opening capital, adds net income, subtracts drawings, and arrives at the ending capital balance."},
      {type:'mcq',q:"TRUE or FALSE: Ending capital = Opening Capital + Net Income + Drawings.",opts:["True","False"],ans:1,exp:"False. Drawings REDUCE capital, so the formula is: Ending Capital = Opening Capital + Net Income - Drawings."},
      {type:'mcq',q:"TRUE or FALSE: On a classified balance sheet, liabilities are listed in order of when they must be paid.",opts:["True","False"],ans:0,exp:"True. Current liabilities (due within a year) are listed before long-term liabilities - in order of urgency of payment."},
      {type:'mcq',q:"Which of the following is NOT a current asset?",opts:["Cash","Accounts Receivable","Prepaid Insurance","Equipment"],ans:3,exp:"Equipment is a FIXED (long-term) asset - not a current asset. It provides benefits over many years and is not converted to cash within one year."},
      {type:'mcq',q:"Which of the following is NOT a long-term liability?",opts:["Mortgage Payable","Bank Loan (due in 10 years)","Accounts Payable","Equipment Loan (due in 5 years)"],ans:2,exp:"Accounts Payable is a CURRENT liability - typically due within 30-60 days. Mortgages and long-term loans are all long-term liabilities."},
      {type:'mcq',q:"Which of the following is NOT a current asset?",opts:["Cash","Accounts Receivable","Office Supplies","Land"],ans:3,exp:"Land is NON-current - it lasts many years. Current assets are converted to cash within about one year."},
      {type:'mcq',q:"Which of the following is NOT a topic typically covered in a business code of ethics?",opts:["Rules about receiving gifts from clients","Guidelines on employee confidentiality","How to calculate straight-line depreciation","Conflicts of interest policy"],ans:2,exp:"A code of ethics covers conduct, gifts, confidentiality, conflicts of interest, and use of company assets. Calculating depreciation is an accounting procedure - not an ethical guideline."},
      {type:'mcq',q:"Which of the following is NOT one of the five users of financial information?",opts:["Creditors and bankers","Government/tax authorities","A competitor's sales team","Investors"],ans:2,exp:"The five key users are: Owners, Managers, Creditors/Bankers, Investors, and Government. A competitor's sales team is not a recognized user of a business's financial statements."},
      {type:'mcq',q:"Which of the following is NOT a current asset?",opts:["Cash","Accounts Receivable","Prepaid Insurance","Mortgage Payable"],ans:3,exp:"Mortgage Payable is a LONG-TERM LIABILITY - it is a debt, not an asset at all. Cash, Accounts Receivable, and Prepaid Insurance are all current assets."},
      {type:'mcq',q:"Which of the following is NOT a liability?",opts:["Accounts Payable","Bank Loan","Accounts Receivable","Mortgage Payable"],ans:2,exp:"Accounts Receivable is a CURRENT ASSET - it is money owed TO your business. Accounts Payable, Bank Loan, and Mortgage Payable are all liabilities (debts you owe)."},
      {type:'mcq',q:"Which of the following is NOT one of the four questions asked when analyzing a business transaction?",opts:["What items change in value?","Do items increase or decrease?","Who authorized the transaction?","Is the ALOE equation still balanced?"],ans:2,exp:"The four transaction analysis questions are: (1) What changes? (2) Increase or decrease? (3) By how much? (4) Is ALOE balanced? Who authorized it is NOT one of the four questions."},
      {type:'mcq',q:"TRUE or FALSE: A journal records transactions in chronological (date) order.",opts:["True","False"],ans:0,exp:"True. The general journal records all transactions in the order they occur - making it easy to trace any transaction back by date."},
      {type:'mcq',q:"TRUE or FALSE: In a journal entry, the credited account is written flush against the left margin.",opts:["True","False"],ans:1,exp:"False. The DEBITED account is written at the left margin. The credited account is INDENTED to visually separate debits from credits."},
      {type:'mcq',q:"TRUE or FALSE: A journal entry must always have only one debit and one credit.",opts:["True","False"],ans:1,exp:"False. Compound journal entries can have multiple debits or multiple credits - as long as total debits equal total credits."},
      {type:'mcq',q:"TRUE or FALSE: The explanation in a journal entry should include cheque or invoice numbers.",opts:["True","False"],ans:0,exp:"True. Including cheque/invoice numbers creates an audit trail - linking the journal entry back to the original source document."},
      {type:'mcq',q:"TRUE or FALSE: Journals eliminate the need for ledgers.",opts:["True","False"],ans:1,exp:"False. Journals and ledgers serve different purposes. The journal records transactions in date order; the ledger organizes them by account. Both are needed."},
      {type:'mcq',q:"TRUE or FALSE: The journal is called the book of original entry.",opts:["True","False"],ans:0,exp:"True. The journal is where transactions are FIRST recorded - making it the book of original entry. Information is then transferred (posted) to the ledger."},
      {type:'mcq',q:"Which of the following is NOT an advantage of using a journal?",opts:["Provides a chronological record","Complete transaction recorded in one place","Automatically calculates account balances","Reduces recording errors"],ans:2,exp:"A journal does NOT automatically calculate balances - that happens in the ledger during posting. The other three are genuine advantages of using a journal."},
      {type:'mcq',q:"Which step does NOT belong in the journalizing process?",opts:["Record the date","Write the debit account and amount","Calculate the new ledger balance","Write the credit account and amount"],ans:2,exp:"Calculating the new ledger balance happens during POSTING - not journalizing. The four journalizing steps are: date, debit account, credit account, explanation."},
      {type:'mcq',q:"Which of the following is NOT an advantage of using a journal?",opts:["Transactions are recorded in chronological order","The complete transaction is recorded in one place","It automatically posts entries to the ledger","It reduces recording errors"],ans:2,exp:"A journal does NOT automatically post to the ledger - posting is a separate manual step. The other three are real advantages of keeping a journal."},
      {type:'mcq',q:"Which of the following is NOT one of the four parts of a journal entry?",opts:["The date","The account debited and amount","The posting reference number","The explanation"],ans:2,exp:"The four parts of a journal entry are: (1) Date, (2) Account debited + amount, (3) Account credited + amount, (4) Explanation. The posting reference is filled in AFTER posting - it is not part of the original journal entry."},
      {type:'mcq',q:"TRUE or FALSE: A source document provides objective proof that a business transaction occurred.",opts:["True","False"],ans:0,exp:"True. Source documents (invoices, receipts, cheques) are objective evidence - they verify what happened, when, and for how much."},
      {type:'mcq',q:"TRUE or FALSE: Source documents are only needed for cash transactions.",opts:["True","False"],ans:1,exp:"False. Source documents are needed for ALL transactions - cash, credit, and otherwise. They provide the audit trail for every entry."},
      {type:'mcq',q:"TRUE or FALSE: Pre-numbering source documents helps detect missing or lost documents.",opts:["True","False"],ans:0,exp:"True. Sequential numbering means any gap in the number sequence immediately signals a missing document - improving internal control."},
      {type:'mcq',q:"TRUE or FALSE: A purchase invoice is issued BY your business to a customer.",opts:["True","False"],ans:1,exp:"False. A purchase invoice is received FROM a supplier when you BUY something. A SALES invoice is issued BY your business to a customer."},
      {type:'mcq',q:"TRUE or FALSE: A cash register tape is an example of a source document.",opts:["True","False"],ans:0,exp:"True. A cash register tape (cash sales slip) documents cash sales made during the day and serves as the source document for that transaction."},
      {type:'mcq',q:"TRUE or FALSE: Bank debit memos mean money has been added to your account.",opts:["True","False"],ans:1,exp:"False. A bank DEBIT memo means the bank has REDUCED your account balance (e.g., service fees charged). A credit memo means money was added."},
      {type:'mcq',q:"Which of the following is NOT a source document?",opts:["Sales invoice","Purchase invoice","Chart of accounts","Cheque copy"],ans:2,exp:"The chart of accounts is an internal accounting tool - not a source document. Source documents provide external proof of transactions."},
      {type:'mcq',q:"Which of the following is NOT a benefit of prenumbering source documents?",opts:["Helps detect missing documents","Creates an audit trail","Automatically posts entries to the ledger","Improves internal control"],ans:2,exp:"Prenumbering does NOT automatically post entries - that is a manual accounting step. It helps detect missing documents and supports the audit trail."},
      {type:'mcq',q:"Which of the following is NOT a source document?",opts:["Sales invoice","Purchase invoice","General ledger","Cash sales slip"],ans:2,exp:"The general ledger is an accounting record, not a source document. Sales invoices, purchase invoices, and cash sales slips are all source documents that prove a transaction occurred."},
