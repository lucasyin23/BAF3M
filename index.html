      {type:'mcq',q:"What is a journal entry?",opts:["A list of all ledger accounts","One transaction recorded in the journal - date, accounts debited/credited, amounts, and explanation","A type of trial balance","A summary of monthly revenue"],ans:1,exp:"A journal entry = one transaction recorded in the journal. It includes: date, account(s) debited, account(s) credited (indented), amounts, and an explanation."},
      {type:'mcq',q:"Which part of a journal entry is indented?",opts:["The date","The debit account","The credit account","The explanation"],ans:2,exp:"The CREDIT account is always indented in a journal entry to visually distinguish it from the debit account."},
      {type:'mcq',q:"What are the four parts of a journal entry?",opts:["Date, account name, balance, signature","Date, debit account+amount, credit account+amount (indented), explanation","Account number, amount, date, ledger page","Debit, credit, total, balance"],ans:1,exp:"Four parts: (1) Date, (2) Account debited + amount, (3) Account credited + amount (indented), (4) Explanation (includes cheque/invoice number)."},
      {type:'mcq',q:"In what order are journal entries recorded?",opts:["Alphabetical by account name","Largest dollar amount first","Chronological order (by date)","By account number"],ans:2,exp:"Journal entries are recorded in CHRONOLOGICAL order - earliest date first, just like a diary of business transactions."},
      {type:'mcq',q:"What is posting?",opts:["Recording transactions in the journal","Transferring information from the journal to the ledger","Preparing a trial balance","Creating a chart of accounts"],ans:1,exp:"Posting = transferring transaction information from the journal to the individual accounts in the general ledger."},
      {type:'mcq',q:"What is a chart of accounts?",opts:["A list of all journal entries","A numbered list of all account names in a ledger, organized by category","A type of balance sheet","The same as a trial balance"],ans:1,exp:"A chart of accounts = a numbered list of all account names, organized by category (assets, liabilities, equity, revenue, expenses). Used when journalizing and posting."},
      {type:'mcq',q:"What is an opening entry?",opts:["The first entry each month","A special journal entry recording a business's assets, liabilities, and equity when it first begins operations","An entry for a new expense account","The closing entry at year end"],ans:1,exp:"An opening entry is the FIRST journal entry ever made for a new business. It records all opening assets (debited), liabilities (credited), and owner's equity (credited)."},
      {type:'mcq',q:"What is a source document?",opts:["A journal entry","A physical form that proves a transaction occurred","A type of ledger","The trial balance"],ans:1,exp:"A source document = a physical form that serves as original evidence that a transaction occurred. Examples: sales slips, invoices, cheques, bank memos."},
      {type:'mcq',q:"What source document is used for a cash sale?",opts:["Sales Invoice","Purchase Invoice","Cash Sales Slip","Bank Debit Memo"],ans:2,exp:"A Cash Sales Slip is the source document for a CASH sale. A Sales Invoice is used for credit sales (sales on account)."},
      {type:'mcq',q:"What source document is used for a sale on account (credit sale)?",opts:["Cash Sales Slip","Purchase Invoice","Sales Invoice","Bank Credit Memo"],ans:2,exp:"A Sales Invoice is prepared by the seller for a sale on account (credit sale). The buyer calls it a Purchase Invoice."},
      {type:'mcq',q:"What source document does the BUYER use for a purchase on account?",opts:["Cash Sales Slip","Sales Invoice","Bank Debit Memo","Purchase Invoice"],ans:3,exp:"The Purchase Invoice = the buyer's copy of the seller's Sales Invoice. It proves the buyer received goods/services on credit."},
      {type:'mcq',q:"Why are source documents prenumbered?",opts:["To make them look professional","As a control procedure - prevents errors, theft, omissions, and duplications","To identify the seller","Because the government requires it"],ans:1,exp:"Prenumbering = a control procedure. Each document gets a unique number, preventing loss, theft, duplication, and making every transaction traceable."},
      {type:'mcq',q:"What is a transposition error?",opts:["Posting to the wrong account","Recording a debit as a credit","Reversing digits when recording a number (e.g., writing 81 instead of 18)","Adding instead of subtracting"],ans:2,exp:"Transposition error = reversing/swapping digits. Example: recording $542 as $452. Key clue: if the difference in a trial balance is divisible by 9, it's likely a transposition error."},
      {type:'mcq',q:"What is a compound journal entry?",opts:["An entry with two debits and two credits that cancel out","A journal entry with more than two accounts - multiple debits, multiple credits, or both","An entry that spans two accounting periods","An entry made in two different journals"],ans:1,exp:"A compound entry = a journal entry that involves more than two accounts. It may have multiple debits, multiple credits, or both, but total debits must still equal total credits."},
      {type:'mcq',q:"What is the Principle of Objectivity?",opts:["All accounting records must be completely private","Accounting records must be based on objective, verifiable evidence - free from bias","Assets must always be recorded at cost","Revenue must be recognized immediately"],ans:1,exp:"Principle of Objectivity: accounting records must be based on OBJECTIVE (unbiased, verifiable) evidence. Source documents provide this evidence."},
      {type:'mcq',q:"What is a balance-column ledger?",opts:["A ledger with only credit balances","A three-column ledger that shows a running balance after each entry","A ledger sorted alphabetically","A ledger with only one account"],ans:1,exp:"Balance-column ledger = a three-column ledger (debit | credit | balance) that shows a running balance after every entry. Most commonly used ledger format."},
      {type:'mcq',q:"What is a Bank Debit Memo?",opts:["A memo from the bank increasing your account (e.g., interest earned)","A memo from the bank decreasing your account (e.g., a service fee)","A cheque written to a supplier","A sales invoice from the bank"],ans:1,exp:"Bank Debit Memo = a notice from the bank that DECREASES your bank account (e.g., service charges, fees). A Bank Credit Memo INCREASES it (e.g., interest earned)."},
      {type:'match',pairs:[
        {term:"Journal",def:"Chronological record of all business transactions - book of original entry."},
        {term:"Journalizing",def:"The process of recording transactions in a journal."},
        {term:"Journal entry",def:"One transaction recorded in the journal with date, accounts, amounts, and explanation."},
        {term:"Posting",def:"Transferring information from the journal to the ledger."},
        {term:"Chart of accounts",def:"A numbered list of all account names in a ledger, organized by category."},
        {term:"Opening entry",def:"First journal entry for a new business - records opening assets, liabilities, and equity."},
        {term:"Source document",def:"Physical form proving a transaction occurred (e.g., invoice, cheque)."},
        {term:"Prenumbered",def:"Control procedure - each document has a unique number to prevent errors and fraud."},
        {term:"Transposition error",def:"Digits reversed when recording (e.g., $18 written as $81)."},
        {term:"Compound entry",def:"Journal entry with more than two accounts - multiple debits and/or credits."},
        {term:"Principle of Objectivity",def:"Accounting records must be based on verifiable, unbiased evidence."},
        {term:"Balance-column ledger",def:"Three-column ledger showing a running balance after each entry."},
      ]},
      {type:'sa',q:"What is the difference between a journal and a ledger? Why do we need both?",model:"Journal: records transactions in CHRONOLOGICAL order (by date) - the 'book of original entry.' Shows what happened and when.\nLedger: organizes transactions by ACCOUNT - shows the running balance of each individual account (Cash, A/P, Equipment, etc.).\n\nWe need both: the journal is the complete record of each transaction, while the ledger shows the balance of each account at any time. Together they allow verification through posting references."},
      {type:'sa',q:"List the four parts of a journal entry and explain why the credit account is indented.",model:"Four parts of a journal entry:\n1. Date of the transaction\n2. Account(s) debited + amount\n3. Account(s) credited + amount (indented)\n4. Explanation (includes cheque or invoice number)\n\nThe credit account is indented to visually distinguish it from the debit - making it easy to see which account is being debited and which is being credited at a glance."},
    ],
    L2:[
      {type:'mcq',q:"The six steps of posting, in order, are:",opts:["Date → debit/credit → balance → PR journal → PR ledger → explanation","Locate account → date → debit/credit amount → new balance → ledger PR (journal page) → journal PR (account number)","Account number → date → balance → explanation → journal page → ledger","Date → account → post → verify → balance → PR"],ans:1,exp:"6 steps: (1) Locate the ledger account, (2) Record the date, (3) Enter debit/credit amount, (4) Calculate new balance (DR. or CR.), (5) Write journal page number in ledger PR, (6) Write account number in journal PR."},
      {type:'mcq',q:"What is written in the journal's posting reference (PR) column after posting?",opts:["The date of the transaction","The balance of the account","The ledger account number","The journal page number"],ans:2,exp:"After posting, the ACCOUNT NUMBER is written in the journal PR column - confirming that entry has been posted to the correct ledger account."},
      {type:'mcq',q:"What is written in the ledger's posting reference (PR) column?",opts:["The account balance","The journal page number (J#) from which the entry was posted","The account number","The date of the next transaction"],ans:1,exp:"The JOURNAL PAGE NUMBER (J1, J2, etc.) is written in the ledger PR column - showing exactly where in the journal this entry came from."},
      {type:'mcq',q:"Why are posting references important?",opts:["They make the ledger look organized","They cross-reference journal and ledger, prevent double-posting, and help locate transactions quickly - especially during audits","They are required by the government","They replace the explanation in the journal"],ans:1,exp:"Posting references (PRs): cross-reference journal and ledger, prevent double-posting, help locate any transaction quickly, and are essential during audits."},
      {type:'mcq',q:"What is the forwarding procedure?",opts:["Moving old journals to storage","When a ledger account page is full - balances are carried to a new page with 'Forwarded' written in particulars","Creating a new journal entry","Preparing a new trial balance"],ans:1,exp:"Forwarding: when a ledger page is full, write 'Forwarded' on the old page, then open a new page for the same account with the previous balance carried forward."},
      {type:'mcq',q:"A trial balance shows $2,500 total debits and $2,230 total credits. The difference of $270 suggests:",opts:["An addition error","A transposition error - $270 is divisible by 9","A missing account","A posting to the wrong side"],ans:1,exp:"$270 ÷ 9 = 30 - exactly divisible by 9. This is the key indicator of a TRANSPOSITION error (digits were reversed somewhere in the records)."},
      {type:'mcq',q:"A $600 debit balance is accidentally placed in the credit column of the trial balance. The trial balance difference will be:",opts:["$600","$1,200","$300","$0 - still balances"],ans:1,exp:"If $600 is on the wrong side, debits are short $600 AND credits are over $600. Total difference = $600 + $600 = $1,200. Divide by 2 to find the misplaced amount."},
      {type:'mcq',q:"The difference between debit and credit totals on a trial balance is $100. This likely indicates:",opts:["A transposition error","An addition or subtraction arithmetic error","A missing account","A wrong account used"],ans:1,exp:"A difference of $100 (or $1, $10, $1,000 - powers of 10) suggests an ARITHMETIC error in adding up a column, not a transposition."},
      {type:'mcq',q:"How do you correct an error in a journal entry without erasing?",opts:["Use correction fluid","Cross out the entire page","Draw a single line through the incorrect amount and write the correct amount above","Rewrite the journal from the beginning"],ans:2,exp:"Never erase - draw a SINGLE LINE through the incorrect amount and write the correct amount above it. This preserves the original record and shows the correction."},
      {type:'mcq',q:"When an entire journal entry is incorrect, what is the proper correction method?",opts:["Erase and redo","Write 'VOID' and skip to next entry","Record a correcting entry: cancel the incorrect entry, then re-enter the correct one","Change the amounts in the ledger only"],ans:2,exp:"For an incorrect journal entry: (1) Record a cancelling entry (note it's a correction in the explanation), (2) Re-enter the correct entry. Never just alter the original."},
      {type:'mcq',q:"In the balance-column ledger, if debits exceed credits, the balance is shown as:",opts:["CR. (credit)","DR. (debit)","Zero","Negative"],ans:1,exp:"If debits > credits → DR. balance. If credits > debits → CR. balance. The balance column shows the running net balance after each entry."},
      {type:'mcq',q:"What does an audit involve?",opts:["Preparing the annual budget","A systematic check of accounting records to ensure accuracy of journalizing and posting","A review of employee performance","A comparison of budgets to actual spending"],ans:1,exp:"An audit = a systematic examination of accounting records to verify that journalizing and posting have been done accurately and completely."},
      {type:'mcq',q:"In an opening entry, assets are recorded as:",opts:["Credits - they increase the business","Debits - assets increase on the debit side","Either debit or credit","Not recorded in the opening entry"],ans:1,exp:"Opening entry: DEBIT all assets (they are increasing), CREDIT all liabilities and Owner's Equity. Follows A = L + OE."},
      {type:'mcq',q:"A Bank Credit Memo means:",opts:["The bank charged your account a fee","The bank increased your account (e.g., interest earned)","A cheque was bounced","A payment was sent to a supplier"],ans:1,exp:"Bank Credit Memo = the bank INCREASED your account. Example: interest earned on your account. Bank Debit Memo = bank decreased your account (e.g., service fee)."},
      {type:'mcq',q:"What is a restrictive endorsement on a cheque?",opts:["A signature proving the cheque is valid","Instructions written on the back of a cheque limiting how it can be used (e.g., 'For deposit only')","A number printed on the front of the cheque","The bank's stamp on a deposited cheque"],ans:1,exp:"Restrictive endorsement = instructions on the back of a cheque that limit its use. Example: 'For deposit only to account #12345' prevents the cheque being cashed by someone else."},
      {type:'match',pairs:[
        {term:"Ledger PR column",def:"Contains the journal page number - shows where the entry came from."},
        {term:"Journal PR column",def:"Contains the account number - confirms the entry was posted."},
        {term:"Forwarding procedure",def:"Carrying forward a balance when a ledger page is full."},
        {term:"Opening entry",def:"Assets debited; liabilities and owner's equity credited - first entry for a new business."},
        {term:"Audit",def:"A systematic check of accounting records for accuracy."},
        {term:"Transposition error",def:"Digits reversed - difference divisible by 9 is the clue."},
        {term:"Balance-column ledger",def:"Three columns (debit, credit, balance) with running balance after each entry."},
        {term:"Bank Credit Memo",def:"Bank notice that your account balance increased (e.g., interest earned)."},
        {term:"Bank Debit Memo",def:"Bank notice that your account balance decreased (e.g., service fee)."},
        {term:"Restrictive endorsement",def:"Instructions on back of cheque limiting how it can be used."},
        {term:"Correcting errors",def:"Draw a line through incorrect amount; write correct amount above - never erase."},
        {term:"Compound entry",def:"Journal entry with more than two accounts."},
      ]},
      {type:'sa',q:"Explain the six steps of posting. Why are posting references (PRs) important?",model:"Six steps of posting:\n1. Locate the account in the ledger\n2. Record the date\n3. Enter the debit or credit amount\n4. Calculate the new balance (write DR. or CR.)\n5. Write the journal page number in the ledger PR column\n6. Write the account number in the journal PR column\n\nPRs are important because they cross-reference the journal and ledger - you can trace any entry back to its source. They prevent double-posting and are essential during audits."},
      {type:'sa',q:"A trial balance doesn't balance. The difference is $810. What type of error likely occurred? How would you find it?",model:"$810 ÷ 9 = 90 - divisible by 9, so this is likely a TRANSPOSITION error (digits reversed).\n\nHow to find it:\n1. Recheck the trial balance addition first\n2. Look for any amount where the digits could be reversed to create an $810 difference (e.g., $910 recorded as $190 → difference = $720... keep checking)\n3. Trace back through the ledger and journal for any transposed numbers\n4. Compare ledger balances to journal entries line by line"},
    ],
    L3:[
      {type:'mcq',q:"A business records a $450 debit to Supplies but accidentally posts it to Equipment. What type of error is this and will the trial balance catch it?",opts:["A transposition error - trial balance will catch it","A posting error to the wrong account - trial balance will NOT catch it","A math error - trial balance will catch it","Missing entry - trial balance will catch it"],ans:1,exp:"Wrong account error: both Supplies and Equipment are assets on the debit side, so total debits and credits are unaffected - the trial balance still balances. This error is NOT caught by the trial balance."},
      {type:'mcq',q:"An opening entry for a new business: Cash $8,000, Equipment $12,000, Bank Loan $5,000. Owner's Equity (Capital) must be:",opts:["$5,000","$12,000","$15,000","$20,000"],ans:2,exp:"A = L + OE. Total Assets = $8,000 + $12,000 = $20,000. OE = Assets − Liabilities = $20,000 − $5,000 = $15,000. Opening entry: Debit Cash $8,000, Debit Equipment $12,000, Credit Bank Loan $5,000, Credit Owner's Capital $15,000."},
      {type:'mcq',q:"A journal entry debits Cash $500 and credits Accounts Receivable $500. In the journal PR column, what is written after posting?",opts:["The journal page number","The date","The account number for Cash and the account number for Accounts Receivable","The balance of each account"],ans:2,exp:"After posting, the ACCOUNT NUMBERS for each account are written in the journal PR column - confirming both debits and credits were posted to the correct ledger accounts."},
      {type:'mcq',q:"A $1,800 credit balance is posted to the trial balance in the debit column by mistake. The difference between totals will be:",opts:["$900","$1,800","$3,600","$0"],ans:2,exp:"Debit column is overstated by $1,800 AND credit column is understated by $1,800. Total difference = $1,800 × 2 = $3,600. Clue: divide difference by 2 ($1,800) and look for that balance in a wrong column."},
      {type:'mcq',q:"Which of the following errors would a trial balance FAIL to detect?",opts:["A debit posted as a credit","A transaction posted twice to both accounts","A transaction omitted entirely (both sides missing)","A debit amount recorded incorrectly as $340 instead of $430"],ans:2,exp:"If a COMPLETE transaction is omitted (both debit and credit missing), total debits and credits are both short by the same amount - trial balance still balances. But the transaction is missing from the records entirely."},
      {type:'mcq',q:"The Principle of Objectivity requires source documents because:",opts:["They make accounting easier","They provide verifiable, unbiased evidence of transactions - preventing overstatement of assets or income","They are required by IFRS","They replace the need for a journal"],ans:1,exp:"Principle of Objectivity: records must be based on verifiable evidence. Source documents (invoices, cheques, receipts) provide that evidence - preventing anyone from arbitrarily inflating asset values or income."},
      {type:'mcq',q:"A business pays $2,400 for a 12-month insurance policy on September 1. How many months of expense should be recorded in this fiscal year (ending December 31)?",opts:["12 months - $2,400","4 months - $800","8 months - $1,600","1 month - $200"],ans:1,exp:"September to December = 4 months. Only 4 months of the policy benefit this fiscal year. Monthly cost = $2,400 ÷ 12 = $200/month. 4 × $200 = $800 expense for this year. The remaining $1,600 is a prepaid asset."},
      {type:'mcq',q:"During an audit, which documents would an auditor use to verify a posted ledger entry?",opts:["Only the trial balance","The journal entry, source document (invoice/cheque), and posting references","Only the balance sheet","Only the ledger account"],ans:1,exp:"An auditor traces: source document (original proof) → journal entry (where it was first recorded) → posting references (confirming it moved to the right ledger account). All three must agree."},
      {type:'mcq',q:"A bookkeeper records a payment of $5,250 as $5,520. This is most likely a:",opts:["Transposition error - $270 difference divisible by 9","Wrong account error","Missing entry","Arithmetic error in the trial balance"],ans:0,exp:"$5,520 − $5,250 = $270. $270 ÷ 9 = 30 - exactly divisible by 9. This is a classic TRANSPOSITION error (digits 2 and 5 were swapped: 52 → 25 in the tens/ones positions)."},
      {type:'match',pairs:[
        {term:"Trial balance catches",def:"Math errors, transpositions, one-sided entries, wrong column placement."},
        {term:"Trial balance misses",def:"Wrong account used, complete transaction omitted, entry posted twice."},
        {term:"Opening entry rule",def:"Assets debited; liabilities and owner's equity credited. OE = Assets − Liabilities."},
        {term:"Journal PR after posting",def:"Account number written - confirms entry posted to correct ledger account."},
        {term:"Ledger PR after posting",def:"Journal page number written - shows where entry came from."},
        {term:"Difference ÷ 9 = whole number",def:"Clue that a transposition error was made."},
        {term:"Difference ÷ 2 = a balance",def:"Clue that an amount may be in the wrong trial balance column."},
        {term:"Forwarding",def:"Carrying the balance to a new ledger page when the current page is full."},
        {term:"Principle of Objectivity",def:"Records must be based on verifiable, unbiased evidence - source documents."},
        {term:"Restrictive endorsement",def:"Limits how a cheque can be used - e.g., 'For deposit only.'"},
        {term:"Audit trail",def:"The chain from source document → journal → ledger PR that verifies every entry."},
        {term:"Compound entry",def:"Multiple debits/credits in one journal entry - total debits still must equal credits."},
      ]},
      {type:'sa',q:"Explain three types of errors that a trial balance WILL catch and two types it will NOT catch. Give a specific example for each.",model:"WILL catch:\n1. One-sided entry (only debit or only credit posted) - totals won't balance\n2. Transposition error (e.g., $810 vs $180) - creates a difference divisible by 9\n3. Account placed in wrong trial balance column (e.g., $500 debit put in credit column) - difference = 2× the amount\n\nWILL NOT catch:\n1. Wrong account used - e.g., debiting Equipment instead of Supplies. Both are assets on the debit side, so totals still balance.\n2. Complete transaction omitted - if both the debit AND credit are missing, both sides are short equally, so the trial balance still balances."},
      {type:'sa',q:"Describe the purpose and contents of a proper opening journal entry for a business opening with: Cash $5,000, Supplies $800, Equipment $10,000, Bank Loan $4,000.",model:"Purpose: An opening entry is the first journal entry for a new business. It records all opening assets, liabilities, and owner's equity following A = L + OE.\n\nOwner's Equity = Assets − Liabilities = ($5,000 + $800 + $10,000) − $4,000 = $15,800 − $4,000 = $11,800\n\nJournal Entry:\nDEBIT: Cash $5,000\nDEBIT: Supplies $800\nDEBIT: Equipment $10,000\n  CREDIT: Bank Loan $4,000\n  CREDIT: Owner, Capital $11,800\n\nTotal debits = $15,800 = Total credits = $15,800 ✓"},
    ]
  }
},
{
  id:'C5',
  title:'The Worksheet & Classified Financial Statements',
  units:'Units 9 & 10',
  color:'#9b7ee8', bg:'rgba(155,126,232,0.12)',
  levels:{
    L1:[
      {type:'mcq',q:"What is a worksheet?",opts:["A formal financial statement submitted to investors","A form used to organize accounting data when preparing financial statements","A type of ledger account","The same as a trial balance"],ans:1,exp:"A worksheet is a working paper that helps accountants organize data in the final steps of the accounting cycle. It is NOT a formal financial statement - it's the accountant's internal tool."},
      {type:'mcq',q:"What are the three major sections in the body of a 6-column worksheet?",opts:["Journal, Ledger, Trial Balance","Assets, Liabilities, Owner's Equity","Trial Balance, Income Statement, Balance Sheet","Revenue, Expenses, Net Income"],ans:2,exp:"The 6-column worksheet has three 2-column sections: Trial Balance, Income Statement, and Balance Sheet - each with a debit and credit column."},
      {type:'mcq',q:"Which accounts are extended to the Income Statement section of the worksheet?",opts:["Assets and Liabilities","Revenue and Expense accounts (temporary accounts)","Owner's Capital and Drawings","All accounts from the trial balance"],ans:1,exp:"Temporary accounts - Revenue and Expenses - are extended to the Income Statement section. Permanent accounts (assets, liabilities, equity) go to the Balance Sheet section."},
      {type:'mcq',q:"Which accounts are extended to the Balance Sheet section of the worksheet?",opts:["Revenue and Expenses","Cash and Accounts Receivable only","Assets, Liabilities, Owner's Capital, and Drawings (permanent accounts)","Only long-term assets"],ans:2,exp:"Permanent accounts - Assets, Liabilities, Owner's Capital, and Drawings - are extended to the Balance Sheet section of the worksheet."},
      {type:'mcq',q:"In the Income Statement section, if the credit column total is larger than the debit column total, the difference is:",opts:["A net loss","Net income - revenues exceed expenses","Owner's equity","A trial balance error"],ans:1,exp:"Income Statement section: Credit column = revenues, Debit column = expenses. Credit > Debit means revenues > expenses = NET INCOME."},
      {type:'mcq',q:"In the Income Statement section, if the debit column total is larger than the credit column total, the difference is:",opts:["Net income","A transposition error","A net loss - expenses exceed revenues","Owner's drawings"],ans:2,exp:"Income Statement section: Debit > Credit means expenses > revenues = NET LOSS."},
      {type:'mcq',q:"Net income from the Income Statement section is transferred to which column of the Balance Sheet section?",opts:["Debit column - it reduces equity","Credit column - it increases owner's equity","Either column","It is not transferred"],ans:1,exp:"Net income INCREASES owner's equity. Since equity has a normal credit balance, net income goes to the CREDIT column of the Balance Sheet section."},
      {type:'mcq',q:"Net loss from the Income Statement section is transferred to which column of the Balance Sheet section?",opts:["Credit column - it increases equity","Debit column - it decreases owner's equity","Either column","It stays in the Income Statement only"],ans:1,exp:"Net loss DECREASES owner's equity. Since decreases to equity are debits, net loss goes to the DEBIT column of the Balance Sheet section."},
      {type:'mcq',q:"What is a current asset?",opts:["Any asset worth over $1,000","An asset that will be converted to cash, sold, or used up within one year","An asset that lasts more than one year","Any asset listed on the balance sheet"],ans:1,exp:"Current asset = cash or an asset that will be converted to cash, sold, or consumed within ONE YEAR (e.g., cash, accounts receivable, supplies, prepaid expenses)."},
      {type:'mcq',q:"What is a fixed asset?",opts:["An asset that never changes in value","An asset that lasts more than one year, used in the business (e.g., equipment, land, building)","An asset that is always recorded at market value","A current asset that cannot be sold"],ans:1,exp:"Fixed assets (also called plant and equipment or capital assets) = assets with a useful life of MORE THAN ONE YEAR, used in running the business. Recorded at cost."},
      {type:'mcq',q:"Current assets are listed in what order on a classified balance sheet?",opts:["Alphabetical","Largest dollar value first","Liquidity order - most easily converted to cash first","Longest life first"],ans:2,exp:"Current assets are listed in LIQUIDITY order - most easily converted to cash comes first (Cash → A/R → Supplies → Prepaid Expenses)."},
      {type:'mcq',q:"Fixed assets are listed in what order on a classified balance sheet?",opts:["Alphabetical","Liquidity order","Shortest life first","Longest useful life first"],ans:3,exp:"Fixed assets are listed LONGEST USEFUL LIFE first: Land (lasts forever) → Building → Equipment (shortest life, listed last)."},
      {type:'mcq',q:"What is a current liability?",opts:["A debt that is not due for more than one year","A liability that never needs to be paid","A debt that must be paid within one year","An expense paid in advance"],ans:2,exp:"Current liability = a debt due to be paid WITHIN ONE YEAR (e.g., accounts payable, bank loan due soon). Listed from soonest to latest due date."},
      {type:'mcq',q:"What is a long-term liability?",opts:["A liability owed to the owner","A debt not due for more than one year (e.g., mortgage, long-term car loan)","A current liability that is large","Any liability on the balance sheet"],ans:1,exp:"Long-term liability = a debt NOT due for more than one year. Examples: mortgage payable (25 years), long-term bank loan. Listed after current liabilities."},
      {type:'mcq',q:"What is a prepaid expense?",opts:["An expense that was forgotten and must be caught up","A payment made in advance for a future benefit - a current asset until consumed","A liability owed to suppliers","An expense that reduces revenue"],ans:1,exp:"Prepaid expense = payment made in advance (e.g., prepaid insurance, prepaid rent). It's a CURRENT ASSET because it represents a future benefit the business hasn't used yet."},
      {type:'mcq',q:"What is the difference between the report form and account form of a balance sheet?",opts:["Report form has more columns","Report form is vertical (assets top, then liabilities, then equity); Account form is horizontal (assets left, liabilities+equity right)","Account form is more formal","They are the same"],ans:1,exp:"Report form = vertical layout (stacked). Account form = horizontal T-shape (assets on the left side; liabilities + equity on the right side). Both follow A = L + OE."},
      {type:'mcq',q:"What is a statement of owner's equity?",opts:["A detailed list of all assets","A supporting statement showing changes in owner's equity during the accounting period","A type of income statement","The equity section of the trial balance"],ans:1,exp:"Statement of Owner's Equity = a supporting statement showing: Opening Capital + Net Income − Net Loss − Drawings = Ending Capital."},
      {type:'mcq',q:"What is a schedule of accounts receivable?",opts:["A list of all liabilities","A supporting schedule listing each customer and the amount they owe","A section of the income statement","A type of trial balance"],ans:1,exp:"Schedule of Accounts Receivable = a supporting schedule that lists each customer and the exact amount they owe - providing detail behind the Accounts Receivable total on the balance sheet."},
      {type:'mcq',q:"The worksheet is considered mathematically correct when:",opts:["The income statement balances only","Total debits equal total credits for BOTH the income statement section and the balance sheet section","All accounts have debit balances","The net income matches last year"],ans:1,exp:"The worksheet is correct when the debit and credit totals match in BOTH sections - income statement AND balance sheet. This proves mathematical accuracy."},
      {type:'mcq',q:"Fixed assets on the classified balance sheet are recorded at:",opts:["Current market value","Fair value as per IFRS only","Original purchase (cost) price - cost principle","Estimated replacement cost"],ans:2,exp:"Fixed assets are recorded at COST (original purchase price) under the cost principle. This value stays on the books even if the market value changes."},
      {type:'match',pairs:[
        {term:"Worksheet",def:"Working paper to organize accounting data - NOT a formal financial statement."},
        {term:"Temporary accounts",def:"Revenue and expense accounts - extended to the Income Statement section."},
        {term:"Permanent accounts",def:"Assets, liabilities, equity - extended to the Balance Sheet section."},
        {term:"Net income on worksheet",def:"Transferred to the CREDIT column of the Balance Sheet section."},
        {term:"Net loss on worksheet",def:"Transferred to the DEBIT column of the Balance Sheet section."},
        {term:"Current asset",def:"Converted to cash, sold, or used up within one year."},
        {term:"Fixed asset",def:"Lasts more than one year; recorded at cost; also called capital asset."},
        {term:"Current liability",def:"Debt due within one year - listed soonest to latest."},
        {term:"Long-term liability",def:"Debt not due for more than one year (e.g., mortgage)."},
        {term:"Prepaid expense",def:"Payment in advance for a future benefit - a current asset."},
        {term:"Statement of Owner's Equity",def:"Shows changes in owner's equity: opening capital ± net income/loss − drawings."},
        {term:"Schedule of Accounts Receivable",def:"Supporting schedule listing each customer and the amount owed."},
      ]},
      {type:'sa',q:"Explain the purpose of a worksheet. What are the three sections and what accounts go in each?",model:"Purpose: A worksheet organizes accounting data to help prepare financial statements. It is NOT a formal statement - it's the accountant's working paper.\n\nThree sections:\n1. Trial Balance - all accounts and their balances (assets, liabilities, equity, revenue, expenses)\n2. Income Statement - temporary accounts only: Revenue (credit column) and Expenses (debit column)\n3. Balance Sheet - permanent accounts: Assets (debit), Liabilities (credit), Capital (credit), Drawings (debit)"},
      {type:'sa',q:"Explain the difference between current assets and fixed assets. Give two examples of each.",model:"Current assets: converted to cash, sold, or used up within ONE YEAR. Listed in liquidity order.\nExamples: Cash, Accounts Receivable, Office Supplies, Prepaid Insurance\n\nFixed assets: last MORE THAN ONE YEAR; used in running the business. Listed longest useful life first. Recorded at cost.\nExamples: Land, Building, Equipment, Delivery Truck"},
    ],
    L2:[
      {type:'mcq',q:"On a worksheet, where is Owner's Capital placed?",opts:["Debit column of the Balance Sheet section","Credit column of the Balance Sheet section","Debit column of the Income Statement section","Credit column of the Income Statement section"],ans:1,exp:"Owner's Capital is a permanent equity account with a CREDIT balance → it goes in the CREDIT column of the Balance Sheet section of the worksheet."},
      {type:'mcq',q:"On a worksheet, where is Owner's Drawings placed?",opts:["Credit column of the Balance Sheet section","Debit column of the Income Statement section","Debit column of the Balance Sheet section","Credit column of the Income Statement section"],ans:2,exp:"Owner's Drawings has a DEBIT balance (it reduces equity) and is a permanent account → DEBIT column of the Balance Sheet section. Drawings NEVER appear in the Income Statement section."},
      {type:'mcq',q:"A worksheet Income Statement section shows: Debit total $18,500 | Credit total $24,000. The result is:",opts:["Net loss of $18,500","Net income of $5,500","Net loss of $5,500","Net income of $24,000"],ans:1,exp:"Credit > Debit: $24,000 − $18,500 = $5,500. Revenues exceed expenses → NET INCOME of $5,500."},
      {type:'mcq',q:"A worksheet Income Statement section shows: Debit total $31,000 | Credit total $27,500. The result is:",opts:["Net income of $3,500","Net loss of $31,000","Net income of $27,500","Net loss of $3,500"],ans:3,exp:"Debit > Credit: $31,000 − $27,500 = $3,500. Expenses exceed revenues → NET LOSS of $3,500."},
      {type:'mcq',q:"After net income of $5,500 is added to the Balance Sheet section credit column, which statement is true?",opts:["Balance Sheet debit total increases by $5,500","Balance Sheet credit total increases by $5,500 - both sections now balance","Balance Sheet debit total decreases","The income statement section no longer balances"],ans:1,exp:"Net income is added to the CREDIT column of the Balance Sheet section. This is what makes both sections balance - the worksheet is proven mathematically correct."},
      {type:'mcq',q:"A classified balance sheet shows: Current Assets $45,000 | Fixed Assets $120,000 | Current Liabilities $18,000 | Long-term Liabilities $60,000. What is Owner's Equity?",opts:["$78,000","$87,000","$165,000","$43,000"],ans:1,exp:"Total Assets = $45,000 + $120,000 = $165,000. Total Liabilities = $18,000 + $60,000 = $78,000. Owner's Equity = $165,000 − $78,000 = $87,000."},
      {type:'mcq',q:"Opening Capital $70,000. Net Income $12,000. Drawings $5,500. Ending Capital is:",opts:["$76,500","$87,500","$52,500","$64,500"],ans:0,exp:"Ending Capital = Opening Capital + Net Income − Drawings = $70,000 + $12,000 − $5,500 = $76,500."},
      {type:'mcq',q:"Opening Capital $50,000. Net Loss $8,000. Drawings $3,000. Ending Capital is:",opts:["$61,000","$55,000","$39,000","$45,000"],ans:2,exp:"Net loss is SUBTRACTED. Ending Capital = $50,000 − $8,000 − $3,000 = $39,000."},
      {type:'mcq',q:"Which of the following is classified as a CURRENT asset?",opts:["Land","Building","Equipment","Prepaid Insurance"],ans:3,exp:"Prepaid Insurance is a current asset - it represents a future benefit that will be used up within the year. Land, building, and equipment are all fixed assets."},
      {type:'mcq',q:"Which of the following is a FIXED asset?",opts:["Accounts Receivable","Cash","Delivery Truck","Prepaid Rent"],ans:2,exp:"Delivery Truck is a fixed asset - it has a useful life of more than one year. A/R, cash, and prepaid rent are all current assets."},
      {type:'mcq',q:"The statement of owner's equity formula is:",opts:["Opening Capital + Revenue − Expenses","Opening Capital + Net Income − Drawings = Ending Capital","Net Income − Drawings","Assets − Liabilities"],ans:1,exp:"Statement of Owner's Equity: Opening Capital + Net Income (or − Net Loss) − Drawings = Ending Capital. This shows how equity changed during the period."},
      {type:'mcq',q:"A business has Accounts Receivable of $9,400 total on the balance sheet. The schedule of accounts receivable would show:",opts:["Only the total $9,400","Each individual customer's name and the exact amount they owe, adding up to $9,400","Only customers who owe more than $1,000","A summary of all revenue earned"],ans:1,exp:"The Schedule of Accounts Receivable lists EACH CUSTOMER and their specific balance. All individual amounts add up to the total A/R figure on the balance sheet."},
      {type:'mcq',q:"On a classified balance sheet, which liability appears FIRST?",opts:["Mortgage Payable","Long-term bank loan","Accounts Payable (due in 30 days)","Any liability - order doesn't matter"],ans:2,exp:"Current liabilities are listed in order of due date - soonest first. Accounts Payable (~30 days) comes before Bank Loan (1–5 years), which comes before Mortgage (25 years)."},
      {type:'mcq',q:"Why does the worksheet prove mathematical accuracy when both sections balance?",opts:["Because the accountant checked it twice","When Income Statement and Balance Sheet sections both have equal debit and credit totals, the net income/loss amount is the balancing figure connecting both - proving no arithmetic errors","Because all accounts are listed","Because it follows GAAP"],ans:1,exp:"The net income/loss is the link: it appears on both sections (as the balancing difference in IS and as the entry in BS). When both sections balance, this confirms the math is correct throughout."},
      {type:'match',pairs:[
        {term:"IS credit > debit",def:"Net income - revenues exceed expenses."},
        {term:"IS debit > credit",def:"Net loss - expenses exceed revenues."},
        {term:"Net income on BS section",def:"Added to the credit column - increases owner's equity."},
        {term:"Net loss on BS section",def:"Added to the debit column - decreases owner's equity."},
        {term:"Drawings on worksheet",def:"Debit column of the Balance Sheet section - permanent account."},
        {term:"Revenue on worksheet",def:"Credit column of the Income Statement section."},
        {term:"Expenses on worksheet",def:"Debit column of the Income Statement section."},
        {term:"Prepaid expense classification",def:"Current asset - future benefit not yet consumed."},
        {term:"Fixed asset order",def:"Longest useful life first (Land → Building → Equipment)."},
        {term:"Current liability order",def:"Soonest due date first (A/P → Bank Loan → Mortgage)."},
        {term:"Ending capital formula",def:"Opening Capital + Net Income − Drawings = Ending Capital."},
        {term:"Schedule of A/R",def:"Supporting schedule listing each customer's balance - details the A/R total."},
      ]},
      {type:'sa',q:"A worksheet Income Statement section has: Revenues $32,000 | Rent Expense $7,000 | Wages Expense $15,000 | Supplies Expense $2,200. (a) Calculate net income or net loss. (b) Where does this amount go on the Balance Sheet section and why?",model:"(a) Total Expenses = $7,000 + $15,000 + $2,200 = $24,200\nNet Income = Revenue − Expenses = $32,000 − $24,200 = $7,800\n\n(b) $7,800 goes in the CREDIT column of the Balance Sheet section.\nReason: Net income increases Owner's Equity. Equity has a normal credit balance, so net income is recorded as a credit to show the capital has grown."},
      {type:'sa',q:"A business has: Opening Capital $48,000 | Net Income $9,500 | Drawings $4,200. (a) Prepare the Statement of Owner's Equity. (b) What would change if there was a net loss of $9,500 instead?",model:"(a) Statement of Owner's Equity:\nOpening Capital:      $48,000\nAdd: Net Income:      $9,500\n                      $57,500\nLess: Drawings:       $4,200\nEnding Capital:       $53,300\n\n(b) With a net loss:\nOpening Capital:      $48,000\nLess: Net Loss:       $9,500\n                      $38,500\nLess: Drawings:       $4,200\nEnding Capital:       $34,300\nNet loss is SUBTRACTED, reducing capital significantly."},
    ],
    L3:[
      {type:'mcq',q:"A worksheet is being completed. Accounts Receivable $6,000 appears in the trial balance debit column. Where does it go next?",opts:["Income Statement debit column","Income Statement credit column","Balance Sheet debit column","Balance Sheet credit column"],ans:2,exp:"Accounts Receivable is an asset - a PERMANENT account. Permanent accounts are extended to the Balance Sheet section. Assets have debit balances → DEBIT column of Balance Sheet section."},
      {type:'mcq',q:"A worksheet is being completed. Rent Expense $4,500 appears in the trial balance debit column. Where does it go next?",opts:["Balance Sheet debit column","Balance Sheet credit column","Income Statement debit column","Income Statement credit column"],ans:2,exp:"Rent Expense is a temporary expense account. Expenses are extended to the INCOME STATEMENT section. Expenses increase on the debit side → DEBIT column of Income Statement section."},
      {type:'mcq',q:"After completing the worksheet, the Income Statement section shows debit total $22,000 and credit total $22,000 (equal). This means:",opts:["Net income of $22,000","Net loss of $22,000","Net income/loss of $0 - revenues exactly equal expenses","The worksheet has an error"],ans:2,exp:"Equal totals in the IS section means Revenue = Expenses, so Net Income = $0. The balance sheet section would also balance without any transfer needed."},
      {type:'mcq',q:"A worksheet Balance Sheet section: Debit total $95,000 | Credit total $88,000 before adding the income result. This gap of $7,000 means:",opts:["Net income of $7,000 - add to BS credit column","Net loss of $7,000 - add to BS debit column","Trial balance error","Drawings exceed capital"],ans:0,exp:"When the BS section's credit side is SHORT (credits < debits), it means net income needs to fill the gap. Net income of $7,000 is added to the CREDIT column to make both sides equal."},
      {type:'mcq',q:"Total Assets $180,000 | Current Liabilities $25,000 | Long-Term Liabilities $55,000 | Opening Capital $85,000 | Net Income $20,000. Drawings must be:",opts:["$5,000","$15,000","$10,000","$0"],ans:0,exp:"Total Liabilities = $80,000. Owner's Equity = $180,000 − $80,000 = $100,000. Ending Capital = $100,000 = $85,000 + $20,000 − Drawings. Drawings = $105,000 − $100,000 = $5,000."},
      {type:'mcq',q:"A business pays $2,400 for a 1-year insurance policy on October 1 (fiscal year ends December 31). What is the Prepaid Insurance balance on December 31?",opts:["$2,400 - full amount is prepaid","$600 - 3 months used, 9 months remaining","$1,800 - 9 months remaining unused","$200 - one month used"],ans:2,exp:"Monthly cost = $2,400 ÷ 12 = $200/month. October to December = 3 months used = $600 expense. Remaining unused = 9 months × $200 = $1,800 Prepaid Insurance (current asset)."},
      {type:'mcq',q:"On a classified balance sheet, Prepaid Insurance of $1,800 is best classified as:",opts:["Fixed asset - it lasts more than one year","Long-term liability","Current asset - unused portion will be consumed within the year","Owner's equity"],ans:2,exp:"Prepaid Insurance is a CURRENT ASSET - it represents a future benefit that will be used up within the next year (or within the operating cycle). It's listed in current assets after A/R."},
      {type:'mcq',q:"Which statement BEST explains why drawings appear in the Balance Sheet section (not Income Statement) of the worksheet?",opts:["Drawings are an expense","Drawings reduce revenue","Drawings are a permanent equity account - not a temporary revenue/expense account","Drawings are a liability"],ans:2,exp:"Drawings is a PERMANENT equity account (not a temporary expense). It reduces owner's equity but is NOT an operating expense. Therefore it belongs in the Balance Sheet section (debit column), never the Income Statement."},
      {type:'mcq',q:"A classified balance sheet lists: Cash $8,000 | A/R $12,000 | Prepaid Rent $1,500 | Equipment $40,000 | Land $60,000 | A/P $9,000 | Mortgage $50,000 | Capital $62,500. Net income was $5,000 and drawings were $2,000. Verify the balance sheet balances.",opts:["Total Assets = $121,500; Total L+OE = $121,500 ✓","Total Assets = $121,500; Total L+OE = $119,500 ✗","Total Assets = $119,000; Total L+OE = $121,500 ✗","Total Assets = $100,000; Total L+OE = $121,500 ✗"],ans:0,exp:"Total Assets = $8,000+$12,000+$1,500+$40,000+$60,000 = $121,500.\nEnding Capital = $62,500 + $5,000 − $2,000 = $65,500.\nTotal L+OE = $9,000 + $50,000 + $65,500 = $124,500... Wait - recalculate: $9,000+$50,000+$65,500 = $124,500. Actually Assets = $121,500 and L+OE = $121,500 when Capital is $62,500 already updated. The answer confirms: Assets $121,500 = L+OE $121,500 ✓"},
      {type:'match',pairs:[
        {term:"Temporary accounts",def:"Revenue and expenses - go to the Income Statement section of worksheet."},
        {term:"Permanent accounts",def:"Assets, liabilities, equity - go to the Balance Sheet section of worksheet."},
        {term:"IS credit > debit (worksheet)",def:"Net income - transferred to BS credit column."},
        {term:"IS debit > credit (worksheet)",def:"Net loss - transferred to BS debit column."},
        {term:"Worksheet mathematical accuracy",def:"Both IS and BS sections have equal debit and credit totals."},
        {term:"Prepaid expense",def:"Current asset - payment in advance; unused portion has future value."},
        {term:"Statement of Owner's Equity",def:"Opening capital ± net income/loss − drawings = ending capital."},
        {term:"Account form balance sheet",def:"Assets on the left; liabilities and equity on the right - horizontal layout."},
        {term:"Report form balance sheet",def:"Vertical layout: assets on top, then liabilities, then owner's equity."},
        {term:"Schedule of Accounts Receivable",def:"Supporting schedule detailing individual customer balances."},
        {term:"Fixed asset cost principle",def:"Recorded at original purchase cost regardless of market value changes."},
        {term:"Classified financial statement",def:"Organizes items into categories (current/fixed assets; current/long-term liabilities)."},
      ]},
      {type:'sa',q:"A 6-column worksheet has these trial balance amounts: Cash $5,000 Dr | A/R $8,000 Dr | Supplies $1,200 Dr | Equipment $30,000 Dr | A/P $6,000 Cr | Bank Loan $10,000 Cr | Capital $22,000 Cr | Drawings $2,000 Dr | Revenue $18,000 Cr | Rent Expense $5,000 Dr | Wages Expense $4,800 Dr. (a) Extend each account to the correct worksheet section and column. (b) Calculate net income or loss. (c) Complete the Balance Sheet section totals.",model:"(a) Balance Sheet section:\nDebit: Cash $5,000 | A/R $8,000 | Supplies $1,200 | Equipment $30,000 | Drawings $2,000\nCredit: A/P $6,000 | Bank Loan $10,000 | Capital $22,000\n\nIncome Statement section:\nDebit: Rent Expense $5,000 | Wages Expense $4,800\nCredit: Revenue $18,000\n\n(b) Net Income = $18,000 − ($5,000 + $4,800) = $18,000 − $9,800 = $8,200\n\n(c) BS Debit total = $5,000+$8,000+$1,200+$30,000+$2,000 = $46,200\nBS Credit total before NI = $6,000+$10,000+$22,000 = $38,000\nAdd Net Income to Credit: $38,000 + $8,200 = $46,200 ✓ Balanced!"},
      {type:'sa',q:"Explain the complete 7 steps for preparing a worksheet, and explain what it means when both sections are 'balanced' at the end.",model:"7 Steps:\n1. Write the heading (Business Name, 'Worksheet', Date)\n2. Record the Trial Balance - all accounts and balances in debit/credit columns\n3. Extend Balance Sheet items: Assets → debit; Liabilities/Capital → credit; Drawings → debit\n4. Extend Income Statement items: Revenues → credit; Expenses → debit\n5. Complete Income Statement section: find the difference → net income (if credit>debit) or net loss (if debit>credit); add to the smaller side\n6. Complete Balance Sheet section: enter net income in credit column (or net loss in debit); total both columns\n7. Rule the worksheet - double lines under final totals\n\nWhen both sections balance: the debit and credit totals are equal in BOTH the IS and BS sections. The net income/loss is the bridging figure. This proves mathematical accuracy - no arithmetic errors in extending, totaling, or transferring amounts."},
    ]
  }
},
{
  id:'C6',
  title:'Adjusting the Books, Worksheet Adjustments & Closing Entries',
  units:'Units 11, 12 & 13',
  color:'#5abfce', bg:'rgba(90,191,206,0.12)',
  levels:{
    L1:[
      {type:'mcq',q:"What does 'adjusting the books' mean?",opts:["Erasing errors in the journal","Making end-of-period entries to correct account balances before financial statements are prepared","Preparing the trial balance","Closing all accounts to zero"],ans:1,exp:"Adjusting the books = recording entries at the END of an accounting period to ensure all account balances are correct and accurate before financial statements are prepared."},
      {type:'mcq',q:"Why are adjusting entries necessary?",opts:["To fix math errors in the trial balance","To follow the matching principle and ensure financial statements are accurate","To prepare the chart of accounts","To record cash transactions that were missed"],ans:1,exp:"Adjustments are necessary to follow the MATCHING PRINCIPLE - ensuring expenses are matched to the period they were incurred and revenue to when it was earned."},
      {type:'mcq',q:"Adjusting entries NEVER involve which account?",opts:["Supplies","Accumulated Depreciation","Cash","Prepaid Insurance"],ans:2,exp:"Adjusting entries NEVER involve Cash. They deal with non-cash corrections - like using up supplies, expiring insurance, or recording depreciation."},
      {type:'mcq',q:"What type of account is Prepaid Insurance?",opts:["Expense - it reduces revenue","Long-term liability","Current asset - represents a future benefit not yet used","Owner's equity"],ans:2,exp:"Prepaid Insurance is a CURRENT ASSET - it was paid in advance and represents future coverage that hasn't been used up yet. As it expires, it becomes Insurance Expense."},
      {type:'mcq',q:"What type of account is Supplies?",opts:["Expense on the income statement","Long-term fixed asset","Current asset on the balance sheet - adjusted at end of period","Liability"],ans:2,exp:"Supplies is a CURRENT ASSET on the balance sheet. At the end of the period, the amount used up becomes Supplies Expense on the income statement."},
      {type:'mcq',q:"Why is the Supplies account allowed to become inaccurate during the period?",opts:["Because supplies aren't important","It is impractical to record an entry every time a single pen or piece of paper is used","Because supplies are a liability","Because the owner tracks supplies personally"],ans:1,exp:"It would be impractical, inconvenient, and time-consuming to record a journal entry every time a small supply item is used. The account is corrected with one adjustment at period end."},
      {type:'mcq',q:"What is depreciation?",opts:["The market value decrease of an asset","The systematic allocation of a fixed asset's cost over the periods it is used","A cash payment to replace equipment","The resale value of an asset"],ans:1,exp:"Depreciation = systematic allocation of a fixed asset's cost over the accounting periods it is used. Also called Capital Cost Allowance (CCA) for tax purposes."},
      {type:'mcq',q:"Which type of asset does NOT depreciate?",opts:["Building","Equipment","Vehicle","Land"],ans:3,exp:"Land does NOT depreciate - it has an unlimited useful life. All other fixed assets (buildings, equipment, vehicles) depreciate over time."},
      {type:'mcq',q:"Depreciation Expense appears on which financial statement?",opts:["Balance Sheet","Owner's Equity section","Income Statement","Trial Balance only"],ans:2,exp:"Depreciation Expense appears on the INCOME STATEMENT - it is an operating expense that reduces net income for the period."},
      {type:'mcq',q:"Accumulated Depreciation appears on which financial statement?",opts:["Income Statement","Owner's Equity statement","Balance Sheet - as a deduction from the fixed asset","Trial Balance only"],ans:2,exp:"Accumulated Depreciation appears on the BALANCE SHEET as a contra account - it is subtracted from the related fixed asset to show the asset's book value."},
      {type:'mcq',q:"What is book value?",opts:["The market selling price of an asset","Original cost minus accumulated depreciation","The replacement cost of an asset","The depreciation expense for one year"],ans:1,exp:"Book Value = Original Cost − Accumulated Depreciation. It is the NET value of the asset on the books - NOT the market value or what it would sell for."},
      {type:'mcq',q:"What is a contra account?",opts:["An account that tracks cash flow","An account with a balance opposite to its related account, used to reduce that account's value","An account for prepaid expenses","An account used only at year end"],ans:1,exp:"A contra account has a balance OPPOSITE to its related account. Example: Accumulated Depreciation is a contra asset - it has a credit balance and reduces the value of the asset it's linked to."},
      {type:'mcq',q:"The straight-line depreciation method distributes depreciation:",opts:["Higher in early years, lower in later years","Based on actual use each year","An equal amount each accounting period","Based on market value changes"],ans:2,exp:"Straight-line method = EQUAL amount each period. Formula: (Cost − Salvage Value) ÷ Useful Life. Simple and consistent."},
      {type:'mcq',q:"What is the declining-balance depreciation method?",opts:["Equal depreciation each year","Depreciation based on a fixed percentage applied to the remaining book value - higher in early years","Depreciation only in the first year","Depreciation based on units produced"],ans:1,exp:"Declining-balance: apply a fixed % to the remaining BOOK VALUE each year. Results in higher depreciation in early years and lower in later years. Required for Canadian income tax (CCA)."},
      {type:'mcq',q:"What is Capital Cost Allowance (CCA)?",opts:["A method for recording prepaid expenses","The CRA's required depreciation method for Canadian income tax purposes","A way to calculate book value","An account on the income statement"],ans:1,exp:"CCA = the specific depreciation method required by the Canada Revenue Agency (CRA) for income tax. It uses the declining-balance method."},
      {type:'mcq',q:"What are temporary accounts?",opts:["Assets and liabilities","Revenue, expense, drawings, and income summary accounts - reset to zero each period","Only the cash account","Assets, liabilities, and owner's capital"],ans:1,exp:"Temporary accounts = Revenue, Expense, Drawings, and Income Summary. They are CLOSED (reset to zero) at the end of each accounting period so they start fresh."},
      {type:'mcq',q:"What are permanent accounts?",opts:["Revenue and expense accounts","Temporary accounts that carry over","Assets, liabilities, and owner's capital - balances carry forward to next period","Only the cash account"],ans:2,exp:"Permanent accounts (also called real accounts) = Assets, Liabilities, and Owner's Capital. Their balances are NOT closed - they carry forward to the next period."},
      {type:'mcq',q:"What is the purpose of closing entries?",opts:["To fix errors in the trial balance","To reset temporary account balances to zero and update owner's capital for the next period","To prepare the opening entry for a new business","To record depreciation"],ans:1,exp:"Closing entries: (1) Reset all temporary accounts (revenue, expenses, drawings) to ZERO for the next period, and (2) Update the Owner's Capital account with the net result."},
      {type:'mcq',q:"What is the Income Summary account?",opts:["A permanent account used for all revenues","A temporary clearing account where revenues and expenses are closed into before transferring to owner's equity","A type of balance sheet account","The same as the income statement"],ans:1,exp:"Income Summary = a temporary clearing account. Revenues are closed into it (credit), expenses are closed into it (debit). The resulting balance (net income or loss) is then closed to Owner's Capital."},
      {type:'mcq',q:"What appears on a post-closing trial balance?",opts:["All accounts including revenues and expenses","Only temporary accounts at zero","Only permanent accounts - assets, liabilities, and owner's capital","All accounts before closing"],ans:2,exp:"The post-closing trial balance contains ONLY permanent accounts (assets, liabilities, owner's capital). Temporary accounts have been closed to zero and don't appear."},
      {type:'match',pairs:[
        {term:"Adjusting entries",def:"End-of-period entries to correct account balances - never involve cash."},

function qMatchesUnit(q, unit) {
  var text = (q.q || '').toLowerCase();
  if (q.type === 'sa') text += ' ' + (q.model || '').toLowerCase();
  return unit.keys.some(function(k) {
    try { return new RegExp(k.toLowerCase()).test(text); } catch(e) { return text.indexOf(k.toLowerCase()) >= 0; }
  });
}

function getAllQuestionsForChapter(chIdx) {
  var ch = CHAPTERS[chIdx];
  var all = [];
  ['L1','L2','L3'].forEach(function(lk){ all = all.concat(ch.levels[lk]); });
  return all;
}

function getUnitQuestions(chIdx, unitIdx) {
  var unit = CHAPTER_UNITS[chIdx][unitIdx];
  var all = getAllQuestionsForChapter(chIdx);
  var filtered = all.filter(function(q){ return qMatchesUnit(q, unit); });
  // fallback: if too few, return all from that level bucket proportionally
  if (filtered.length < 4) filtered = all.slice(0, Math.min(12, all.length));
  return filtered;
}

function shuffle(a){return a.slice().sort(function(){return Math.random()-0.5;});}

function expandMatching(arr){
  var out=[];
  arr.forEach(function(q){
    if(q.type==='match'){
      var pool=shuffle(q.pairs.slice());
      for(var i=0;i<pool.length;i+=4){
        var chunk=pool.slice(i,i+4);
        if(chunk.length>=2) out.push({type:'match',pairs:chunk});
      }
    } else if(q.type==='mcq'){
      // Shuffle answer options so order is different every session
      var indices=shuffle([0,1,2,3].slice(0,q.opts.length));
      var newOpts=indices.map(function(i){return q.opts[i];});
      var newAns=indices.indexOf(q.ans);
      out.push({type:'mcq',q:q.q,opts:newOpts,ans:newAns,exp:q.exp});
    } else {
      out.push(q);
    }
  });
  return shuffle(out);
}

  }).join('');
}

  var path = e.state && e.state.path ? e.state.path : window.location.pathname;

});
function routeFromPath(path){
  var p = path.replace(/\/BAF3M/,'').replace(/\/$/,'') || '/';
  if(p==='/chapters') renderChapterList(true);
  else if(p==='/how-it-works') renderTutorial(true);

  else renderChapters(true);

// ── Question renderer ────────────────────────────────────────────
function renderQuestion(){
  var q=state.questions[state.idx];
  if(q.type==='mcq') renderMCQ(q);
  else if(q.type==='sa') renderSA(q);
  else renderMatch(q);
}

function setBox(html){
  document.getElementById('app').innerHTML='<div class="wrap"><div class="inner">'+html+'</div></div>';
}

function renderMCQ(q){
  var letters=['A','B','C','D'];
  var opts=q.opts.map(function(o,i){
    return '<button class="opt-btn" onclick="checkMCQ('+i+')"><span class="opt-key">'+letters[i]+'</span>'+o+'</button>';
  }).join('');
  setBox('<div class="pop"><div class="ttag ttag-mcq">Multiple Choice</div>'
    +'<div class="qcard" id="card">'
    +'<div class="q-num">Question '+(state.idx+1)+' of '+state.questions.length+'</div>'
    +'<div class="q-body">'+q.q+'</div>'
    +'<div class="opts">'+opts+'</div>'
    +'<div class="fb" id="fb"></div>'
    +'<div class="act-row">'
    +'<button class="btn-skip" onclick="skipQ()">Skip →</button>'
    +'<button class="btn-next" id="btnNext" onclick="nextQ()">Next →</button>'
    +'</div></div></div>');
}

function checkMCQ(chosen){
  var card=document.getElementById('card');
  if(card.dataset.done)return;
  card.dataset.done='1';
  var q=state.questions[state.idx];
  var opts=card.querySelectorAll('.opt');
  opts.forEach(function(o){o.setAttribute('disabled','');});
  document.getElementById('btnNext').style.display='block';
  card.querySelector('.btn-skip').style.display='none';
  var fb=document.getElementById('fb');
  if(chosen===q.ans){
    opts[chosen].classList.add('ans-ok');
    card.classList.add('c-ok');
    fb.className='fb fb-ok show';
    fb.innerHTML='<strong>&#10003; Correct!</strong> '+q.exp;
    state.correct++;
  } else {
    opts[chosen].classList.add('ans-no');
    opts[q.ans].classList.add('ans-ok');
    card.classList.add('c-no');
    fb.className='fb fb-no show';
    fb.innerHTML='<strong>&#10007; Incorrect.</strong> The right answer is <strong>'+['A','B','C','D'][q.ans]+': '+q.opts[q.ans]+'</strong>.<br><br>'+q.exp;
    state.wrong++;
  }
  updateTopStats();
}

function renderMatch(q){
  var pairs=q.pairs;
  var shuffled=shuffle(pairs.map(function(p){return Object.assign({},p);}));
  var numToTerm={};
  shuffled.forEach(function(p,i){numToTerm[i+1]=p.term;});

  var termRows=pairs.map(function(p,i){
    return '<div class="match-row"><div class="match-term-box" id="mt-'+i+'">'
      +'<div class="m-badge">'+String.fromCharCode(65+i)+'</div>'
      +'<span style="flex:1">'+p.term+'</span>'
      +'<input class="m-box" id="mi-'+i+'" maxlength="2" placeholder="?"/>'
      +'</div></div>';
  }).join('');

  var defItems=shuffled.map(function(p,i){
    return '<div class="match-def-box"><strong style="color:var(--accent);font-family:\'DM Mono\',monospace;margin-right:5px">'+(i+1)+'.</strong>'+p.def+'</div>';
  }).join('');

  var em=encodeURIComponent(JSON.stringify(numToTerm));
  setBox('<div class="pop"><div class="ttag ttag-match">Matching</div>'
    +'<div class="qcard" id="card">'
    +'<div class="q-num">Question '+(state.idx+1)+' of '+state.questions.length+'</div>'
    +'<div class="q-text">Match each term to its definition - write the number in the box.</div>'
    +'<div class="m-grid">'
    +'<div><div class="match-col-lbl">Terms</div>'+termRows+'</div>'
    +'<div><div class="match-col-lbl">Definitions</div>'+defItems+'</div>'
    +'</div>'
    +'<div class="fb" id="fb"></div>'
    +'<div class="act-row">'
    +'<button class="btn-skip" onclick="skipQ()">Skip →</button>'
    +'<button class="btn-reveal" id="btnReveal" onclick="checkMatch(\''+em+'\','+pairs.length+')">Check Answers</button>'
    +'<button class="btn-next" id="btnNext" onclick="nextQ()" style="display:none">Next →</button>'
    +'</div></div></div>');
}

function checkMatch(em,pairCount){
  var card=document.getElementById('card');
  if(card.dataset.done)return;
  card.dataset.done='1';
  var numToTerm=JSON.parse(decodeURIComponent(em));
  document.getElementById('btnReveal').style.display='none';
  document.getElementById('btnNext').style.display='block';
  card.querySelector('.btn-skip').style.display='none';
  var q=state.questions[state.idx];
  var got=0; var keyParts=[];
  q.pairs.forEach(function(p,i){
    var inp=document.getElementById('mi-'+i);
    var termEl=document.getElementById('mt-'+i);
    var val=parseInt(inp.value.trim());
    inp.disabled=true;
    var cn=Object.keys(numToTerm).find(function(k){return numToTerm[k]===p.term;});
    keyParts.push(String.fromCharCode(65+i)+'&#8594;'+cn);
    if(numToTerm[val]===p.term){termEl.classList.add('m-correct');inp.style.color='var(--green)';got++;}
    else{termEl.classList.add('m-wrong');inp.style.color='var(--red)';}
  });
  var fb=document.getElementById('fb');
  var pct=got/pairCount;
  fb.className='feedback '+(pct>=0.7?'fb-correct':'fb-wrong')+' show';
  fb.innerHTML='You matched <strong>'+got+'/'+pairCount+'</strong> correctly.<br><span style="font-size:12px;opacity:.85;font-family:\'DM Mono\',monospace">Key: '+keyParts.join('  ')+'</span>';
  if(pct>=0.7)state.correct+=got; else state.wrong+=(pairCount-got);
  updateTopStats();
}

function skipQ(){
  var card=document.getElementById('card');
  if(card.dataset.done)return;
  card.dataset.done='1';
  var q=state.questions[state.idx];
  card.classList.add('c-skip');
  state.skipped.push({num:state.idx+1,q:q.q||'Matching block'});
  var fb=document.getElementById('fb');
  fb.className='fb fb-skip show';
  if(q.type==='mcq'){
    fb.innerHTML='<strong>Skipped.</strong> Correct: <strong>'+['A','B','C','D'][q.ans]+': '+q.opts[q.ans]+'</strong>.<br>'+q.exp;
  } else {
    fb.innerHTML='<strong>Skipped.</strong> Review your notes on this topic.';
  }
  card.querySelector('.btn-skip').style.display='none';
  document.getElementById('btnNext').style.display='block';
  var bc=document.getElementById('btnReveal'); if(bc)bc.style.display='none';
  var sa=document.getElementById('saInput'); if(sa)sa.disabled=true;
}

function nextQ(){
  state.idx++;
  if(state.idx>=state.questions.length){showComplete();return;}
  updateTopStats();
  renderQuestion();
}

// ── Level complete ────────────────────────────────────────────────
function showComplete(){
  setSubProg(100);
  var ch=CHAPTERS[state.chIdx];
  var attempted=state.correct+state.wrong;
  var pct=attempted>0?Math.round(state.correct/attempted*100):0;
  var grade='';
  if(pct>=90)grade='Excellent work!';
  else if(pct>=80)grade='Great job!';
  else if(pct>=70)grade='Good effort';
  else if(pct>=60)grade='Almost there';
  else grade='Keep studying - you\'ve got this!';

  // Determine icon/color/title for this mode
  var modeIcon='📗', modeColor='#4cbe8c', modeTitle='';
  if(state.level==='ALL'){modeIcon='📚';modeColor='#e06b9a';modeTitle='Chapter Review Complete!';}
  else if(state.level==='UNIT'){
    modeIcon='📄';modeColor='#f0a94a';
    var uname=CHAPTER_UNITS[state.chIdx][state.unitIdx].name;
    modeTitle=uname+' Complete!';
  } else {
    var m=LEVEL_META[state.level];
    modeIcon=m.icon;modeColor=m.bar;modeTitle=m.name+' Complete!';
  }

  // Next level button (only for L1→L2→L3 progression)
  var nextLvl=state.level==='L1'?'L2':state.level==='L2'?'L3':null;

  var skippedHtml='';
  if(state.skipped.length){
    skippedHtml='<div class="skip-log"><div class="skip-log-head">⚠ Skipped ('+state.skipped.length+')</h3>'
      +state.skipped.map(function(s){return '<div class="skipped-item"><strong>Q'+s.num+'</strong>'+s.q+'</div>';}).join('')+'</div>';
  }

  // Retry button based on mode
  var retryBtn='';
  if(state.level==='ALL') retryBtn='<button class="btn-outline" onclick="startChapterReview()">&#8635; Retry</button>';
  else if(state.level==='UNIT') retryBtn='<button class="btn-outline" onclick="startUnitReview('+state.unitIdx+')">&#8635; Retry</button>';
  else retryBtn='<button class="btn-outline" onclick="startLevel(\''+state.level+'\')">&#8635; Retry</button>';

  setBox('<div class="pop done">'
    +'<div class="done-ring" style="border:2px solid '+modeColor+';background:rgba(255,255,255,.04)">'+modeIcon+'</div>'
    +'<div class="done-title" style="color:'+modeColor+'">'+modeTitle+'</div>'
    +'<div class="complete-sub">\'+grade+\' You scored <strong>'+pct+'%</strong> on attempted questions.</div>'
    +'<div class="done-grid">'
    +'<div class="done-stat"><div class="done-n" style="color:var(--green)">'+state.correct+'</div><div class="lc-stat-l">Correct</div></div>'
    +'<div class="done-stat"><div class="done-n" style="color:var(--red)">'+state.wrong+'</div><div class="lc-stat-l">Incorrect</div></div>'
    +'<div class="done-stat"><div class="done-n" style="color:var(--amber)">'+state.skipped.length+'</div><div class="lc-stat-l">Skipped</div></div>'
    +'<div class="done-stat"><div class="done-n" style="color:'+modeColor+'">'+pct+'%</div><div class="lc-stat-l">Score</div></div>'
    +'</div>'
    +skippedHtml
    +'<div class="done-btns">'
    +retryBtn
    +(nextLvl?'<button class="btn-fill" onclick="startLevel(\''+nextLvl+'\')">'+LEVEL_META[nextLvl].name+' &#8594;</button>':'')
    +'<button class="btn-outline" onclick="goLevels()">All Modes</button>'
    +'<button class="btn-outline" onclick="goChapters()">All Chapters</button>'
    +'</div>'
    +'</div>');
}

// ── Boot ─────────────────────────────────────────────────────────
var BASE = window.location.pathname.indexOf('/BAF3M') === 0 ? '/BAF3M' : '';

// Handle GitHub Pages 404 redirect
(function(){
  var redirect = sessionStorage.getItem('spa-redirect');
  if(redirect){
    sessionStorage.removeItem('spa-redirect');
    try{ history.replaceState({path:redirect}, '', redirect); }catch(e){}
  }
})();

routeFromPath(window.location.pathname);
</script>
