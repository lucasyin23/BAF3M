      {type:'mcq',q:"Which of the following is NOT a step in the posting process?",opts:["Locate the account in the ledger","Record the date","Prepare the adjusting entries","Calculate the new balance"],ans:2,exp:"Preparing adjusting entries is a separate end-of-period step - it is NOT one of the six posting steps. The six posting steps involve transferring journal entries to ledger accounts."},
      {type:'mcq',q:"Which of the following is NOT a reason why posting references are important?",opts:["They prevent double-posting","They cross-reference the journal and ledger","They replace the need for a journal","They help locate transactions during an audit"],ans:2,exp:"Posting references do NOT replace the journal - the journal is still essential as the book of original entry. PRs simply cross-reference between the journal and ledger."},
      {type:'mcq',q:"Which of the following does NOT belong in the Income Statement section of the worksheet?",opts:["Rent Expense","Service Revenue","Wages Expense","Accounts Receivable"],ans:3,exp:"Accounts Receivable is a CURRENT ASSET - it belongs in the Balance Sheet section, not the Income Statement section. Only revenue and expense accounts go in the Income Statement section."},
      {type:'mcq',q:"Which of the following is NOT a permanent account?",opts:["Cash","Accounts Payable","Owner's Capital","Service Revenue"],ans:3,exp:"Service Revenue is a TEMPORARY account - it is closed to zero at the end of each period. Cash, Accounts Payable, and Owner's Capital are all permanent accounts whose balances carry forward."},
      {type:'mcq',q:"Which of the following accounts is NOT closed at the end of the accounting period?",opts:["Service Revenue","Rent Expense","Owner's Drawings","Accounts Payable"],ans:3,exp:"Accounts Payable is a PERMANENT account (liability) - it is never closed. Revenue, expense, and drawings are all temporary accounts that are closed to zero at period end."},
      {type:'mcq',q:"Which of the following is NOT a temporary account?",opts:["Wages Expense","Owner's Drawings","Income Summary","Land"],ans:3,exp:"Land is a PERMANENT asset account - its balance carries forward each period. Wages Expense, Owner's Drawings, and Income Summary are all temporary accounts that are closed at period end."},
      {type:'mcq',q:"Which of the following does NOT depreciate?",opts:["Building","Delivery Truck","Equipment","Land"],ans:3,exp:"Land does NOT depreciate - it has an unlimited useful life and its value does not systematically decrease over time. Buildings, vehicles, and equipment all depreciate."},
      {type:'mcq',q:"Which of the following is NOT a step in the closing process?",opts:["Close revenue accounts to Income Summary","Close expense accounts to Income Summary","Close Prepaid Insurance to Income Summary","Close Drawings to Owner's Capital"],ans:2,exp:"Prepaid Insurance is a PERMANENT current asset - it is never closed. Only temporary accounts (revenues, expenses, drawings, and Income Summary) are closed at period end."},
      {type:'mcq',q:"Which of the following is NOT recorded in the Adjustments columns of the 8-column worksheet?",opts:["Expiration of prepaid insurance","Depreciation of equipment","Supplies used during the period","Payment of a cash sale"],ans:3,exp:"Payment of a cash sale is a regular business transaction recorded in the journal during the period - NOT an end-of-period adjusting entry. Adjustments correct prepaid accounts, supplies, and depreciation."},
      {type:'mcq',q:"Which of the following is NOT one of the three steps to determine a T-account balance?",opts:["Add the debit side","Add the credit side","Subtract the smaller total from the larger","Record a new journal entry"],ans:3,exp:"Recording a new journal entry has nothing to do with finding an existing T-account balance. The three steps are: (1) Add the debit side, (2) Add the credit side, (3) Subtract smaller from larger and write balance on the larger side."},
      {type:'mcq',q:"Which of the following is NOT an example of a current liability?",opts:["Accounts Payable","Bank Loan due within one year","Mortgage Payable (25 years)","HST/taxes payable"],ans:2,exp:"Mortgage Payable (25 years) is a LONG-TERM liability - it is not due within one year. Accounts Payable, a short-term bank loan, and taxes payable are all current liabilities due within one year."},
      {type:'mcq',q:"Which of the following is NOT true about a balanced trial balance?",opts:["Total debits equal total credits","It proves the ledger is mathematically accurate","It guarantees all transactions were recorded to the correct accounts","It is prepared before the financial statements"],ans:2,exp:"A balanced trial balance does NOT guarantee correctness - only mathematical accuracy. You could debit the wrong account and the trial balance would still balance. It only confirms that debits = credits."},
      {type:'match',pairs:[
        {term:"IFRS",def:"International standard requiring fair value; used by public companies."},
        {term:"ASPE",def:"Canadian standard using cost principle; used by private companies."},
        {term:"IASB",def:"International body that creates IFRS, based in London."},
        {term:"AcSB",def:"Canadian body that sets domestic accounting standards."},
        {term:"Cost Principle",def:"Record assets at actual purchase price, not market value."},
        {term:"Fair Value",def:"Record assets at current market value (IFRS method)."},
        {term:"Business Entity Principle",def:"Keep personal and business finances completely separate."},
        {term:"Net Worth",def:"Assets minus liabilities - the owner's residual value."},
        {term:"Liquidity",def:"How quickly an asset can be converted into cash."},
        {term:"Accounting Period",def:"The length of time covered by a set of financial statements."},
        {term:"Bookkeeping",def:"The recording step - preparing day-to-day financial data."},
        {term:"Accounts Payable",def:"Short-term liability owed to suppliers, due in ~30 days."},
      ]},
      {type:'sa',q:"A business has $95,000 in assets and $38,000 in liabilities. Calculate owner's equity AND explain what this number means.",model:"Owner's Equity = Assets − Liabilities = $95,000 − $38,000 = $57,000.\nThis means the owner has a $57,000 financial stake - if all assets were sold and all debts paid, the owner would receive $57,000."},
      {type:'sa',q:"Explain the difference between the Cost Principle (ASPE) and Fair Value (IFRS). Why might a private company prefer ASPE?",model:"Cost Principle (ASPE): assets stay at their actual purchase cost (less depreciation). Objective and consistent.\nFair Value (IFRS): assets updated to current market value - more accurate but requires expensive revaluations.\nA private company prefers ASPE because it's simpler and cheaper - no need to hire appraisers regularly."},
    ],
    L3:[
      {type:'mcq',q:"An owner deposits $5,000 personal savings into the business account. Under the Business Entity Principle, this:",opts:["Is not recorded - personal money cannot enter the business","Increases Cash (asset) and Owner's Equity by $5,000","Increases Cash and Bank Loan by $5,000","Increases Owner's Equity only"],ans:1,exp:"Once personal money enters the business it becomes a business transaction. Cash up $5,000 and Owner's Equity up $5,000. Both sides grow equally."},
      {type:'mcq',q:"A clinic buys $3,000 of supplies on credit. The correct balance sheet effect is:",opts:["Supplies up $3,000; Cash down $3,000","Supplies up $3,000; Accounts Payable up $3,000","Only Assets increase - equation unbalanced","Owner's Equity decreases $3,000"],ans:1,exp:"Supplies (asset) up $3,000 AND Accounts Payable (liability) up $3,000. Both sides grow equally - ALOE stays balanced."},
      {type:'mcq',q:"A business pays off $2,000 of Accounts Payable with cash. The effect is:",opts:["Assets decrease $2,000; Liabilities decrease $2,000; Equity unchanged","Only Liabilities decrease $2,000","Cash increases; Accounts Payable decreases","Equity decreases $2,000"],ans:0,exp:"Cash (asset) down $2,000 AND Accounts Payable (liability) down $2,000. Both sides shrink equally - Owner's Equity unaffected."},
      {type:'mcq',q:"Assets = $200,000. Liabilities = $80,000. Owner withdraws $10,000 cash. Owner's equity after withdrawal:",opts:["$120,000","$110,000","$130,000","$90,000"],ans:1,exp:"Before: Equity = $200,000 − $80,000 = $120,000. Withdrawal reduces Cash AND Owner's Equity by $10,000. New equity = $110,000."},
      {type:'mcq',q:"A public company reports its building at $2.1M (market value) though it cost $1.4M. This follows:",opts:["ASPE cost principle","IFRS fair value principle","Business Entity Principle","Neither standard"],ans:1,exp:"IFRS fair value principle - assets recorded at current market value. Under ASPE it would remain at $1.4M minus depreciation."},
      {type:'mcq',q:"Why does the balance sheet ALWAYS balance after every transaction?",opts:["Government requires it","Every transaction is an exchange - both sides change equally","Assets always equal liabilities","Accountants double-check"],ans:1,exp:"Every transaction is an EXCHANGE - something given equals something received. Both sides of ALOE change by equal amounts, so the equation always holds."},
      {type:'mcq',q:"An accountant knows the company inflated asset values but says nothing. Which control failed?",opts:["The Law","Business ethics","ASPE (wrong standard used)","Liquidity ordering rules"],ans:1,exp:"Business ethics failed - the accountant had a moral duty to report the dishonesty. Professional standards (CPA code) also likely failed."},
      {type:'mcq',q:"Company uses ASPE, bought land for $250,000 in 2015, now worth $400,000. Balance sheet shows land at:",opts:["$400,000","$325,000","$250,000","Owner decides yearly"],ans:2,exp:"ASPE cost principle: land stays at original cost = $250,000. Market value increase is NOT recorded under ASPE."},
      {type:'mcq',q:"Preya's clinic balance sheet should include:",opts:["Clinic assets AND her investment property","Only clinic-related assets and liabilities","Investment property as non-current asset","Investment property mortgage as clinic liability"],ans:1,exp:"Business Entity Principle: ONLY clinic items appear on the clinic's balance sheet. Investment property is personal - belongs on her personal statement."},
      {type:'match',pairs:[
        {term:"ALOE equation",def:"Assets − Liabilities = Owner's Equity - must always balance."},
        {term:"Cost Principle (ASPE)",def:"Record assets at purchase price; value doesn't update with market."},
        {term:"Fair Value (IFRS)",def:"Update asset values to current market price each period."},
        {term:"Business Entity Principle",def:"Personal and business finances always kept completely separate."},
        {term:"Double underline",def:"Signals the final grand total on a financial statement."},
        {term:"Conflict of Interest",def:"Personal gain that could improperly influence professional decisions."},
        {term:"Accounts Payable",def:"Short-term liability - owed to suppliers, due ~30 days."},
        {term:"Owner's Equity",def:"Residual interest in assets after all liabilities are paid."},
        {term:"Single ruled line",def:"Indicates addition or subtraction of a column of numbers."},
        {term:"Public company",def:"Shares listed on stock exchange; must use IFRS."},
        {term:"Private company",def:"No public shares; may use ASPE or IFRS."},
        {term:"Creditor",def:"Person or business that your business owes money to."},
      ]},
      {type:'sa',q:"A business has: Cash $12,000 | Accounts Receivable $8,000 | Supplies $1,500 | Equipment $25,000 | Land $60,000 | Accounts Payable $5,500 | Bank Loan $18,000. (a) Calculate total assets, liabilities, and owner's equity. (b) List assets in correct balance sheet order.",model:"(a) Total Assets = $12,000+$8,000+$1,500+$25,000+$60,000 = $106,500\nTotal Liabilities = $5,500+$18,000 = $23,500\nOwner's Equity = $106,500−$23,500 = $83,000\n\n(b) Current Assets (liquidity order): Cash → Accounts Receivable → Supplies\nNon-Current Assets (useful life): Land → Equipment\nLiabilities (maturity): Accounts Payable → Bank Loan"},
      {type:'sa',q:"Explain why the balance sheet equation ALWAYS stays balanced. Use one specific example.",model:"Every transaction is an EXCHANGE - something given equals something received, so both sides of ALOE change equally.\n\nExample: Business buys a $5,000 computer with cash.\n• Cash (asset) decreases $5,000\n• Computer/Equipment (asset) increases $5,000\n• Net effect on assets: zero change; liabilities and equity unchanged.\n• Equation: still balanced. ✓"},
    ]
  }
},
{
  id:'C2',
  title:'Recording Transactions in T-Accounts',
  units:'Unit 3',
  color:'#4cbe8c', bg:'rgba(76,190,140,0.12)',
  levels:{
    L1:[
      {type:'mcq',q:"TRUE or FALSE: The debit side of a T-account is always the RIGHT side.",opts:["True","False"],ans:1,exp:"False. Debit is always the LEFT side. Credit is the right side."},
      {type:'mcq',q:"TRUE or FALSE: Assets increase on the debit (left) side.",opts:["True","False"],ans:0,exp:"True. Assets increase on the DEBIT side - same side as where they sit on the balance sheet equation."},
      {type:'mcq',q:"TRUE or FALSE: A balanced trial balance proves all transactions were recorded to the correct accounts.",opts:["True","False"],ans:1,exp:"False. It only proves mathematical accuracy. Entries to wrong accounts still balance."},
      {type:'mcq',q:"TRUE or FALSE: In double-entry accounting, every transaction must have equal debits and credits.",opts:["True","False"],ans:0,exp:"True. For every debit there must be an equal credit - this is the foundation of the system."},
      {type:'mcq',q:"TRUE or FALSE: The general ledger is a collection of all T-accounts used by the business.",opts:["True","False"],ans:0,exp:"True. The general ledger contains one T-account for every item the business tracks."},
      {type:'mcq',q:"TRUE or FALSE: Opening balances in T-accounts come from the previous income statement.",opts:["True","False"],ans:1,exp:"False. Opening balances come from the previous BALANCE SHEET."},
      {type:'mcq',q:"TRUE or FALSE: Owner's Capital increases on the debit side.",opts:["True","False"],ans:1,exp:"False. Owner's Capital is equity - it increases on the CREDIT side."},
      {type:'mcq',q:"Which account would NOT have a credit balance?",opts:["Accounts Payable","Bank Loan","Owner's Capital","Delivery Truck"],ans:3,exp:"Delivery Truck is an ASSET - assets have DEBIT balances, not credit balances."},
      {type:'mcq',q:"What is a T-account used for?",opts:["Filing tax returns","Recording, organizing, and summarizing changes in financial items","Calculating net income","Preparing a payroll"],ans:1,exp:"A T-account is a visual tool used to record, organize, and summarize all changes for a single financial item (like Cash or Accounts Payable)."},
      {type:'mcq',q:"What is the 'debit' side of a T-account?",opts:["The right side","The bottom","The left side","The top"],ans:2,exp:"Debit is always the LEFT side of a T-account. Credit is always the right. These are just labels for which side - not good or bad."},
      {type:'mcq',q:"What is the 'credit' side of a T-account?",opts:["The left side","The right side","The bottom","The middle"],ans:1,exp:"Credit is always the RIGHT side of a T-account. Debit = left, Credit = right. Simple as that."},
      {type:'mcq',q:"For an asset account, a debit means:",opts:["A decrease","An increase","No change","It depends on the asset"],ans:1,exp:"Assets increase on the DEBIT (left) side and decrease on the CREDIT (right) side. Remember: assets live on the left of the balance sheet → debit = increase."},
      {type:'mcq',q:"For a liability account, a credit means:",opts:["A decrease","No change","An increase","It depends"],ans:2,exp:"Liabilities increase on the CREDIT (right) side and decrease on the debit side. Liabilities live on the right of the balance sheet → credit = increase."},
      {type:'mcq',q:"For an owner's equity account, an increase is recorded on the:",opts:["Debit (left) side","Credit (right) side","Either side","Neither side"],ans:1,exp:"Owner's Equity increases on the CREDIT (right) side - same rule as liabilities. Decreases go on the debit side."},
      {type:'mcq',q:"Where is the opening balance for a Cash account recorded?",opts:["Credit side","Either side","Debit side","It has no opening balance"],ans:2,exp:"Cash is an asset. Assets open on the DEBIT (left) side because that's the side that represents increases for assets."},
      {type:'mcq',q:"Where is the opening balance for Accounts Payable recorded?",opts:["Debit side","Credit side","Either side","No opening balance needed"],ans:1,exp:"Accounts Payable is a liability. Liabilities open on the CREDIT (right) side."},
      {type:'mcq',q:"What is a ledger?",opts:["A single T-account for cash","A group of ALL T-accounts used by a business","The trial balance","The income statement"],ans:1,exp:"A ledger (specifically, the General Ledger) is the complete collection of ALL T-accounts used by the business - organized in one place."},
      {type:'mcq',q:"What is double-entry accounting?",opts:["Recording each transaction twice in the same account","Every transaction affects at least two accounts - total debits must equal total credits","Using two separate ledgers","Checking every transaction twice for errors"],ans:1,exp:"Double-entry: every transaction affects AT LEAST two accounts. Total debits MUST equal total credits. This keeps the ledger balanced."},
      {type:'mcq',q:"What is a trial balance?",opts:["A test run of the business","A list of all ledger accounts and their balances, verifying debits = credits","A summary of revenues and expenses","A type of T-account"],ans:1,exp:"A trial balance lists all ledger account balances to verify that total debits = total credits - confirming mathematical accuracy."},
      {type:'mcq',q:"On which side does the balance of an asset account sit?",opts:["Credit (right) side","Debit (left) side","Neither - it floats","Both sides equally"],ans:1,exp:"Assets have a DEBIT balance - they increase on the debit side, so their final balance sits on the left."},
      {type:'mcq',q:"On which side does the balance of a liability account sit?",opts:["Debit (left) side","Credit (right) side","Neither","Both sides"],ans:1,exp:"Liabilities have a CREDIT balance - they increase on the credit side, so their balance sits on the right."},
      {type:'mcq',q:"What does a balanced trial balance tell you?",opts:["The business is profitable","There are no errors at all","Total debits equal total credits - the ledger is mathematically correct","All transactions are recorded correctly"],ans:2,exp:"A balanced trial balance means total debits = total credits - mathematical accuracy. It does NOT guarantee all transactions were recorded to the correct accounts."},
      {type:'mcq',q:"The opening balances in T-accounts come from:",opts:["Last month's income statement","The previous period's balance sheet","The trial balance","The owner's personal records"],ans:1,exp:"Opening balances in T-accounts come from the PREVIOUS BALANCE SHEET - this is step 1 of the accounting cycle."},
      {type:'mcq',q:"How many T-accounts does a business have in its ledger?",opts:["Exactly 10","One for every item tracked by the business","Two - assets and liabilities","One per employee"],ans:1,exp:"The ledger has one T-account for every item the business tracks - one for Cash, one for Equipment, one for Accounts Payable, etc."},
      {type:'mcq',q:"A Delivery Truck account opening balance is on the:",opts:["Credit side","Debit side","Either side","The truck has no balance"],ans:1,exp:"A Delivery Truck is an asset → assets open on the DEBIT side."},
      {type:'mcq',q:"Bank Loan opening balance is on the:",opts:["Debit side","Credit side","Neither side","Both sides"],ans:1,exp:"Bank Loan is a liability → liabilities open on the CREDIT side."},
      {type:'mcq',q:"Owner, Capital opening balance is on the:",opts:["Debit side","Credit side","Either side","No opening balance"],ans:1,exp:"Owner, Capital is an equity account → equity opens on the CREDIT side (same as liabilities)."},
      {type:'mcq',q:"What are the three steps to determine a T-account balance?",opts:["List, sort, total","Add each side, subtract smaller from larger, write balance on the larger side","Debit, credit, balance","Record, review, report"],ans:1,exp:"3 steps: (1) Add the debit side total. (2) Add the credit side total. (3) Subtract smaller from larger - write the balance on the side with the larger total."},
      {type:'match',pairs:[
        {term:"T-account",def:"Visual 'T' shaped tool used to record changes for one financial item."},
        {term:"Debit",def:"The left side of a T-account."},
        {term:"Credit",def:"The right side of a T-account."},
        {term:"Ledger",def:"The complete collection of all T-accounts used by a business."},
        {term:"Double-entry accounting",def:"Every transaction affects at least two accounts; debits must equal credits."},
        {term:"Trial balance",def:"List of all accounts and balances verifying total debits = total credits."},
        {term:"Opening balance",def:"The starting amount in an account from the previous balance sheet."},
        {term:"Asset debit rule",def:"Assets increase on the debit (left) side."},
        {term:"Liability credit rule",def:"Liabilities increase on the credit (right) side."},
        {term:"General Ledger",def:"The organized group of all T-accounts for a business."},
        {term:"Account",def:"An individual record that tracks all changes for one item (e.g. Cash)."},
        {term:"Owner's Equity balance",def:"Sits on the credit side - equity increases with credits."},
      ]},
      {type:'sa',q:"What is the debit/credit rule for assets, liabilities, and owner's equity? State which side means increase and which means decrease for each.",model:"Assets: Debit (left) = INCREASE, Credit (right) = DECREASE\nLiabilities: Debit (left) = DECREASE, Credit (right) = INCREASE\nOwner's Equity: Debit (left) = DECREASE, Credit (right) = INCREASE\n\nMemory tip: Assets live on the LEFT of the balance sheet → debit = increase. Liabilities and Equity live on the RIGHT → credit = increase."},
      {type:'mcq',q:"What is Step 1 of determining a T-account balance?",opts:["Subtract the smaller side from the larger","Write the balance on the larger side","Add all amounts on the debit side","Record a new transaction"],ans:2,exp:"Step 1: Add all the amounts on the DEBIT side to get the debit total."},
      {type:'mcq',q:"What is Step 2 of determining a T-account balance?",opts:["Write the balance on the larger side","Add all amounts on the credit side","Subtract smaller from larger","Open a new T-account"],ans:1,exp:"Step 2: Add all the amounts on the CREDIT side to get the credit total."},
      {type:'mcq',q:"What is Step 3 (the final step) of determining a T-account balance?",opts:["Add both sides together","Start a new account","Subtract the smaller total from the larger; write the balance on the side with the larger total","Record the balance as a credit always"],ans:2,exp:"Step 3: Subtract the smaller total from the larger - the difference is the account balance. Write it on the side with the LARGER total (debit side for assets, credit side for liabilities/equity)."},
      {type:'mcq',q:"In the accounting cycle, which step comes FIRST?",opts:["Prepare the trial balance","Record transactions in T-accounts","Transfer opening balances from the balance sheet into the ledger","Prepare the new balance sheet"],ans:2,exp:"Step 1 of the accounting cycle: transfer the OPENING BALANCES from the previous balance sheet into the T-accounts in the ledger. This sets the starting point for the new period."},
      {type:'mcq',q:"In the accounting cycle, what happens AFTER recording transactions in T-accounts?",opts:["Prepare the income statement","Determine the T-account balances","Prepare the trial balance","Close all accounts"],ans:1,exp:"After recording transactions in T-accounts, Step 4 is to DETERMINE the T-account balances (add each side, subtract, write balance on larger side) before preparing the trial balance."},
      {type:'mcq',q:"What is the LAST step of the accounting cycle covered in Unit 3?",opts:["Record transactions in the ledger","Prepare the trial balance","Prepare the new balance sheet","Determine T-account balances"],ans:2,exp:"The last step is to prepare the NEW BALANCE SHEET using the verified balances from the trial balance. The full cycle: Opening Balance Sheet → Ledger → T-accounts → Balances → Trial Balance → New Balance Sheet."},
      {type:'sa',q:"Explain double-entry accounting and why it keeps the ledger balanced.",model:"Double-entry accounting means every transaction affects at least two accounts - one is debited and one is credited for equal amounts.\nThis keeps the ledger balanced because for every debit there is an equal credit. The total of all debits always equals the total of all credits, which mirrors the balance sheet equation (Assets = Liabilities + Owner's Equity)."},
    ],
    L2:[
      {type:'mcq',q:"A business receives $500 cash from a customer. Which accounts are affected?",opts:["Cash debit $500; Accounts Payable credit $500","Cash debit $500; Owner's Equity credit $500","Cash credit $500; Revenue debit $500","Accounts Receivable debit $500; Cash credit $500"],ans:1,exp:"Cash (asset) increases → DEBIT Cash $500. Revenue increases Owner's Equity → CREDIT Owner's Equity $500. Total debits = credits. ✓"},
      {type:'mcq',q:"A business pays $300 cash to a supplier. Which accounts are affected?",opts:["Cash debit $300; Accounts Payable debit $300","Accounts Payable debit $300; Cash credit $300","Cash debit $300; Revenue credit $300","Accounts Payable credit $300; Cash credit $300"],ans:1,exp:"Accounts Payable (liability) decreases → DEBIT Accounts Payable $300. Cash (asset) decreases → CREDIT Cash $300."},
      {type:'mcq',q:"A business buys $1,000 equipment on credit. What is the journal entry?",opts:["Equipment debit $1,000; Cash credit $1,000","Equipment debit $1,000; Accounts Payable credit $1,000","Accounts Payable debit $1,000; Equipment credit $1,000","Cash debit $1,000; Equipment credit $1,000"],ans:1,exp:"Equipment (asset) increases → DEBIT Equipment $1,000. Accounts Payable (liability) increases → CREDIT Accounts Payable $1,000."},
      {type:'mcq',q:"A Cash T-account has $8,000 on the debit side and $3,200 on the credit side. The balance is:",opts:["$11,200 credit","$4,800 debit","$4,800 credit","$3,200 debit"],ans:1,exp:"$8,000 (debit) − $3,200 (credit) = $4,800. Balance sits on the debit side (larger side). Cash always has a debit balance."},
      {type:'mcq',q:"An Accounts Payable T-account has $400 debit and $1,500 credit. The balance is:",opts:["$1,100 debit","$1,100 credit","$1,900 credit","$400 debit"],ans:1,exp:"$1,500 − $400 = $1,100. Balance sits on the credit side (larger side). Liabilities normally have a credit balance."},
      {type:'mcq',q:"A business receives a $2,000 bank loan. The entry is:",opts:["Bank Loan debit $2,000; Cash debit $2,000","Cash debit $2,000; Bank Loan credit $2,000","Cash credit $2,000; Bank Loan debit $2,000","Bank Loan debit $2,000; Owner's Equity credit $2,000"],ans:1,exp:"Cash (asset) increases → DEBIT Cash $2,000. Bank Loan (liability) increases → CREDIT Bank Loan $2,000."},
      {type:'mcq',q:"Which of the following would cause the trial balance to NOT balance?",opts:["Recording a debit to Cash and credit to Equipment","Forgetting to record one side of a transaction entirely","Recording the correct amounts in wrong accounts","Recording a transaction twice"],ans:1,exp:"Forgetting one side of a transaction leaves debits ≠ credits → trial balance won't balance. Wrong accounts still balance; double entries offset each other."},
      {type:'mcq',q:"A trial balance balances. What does this confirm?",opts:["All transactions were recorded correctly","Every account is correct","Total debits = total credits - mathematical accuracy only","The balance sheet will also balance"],ans:2,exp:"A balanced trial balance only confirms MATHEMATICAL accuracy - total debits = total credits. It does NOT mean all transactions were recorded to the right accounts."},
      {type:'mcq',q:"The accounting cycle order is:",opts:["Trial Balance → T-accounts → Balance Sheet","Balance Sheet → Ledger → T-accounts → Trial Balance → New Balance Sheet","Income Statement → Trial Balance → Ledger","Transactions → Balance Sheet → Ledger"],ans:1,exp:"Cycle: (1) Opening Balance Sheet → (2) Ledger → (3) Record in T-accounts → (4) Determine balances → (5) Trial Balance → (6) New Balance Sheet."},
      {type:'mcq',q:"When is a T-account balance recorded on the credit side?",opts:["When the account is an asset","When the credit total is larger than the debit total","Always for every account","When the business is profitable"],ans:1,exp:"The balance is written on whichever side has the LARGER total. For liabilities and equity, this is normally the credit side."},
      {type:'mcq',q:"Which of the following would appear on the DEBIT side of a trial balance?",opts:["Accounts Payable","Bank Loan","Mortgage Payable","Accounts Receivable"],ans:3,exp:"Accounts Receivable is an asset → debit balance → appears in the debit column of the trial balance. All liabilities have credit balances."},
      {type:'mcq',q:"A business pays $600 rent. What is the entry?",opts:["Rent Expense debit $600; Cash debit $600","Cash debit $600; Rent Expense credit $600","Rent Expense debit $600; Cash credit $600","Accounts Payable debit $600; Rent Expense credit $600"],ans:2,exp:"Rent Expense (expense/decreases equity) → DEBIT Rent Expense $600. Cash (asset decreases) → CREDIT Cash $600."},
      {type:'mcq',q:"'Understated' means an amount is recorded as:",opts:["Too high","Too low","Correct","On the wrong side"],ans:1,exp:"Understated = recorded too LOW (below the correct amount). Overstated = recorded too HIGH."},
      {type:'mcq',q:"Double-entry accounting ensures:",opts:["The business is profitable","Debits always equal credits; the ledger stays balanced","Transactions are approved","Assets are at fair value"],ans:1,exp:"Double-entry ensures total debits = total credits for every transaction, keeping the ledger (and balance sheet equation) balanced."},
      {type:'mcq',q:"Opening balances are entered in T-accounts on which side?",opts:["Always the debit side","Always the credit side","The side that represents an increase for that account type","The opposite side from increases"],ans:2,exp:"Opening balances go on the INCREASE side - debit for assets, credit for liabilities and equity. This matches the balance sheet they came from."},
      {type:'match',pairs:[
        {term:"Debit an asset",def:"Records an increase in an asset account."},
        {term:"Credit an asset",def:"Records a decrease in an asset account."},
        {term:"Debit a liability",def:"Records a decrease in a liability account."},
        {term:"Credit a liability",def:"Records an increase in a liability account."},
        {term:"Trial balance",def:"Verifies total debits = total credits after all transactions."},
        {term:"Understated",def:"An amount recorded as too low."},
        {term:"Overstated",def:"An amount recorded as too high."},
        {term:"General Ledger",def:"Organized group of all T-accounts for a business."},
        {term:"Double-entry",def:"Every transaction: at least one debit and one equal credit."},
        {term:"Account balance",def:"The difference between totals on each side of a T-account."},
        {term:"Opening balance",def:"Starting amount carried forward from the previous balance sheet."},
        {term:"Accounting cycle",def:"The step-by-step process from opening balance sheet to new balance sheet."},
      ]},
      {type:'sa',q:"Describe the three steps used to determine the balance of a T-account. Give an example using a Cash account with $9,000 debit and $3,500 credit.",model:"Step 1: Add the debit side total → $9,000\nStep 2: Add the credit side total → $3,500\nStep 3: Subtract smaller from larger ($9,000 − $3,500 = $5,500) and write the balance on the LARGER side.\nResult: Cash has a debit balance of $5,500. (Cash is an asset → always a debit balance, as expected.)"},
      {type:'sa',q:"A business completes these transactions: (1) Owner invests $10,000 cash. (2) Buys supplies for $800 cash. (3) Receives $2,000 cash from a client. Show the T-accounts for Cash after all three and calculate the final balance.",model:"Cash T-Account:\nDEBIT side: $10,000 (owner investment) + $2,000 (client payment) = $12,000\nCREDIT side: $800 (supplies purchase) = $800\n\nBalance: $12,000 − $800 = $11,200 DEBIT\n\n(Cash always has a debit balance - it's an asset.)"},
    ],
    L3:[
      {type:'mcq',q:"A business collects $1,200 from a customer who owed it money (Accounts Receivable). The entry is:",opts:["Cash debit $1,200; Revenue credit $1,200","Cash debit $1,200; Accounts Receivable credit $1,200","Accounts Receivable debit $1,200; Cash credit $1,200","Cash debit $1,200; Accounts Payable credit $1,200"],ans:1,exp:"Cash (asset) increases → DEBIT Cash $1,200. Accounts Receivable (asset) decreases (the debt is now paid) → CREDIT Accounts Receivable $1,200. One asset up, one asset down."},
      {type:'mcq',q:"A business owner withdraws $500 cash for personal use. The entry is:",opts:["Cash credit $500; Owner's Equity credit $500","Owner's Drawings debit $500; Cash credit $500","Cash debit $500; Owner's Equity debit $500","Accounts Payable debit $500; Cash credit $500"],ans:1,exp:"Owner's Drawings (reduces equity) → DEBIT $500. Cash (asset decreases) → CREDIT $500. Drawings always debit because they reduce the owner's equity."},
      {type:'mcq',q:"After posting all transactions, the trial balance does NOT balance. The MOST likely cause is:",opts:["A transaction was recorded in the wrong accounts","The accountant used ASPE instead of IFRS","One side of a transaction was omitted or posted with the wrong amount","The balance sheet equation is wrong"],ans:2,exp:"The trial balance only fails to balance when the total debit amount ≠ total credit amount. This happens when a side is omitted or amounts don't match. Wrong accounts still balance each other."},
      {type:'mcq',q:"A Cash account starts at $5,000. Transactions: receive $3,000 cash; pay $1,500 cash; pay $800 cash. Final balance:",opts:["$5,700 debit","$5,700 credit","$8,000 debit","$3,300 debit"],ans:0,exp:"Debit side: $5,000 (opening) + $3,000 = $8,000. Credit side: $1,500 + $800 = $2,300. Balance = $8,000 − $2,300 = $5,700 DEBIT."},
      {type:'mcq',q:"An Accounts Payable account opens at $2,000. Business pays off $800 and purchases $500 more on credit. Final balance:",opts:["$1,700 credit","$2,800 credit","$1,200 debit","$1,700 debit"],ans:0,exp:"Opening credit: $2,000. New credit: $500. Total credit = $2,500. Debit: $800. Balance = $2,500 − $800 = $1,700 CREDIT (liability, as expected)."},
      {type:'mcq',q:"A trial balance shows $45,000 total debits and $42,000 total credits. This means:",opts:["The business made a $3,000 profit","Everything is fine - small differences are normal","There is a $3,000 error that must be found and corrected","Assets exceed liabilities by $3,000"],ans:2,exp:"A trial balance MUST balance exactly. A $3,000 difference means an error exists - either a transaction was recorded wrong, a side was omitted, or amounts were transposed."},
      {type:'mcq',q:"Which statement about a balanced trial balance is TRUE?",opts:["It guarantees all transactions are correct","It confirms mathematical accuracy - debits = credits - but not that accounts are correct","It means the business is profitable","It replaces the balance sheet"],ans:1,exp:"A balanced trial balance ONLY confirms math accuracy. You could debit the wrong account (e.g., Equipment instead of Supplies) and the trial balance would still balance - but the records would be wrong."},
      {type:'mcq',q:"A business has Land $80,000; Equipment $25,000; Cash $6,000; Bank Loan $30,000; Accounts Payable $4,000; Owner's Capital $77,000. Which column do Bank Loan and Accounts Payable go in on a trial balance?",opts:["Debit column","Credit column","Either column","They don't appear on trial balance"],ans:1,exp:"Bank Loan and Accounts Payable are liabilities → credit balances → they appear in the CREDIT column of the trial balance."},
      {type:'mcq',q:"'Overstated' vs 'Understated' - a rent expense of $1,200 is accidentally recorded as $2,100. This means the expense is:",opts:["Understated by $900","Overstated by $900","Correct","Understated by $2,100"],ans:1,exp:"The recorded amount ($2,100) is HIGHER than the actual amount ($1,200). The difference is $2,100 − $1,200 = $900 overstated."},
      {type:'match',pairs:[
        {term:"Debit Cash",def:"Records an INCREASE in the Cash asset account."},
        {term:"Credit Accounts Payable",def:"Records an INCREASE in a liability (more owed to suppliers)."},
        {term:"Debit Accounts Receivable",def:"Records an INCREASE in money owed TO the business."},
        {term:"Credit Cash",def:"Records a DECREASE in the Cash asset account."},
        {term:"Debit Owner's Drawings",def:"Reduces owner's equity (owner withdrew cash or assets)."},
        {term:"Balanced trial balance",def:"Total debits = total credits - confirms mathematical accuracy only."},
        {term:"Understated",def:"An amount recorded lower than it should be."},
        {term:"Overstated",def:"An amount recorded higher than it should be."},
        {term:"Accounting cycle step 5",def:"Prepare the trial balance to verify the ledger."},
        {term:"Opening balance source",def:"Previous period's balance sheet."},
        {term:"Debit a liability",def:"Records a DECREASE in a liability (less owed)."},
        {term:"Account balance side",def:"The side (debit or credit) with the larger total."},
      ]},
      {type:'sa',q:"A business has these T-account balances: Cash $14,000 Dr | Accounts Receivable $6,000 Dr | Supplies $900 Dr | Equipment $30,000 Dr | Accounts Payable $8,000 Cr | Bank Loan $12,000 Cr | Owner's Capital $30,900 Cr. (a) Prepare a trial balance. (b) Does it balance? Show your work.",model:"Trial Balance:\nDEBIT column: Cash $14,000 + A/R $6,000 + Supplies $900 + Equipment $30,000 = $50,900\nCREDIT column: Accounts Payable $8,000 + Bank Loan $12,000 + Owner's Capital $30,900 = $50,900\n\n(b) YES - the trial balance balances. Total debits = Total credits = $50,900. ✓"},
      {type:'sa',q:"Explain the difference between what a balanced trial balance proves and what it does NOT prove. Give an example of an error it would NOT catch.",model:"A balanced trial balance PROVES: total debits = total credits - mathematical accuracy.\n\nIt does NOT prove: all transactions were recorded to the correct accounts.\n\nExample of error it won't catch: A $500 office supplies purchase is accidentally debited to Equipment instead of Supplies. Both Equipment and Supplies are assets on the debit side - the trial balance still balances, but Equipment is overstated and Supplies is understated by $500."},
    ]
  }
},
{
  id:'C3',
  title:'The Income Statement & Revenue and Expense Accounts',
  units:'Units 4 & 5',
  color:'#f0a94a', bg:'rgba(240,169,74,0.12)',
  levels:{
    L1:[
      {type:'mcq',q:"TRUE or FALSE: Revenue increases owner's equity.",opts:["True","False"],ans:0,exp:"True. Revenue earned increases the owner's share of the business."},
      {type:'mcq',q:"TRUE or FALSE: Expenses decrease owner's equity.",opts:["True","False"],ans:0,exp:"True. Expenses reduce profit, which reduces the owner's equity."},
      {type:'mcq',q:"TRUE or FALSE: Net income occurs when expenses exceed revenues.",opts:["True","False"],ans:1,exp:"False. Net income = revenues exceed expenses. When expenses exceed revenues, it is a NET LOSS."},
      {type:'mcq',q:"TRUE or FALSE: The income statement covers a specific period of time.",opts:["True","False"],ans:0,exp:"True. The income statement shows revenues and expenses FOR A PERIOD (e.g., 'For the Month Ended...')."},
      {type:'mcq',q:"TRUE or FALSE: Cash-basis accounting records revenue only when cash is received.",opts:["True","False"],ans:0,exp:"True. Under cash-basis, revenue is recognized when cash is received, not when earned."},
      {type:'mcq',q:"TRUE or FALSE: The matching principle means expenses are recorded in the same period as related revenues.",opts:["True","False"],ans:0,exp:"True. Matching pairs revenues and the expenses incurred to earn them in the same accounting period."},
      {type:'mcq',q:"TRUE or FALSE: A fiscal year must always run January 1 to December 31.",opts:["True","False"],ans:1,exp:"False. A fiscal year is any 12-month period chosen by the business - it does not need to match the calendar year."},
      {type:'mcq',q:"Which of the following does NOT appear on an income statement?",opts:["Service Revenue","Wages Expense","Rent Expense","Cash"],ans:3,exp:"Cash is a current ASSET on the balance sheet. The income statement only shows revenues and expenses."},
      {type:'mcq',q:"What is an income statement?",opts:["A list of all asset and liability balances","A report showing revenue, expenses, and net income or loss for a period","A record of all cash transactions","A statement showing owner's equity only"],ans:1,exp:"The income statement shows revenues, expenses, and the resulting net income or net loss for a specific accounting period - it's the profitability report."},
      {type:'mcq',q:"What is revenue?",opts:["Money the business owes","Costs paid to run the business","Money earned from selling goods or services","The owner's personal income"],ans:2,exp:"Revenue = money earned (or promised) from selling goods or providing services during normal business operations."},
      {type:'mcq',q:"What is an expense?",opts:["Money earned from sales","A debt owed to a supplier","Costs incurred by a business to earn revenue","The owner's drawings"],ans:2,exp:"Expenses = costs of items or services incurred by a business in order to earn revenue (e.g., rent, wages, supplies used)."},
      {type:'mcq',q:"Net income occurs when:",opts:["Expenses exceed revenue","Revenue equals expenses","Revenue exceeds expenses","The owner makes a withdrawal"],ans:2,exp:"Net Income = Revenue − Expenses when Revenue > Expenses. The business earned more than it spent."},
      {type:'mcq',q:"Net loss occurs when:",opts:["Revenue exceeds expenses","Expenses exceed revenue","Cash is withdrawn","Assets decrease"],ans:1,exp:"Net Loss = Revenue − Expenses when Expenses > Revenue. The business spent more than it earned."},
      {type:'mcq',q:"Revenue affects owner's equity by:",opts:["Decreasing it","Having no effect","Increasing it","Replacing it"],ans:2,exp:"Revenue INCREASES owner's equity - earning money grows the owner's stake in the business."},
      {type:'mcq',q:"Expenses affect owner's equity by:",opts:["Increasing it","Having no effect","Decreasing it","Doubling it"],ans:2,exp:"Expenses DECREASE owner's equity - costs reduce the owner's stake in the business."},
      {type:'mcq',q:"Revenue is recorded on which side of its T-account?",opts:["Debit (left) side to increase","Credit (right) side to increase","Either side","Neither side"],ans:1,exp:"Revenue increases owner's equity, and equity increases on the CREDIT side. So revenue is recorded as a credit to increase."},
      {type:'mcq',q:"Expenses are recorded on which side of their T-account?",opts:["Credit (right) side to increase","Debit (left) side to increase","Either side","Neither side"],ans:1,exp:"Expenses decrease owner's equity, and equity decreases on the DEBIT side. So expenses are recorded as a debit to increase."},
      {type:'mcq',q:"What is the heading of an income statement?",opts:["Business name only","Business name, 'Income Statement', and the time period covered","Date only","Business name and total revenue"],ans:1,exp:"The three-part heading: (1) Business name, (2) 'Income Statement', (3) The time period covered (e.g., 'For the Month Ended January 31')."},
      {type:'mcq',q:"What are the two main sections of the income statement body?",opts:["Assets and Liabilities","Revenue and Expenses","Debits and Credits","Cash and Non-Cash"],ans:1,exp:"The body of the income statement has two main sections: Revenue (what was earned) and Expenses (what was spent to earn it)."},
      {type:'mcq',q:"What is owner's drawings?",opts:["A business expense","Revenue earned by the owner","The owner withdrawing assets for personal use","A type of liability"],ans:2,exp:"Owner's Drawings = when the owner takes assets (usually cash) from the business for personal use. It reduces owner's equity but is NOT an expense."},
      {type:'mcq',q:"Why are drawings NOT considered an expense?",opts:["Because they are too small","Because they are not used to generate revenue for the business","Because they increase equity","Because they are recorded as liabilities"],ans:1,exp:"Drawings are NOT expenses because they are withdrawals of the owner's own investment - not costs incurred to generate business revenue."},
      {type:'mcq',q:"On which financial statement does drawings appear?",opts:["Income Statement","Trial Balance only","Balance Sheet (Owner's Equity section)","Revenue section of Income Statement"],ans:2,exp:"Drawings appear ONLY in the Owner's Equity section of the Balance Sheet. They are NEVER on the income statement."},
      {type:'mcq',q:"Which financial statement is prepared first?",opts:["Balance Sheet","Trial Balance","Income Statement","Owner's Equity statement"],ans:2,exp:"The Income Statement is prepared FIRST because its net income/loss is needed to complete the owner's equity section of the balance sheet."},
      {type:'mcq',q:"What is a report form balance sheet?",opts:["A balance sheet with only assets","Assets listed on the left, liabilities on the right","Assets listed vertically, then liabilities, then owner's equity - no left/right split","A balance sheet with no equity section"],ans:2,exp:"Report form balance sheet = vertical layout. Assets are listed first, then liabilities, then owner's equity below - all stacked vertically (no account form left/right)."},
      {type:'mcq',q:"The time-period principle states:",opts:["All businesses must use a calendar year","The same length of time must be used for each accounting period for comparison","Transactions must be recorded immediately","Revenue is recognized when earned"],ans:1,exp:"Time-Period Principle: use the SAME length of accounting period consistently so financial statements can be accurately compared year over year."},
      {type:'mcq',q:"An accounting period is:",opts:["Always exactly one year","The specific time frame covered by financial statements (month, quarter, or year)","The time between two transactions","The due date of liabilities"],ans:1,exp:"Accounting period = the specific time frame (month, quarter, fiscal year) covered by a set of financial statements."},
      {type:'mcq',q:"If the owner pays themselves a salary, it is recorded as:",opts:["Salaries Expense","Revenue","Owner's Drawings","Accounts Payable"],ans:2,exp:"Owner's salary is recorded as Owner's Drawings - NOT as Salaries Expense. The owner is not an employee of their own business for accounting purposes."},
      {type:'mcq',q:"Net income formula is:",opts:["Assets − Liabilities","Revenue + Expenses","Revenue − Expenses (when Revenue > Expenses)","Expenses − Revenue"],ans:2,exp:"Net Income = Revenue − Expenses, but ONLY when Revenue > Expenses. If Expenses > Revenue, the result is a Net Loss."},
      {type:'match',pairs:[
        {term:"Revenue",def:"Money earned from selling goods or services."},
        {term:"Expense",def:"Cost incurred to earn revenue during the accounting period."},
        {term:"Net Income",def:"Revenue minus expenses when revenue is greater."},
        {term:"Net Loss",def:"Revenue minus expenses when expenses are greater."},
        {term:"Income Statement",def:"Financial report showing revenue, expenses, and net income/loss for a period."},
        {term:"Owner's Drawings",def:"Owner withdrawing assets for personal use - reduces equity, not an expense."},
        {term:"Accounting Period",def:"The specific time frame covered by financial statements."},
        {term:"Time-Period Principle",def:"The same length of time must be used for each accounting period."},
        {term:"Revenue account",def:"Increases owner's equity - recorded on the credit side."},
        {term:"Expense account",def:"Decreases owner's equity - recorded on the debit side."},
        {term:"Report Form Balance Sheet",def:"Vertical layout: assets on top, then liabilities, then equity."},
        {term:"Profit",def:"An increase in owner's equity from successful business operations."},
      ]},
      {type:'sa',q:"Define net income and net loss. Write the formula for each and explain when each occurs.",model:"Net Income = Revenue − Expenses → occurs when Revenue > Expenses (business earned more than it spent).\nNet Loss = Revenue − Expenses → occurs when Expenses > Revenue (business spent more than it earned).\n\nBoth use the same formula; the result determines which one it is."},
      {type:'sa',q:"What is the difference between owner's drawings and an expense? Why doesn't the owner's salary count as an expense?",model:"An expense is a cost incurred to generate revenue (e.g., rent, wages to employees).\nOwner's drawings is the owner withdrawing their own investment from the business - it is NOT used to generate revenue.\n\nThe owner's salary is recorded as drawings (not Salaries Expense) because the owner is not considered an employee - they are withdrawing part of their equity."},
    ],
    L2:[
      {type:'mcq',q:"TRUE or FALSE: Owner's Drawings are an expense on the income statement.",opts:["True","False"],ans:1,exp:"False. Drawings are NOT an expense - they are a reduction of owner's equity shown on the statement of owner's equity."},
      {type:'mcq',q:"TRUE or FALSE: Drawings decrease owner's equity.",opts:["True","False"],ans:0,exp:"True. When an owner withdraws assets for personal use, it reduces their equity in the business."},
      {type:'mcq',q:"TRUE or FALSE: Revenue accounts are increased by credits.",opts:["True","False"],ans:0,exp:"True. Revenue increases on the CREDIT side - same side as owner's equity."},
      {type:'mcq',q:"TRUE or FALSE: Expense accounts are increased by debits.",opts:["True","False"],ans:0,exp:"True. Expense accounts increase on the DEBIT side, similar to asset accounts."},
      {type:'mcq',q:"TRUE or FALSE: The report form balance sheet lists liabilities before assets.",opts:["True","False"],ans:1,exp:"False. The report form lists ASSETS first, then liabilities and owner's equity below."},
      {type:'mcq',q:"Which of the following does NOT affect owner's equity?",opts:["Revenue earned","Expenses paid","Drawings taken","Paying a liability with cash"],ans:3,exp:"Paying a liability with cash reduces both Cash (asset) and the liability - owner's equity is unchanged. Revenue, expenses, and drawings all affect equity."},
      {type:'mcq',q:"A business earns $8,500 revenue and incurs $6,200 expenses. The result is:",opts:["Net loss of $2,300","Net income of $2,300","Net income of $14,700","Net loss of $6,200"],ans:1,exp:"Net Income = Revenue − Expenses = $8,500 − $6,200 = $2,300. Revenue > Expenses, so it's a net income."},
      {type:'mcq',q:"A business has $12,000 expenses and $9,500 revenue. The result is:",opts:["Net income of $2,500","Net loss of $9,500","Net loss of $2,500","Net income of $21,500"],ans:2,exp:"Revenue − Expenses = $9,500 − $12,000 = −$2,500. Expenses > Revenue → Net Loss of $2,500."},
      {type:'mcq',q:"The revenue recognition principle states:",opts:["Revenue is recorded only when cash is received","Revenue is recorded when it is earned, even if cash hasn't arrived yet","Revenue is recorded at year end only","Revenue is recorded when the invoice is sent"],ans:1,exp:"Revenue Recognition Principle: record revenue WHEN EARNED - even if the customer hasn't paid yet. Service performed or goods shipped = revenue earned."},
      {type:'mcq',q:"The matching principle requires:",opts:["Matching cash received to cash paid","Expenses matched with the revenue they help generate in the same period","Matching assets to liabilities","Matching debits to credits"],ans:1,exp:"Matching Principle: expenses must be matched with the revenue they help generate in the SAME accounting period - not when cash is paid."},
      {type:'mcq',q:"Accrual basis of accounting records:",opts:["Revenue only when cash is received; expenses only when cash is paid","Revenue when earned and expenses when incurred - regardless of cash flow","Only cash transactions","Revenue at year end regardless of when earned"],ans:1,exp:"Accrual basis: record revenue when earned + expenses when incurred. Cash timing does NOT matter. This gives an accurate picture of profitability."},
      {type:'mcq',q:"Cash basis of accounting records:",opts:["Revenue when earned and expenses when incurred","Revenue when cash is received and expenses when cash is paid","Revenue only; no expenses","Expenses only; no revenue"],ans:1,exp:"Cash basis: record revenue ONLY when cash received, expenses ONLY when cash paid. Does NOT match revenue to expenses - gives inaccurate profitability."},
      {type:'mcq',q:"Which accounting basis do professional accountants use?",opts:["Cash basis","Accrual basis","Either - it doesn't matter","Only cash basis for small businesses"],ans:1,exp:"Accountants use ACCRUAL basis - it follows the matching and revenue recognition principles, giving an accurate picture of profitability."},
      {type:'mcq',q:"A business provides $3,000 in services but hasn't received payment yet. Under accrual basis:",opts:["Do not record until cash arrives","Record $3,000 revenue now - it's been earned","Wait until the invoice is paid","Record as a liability"],ans:1,exp:"Accrual basis: revenue is recorded WHEN EARNED. The service was performed → $3,000 revenue is recorded now, even without cash."},
      {type:'mcq',q:"The correct order for preparing financial statements is:",opts:["Balance Sheet → Income Statement → Trial Balance","Trial Balance → Balance Sheet → Income Statement","Trial Balance → Income Statement → Balance Sheet","Income Statement → Trial Balance → Balance Sheet"],ans:2,exp:"Correct order: Trial Balance → Income Statement → Balance Sheet. The income statement must come before the balance sheet because net income/loss updates owner's equity."},
      {type:'mcq',q:"How does net income affect owner's equity on the balance sheet?",opts:["It has no effect","It decreases owner's equity","It is added to owner's equity (increases capital)","It replaces the opening capital"],ans:2,exp:"Net income is ADDED to owner's equity. Net loss is subtracted. Owner's equity = Opening Capital + Net Income − Drawings."},
      {type:'mcq',q:"How does net loss affect owner's equity?",opts:["It increases owner's equity","It is subtracted from owner's equity (decreases capital)","It has no effect","It eliminates the drawings"],ans:1,exp:"Net loss is SUBTRACTED from owner's equity. A loss reduces the owner's stake in the business."},
      {type:'mcq',q:"The formula for updating owner's equity is:",opts:["Opening Capital + Revenue − Expenses","Opening Capital + Net Income − Drawings","Opening Capital − Liabilities","Net Income + Drawings"],ans:1,exp:"New Capital = Opening Capital + Net Income − Drawings. Always add net income (or subtract net loss), always subtract drawings."},
      {type:'mcq',q:"A business has Opening Capital $50,000, Net Income $8,000, Drawings $3,000. New Capital is:",opts:["$55,000","$61,000","$39,000","$58,000"],ans:0,exp:"New Capital = $50,000 + $8,000 − $3,000 = $55,000."},
      {type:'mcq',q:"Which accounts appear on the income statement?",opts:["Assets and Liabilities","Revenue and Expense accounts","Owner's Equity and Cash","Drawings and Capital"],ans:1,exp:"The income statement shows only REVENUE and EXPENSE accounts - and the resulting net income or net loss."},
      {type:'mcq',q:"Where do revenue and expense accounts ultimately go?",opts:["Stay on the income statement forever","Their net effect (net income/loss) flows into Owner's Equity on the balance sheet","They go directly to the trial balance","They become liabilities"],ans:1,exp:"Revenue and expense accounts are on the income statement, but net income/loss flows into Owner's Equity - updating the capital account on the balance sheet."},
      {type:'mcq',q:"Why are separate revenue and expense accounts kept instead of one equity account?",opts:["It's a legal requirement","Managers need detailed info - which revenues are strongest, which expenses are rising","It's easier to calculate","Government requires separate accounts"],ans:1,exp:"Separate accounts give managers DETAILED information: which revenue sources perform best, which expenses are increasing - enabling better decisions."},
      {type:'mcq',q:"A bill received for electricity used this month should be recorded:",opts:["Only when the bill is paid","This month - when the expense was incurred (matching principle)","At year end","When the electricity was turned on"],ans:1,exp:"Matching Principle + Accrual basis: record the expense when INCURRED (this month), not when paid. A bill/invoice is proof the expense occurred."},
      {type:'match',pairs:[
        {term:"Accrual basis",def:"Record revenue when earned and expenses when incurred - regardless of cash."},
        {term:"Cash basis",def:"Record revenue only when cash received; expenses only when cash paid."},
        {term:"Revenue recognition principle",def:"Revenue is recorded when it is earned, even if cash hasn't arrived."},
        {term:"Matching principle",def:"Match expenses to the revenue they generate in the same period."},
        {term:"Time-period principle",def:"Use the same length of accounting period for consistent comparison."},
        {term:"Net income effect",def:"Added to owner's equity - increases capital."},
        {term:"Net loss effect",def:"Subtracted from owner's equity - decreases capital."},
        {term:"Drawings effect",def:"Always subtracted from owner's equity - not an expense."},
        {term:"Income statement order",def:"Prepared after trial balance, before balance sheet."},
        {term:"Owner's Drawings account",def:"Equity account with a debit balance - reduces capital."},
        {term:"New Capital formula",def:"Opening Capital + Net Income − Drawings."},
        {term:"Report form balance sheet",def:"Vertical layout: assets, then liabilities, then owner's equity."},
      ]},
      {type:'sa',q:"Explain the difference between accrual basis and cash basis of accounting. Which do accountants use and why?",model:"Accrual basis: record revenue when EARNED and expenses when INCURRED - regardless of when cash changes hands. Follows the matching and revenue recognition principles.\nCash basis: record revenue only when cash is RECEIVED and expenses only when cash is PAID. Does NOT match revenue to expenses.\n\nAccountants use ACCRUAL basis because it gives an accurate picture of profitability for the period - showing what was earned and spent, not just what was received and paid."},
      {type:'sa',q:"A business has Opening Capital of $45,000, earns $12,000 net income, and the owner withdraws $4,000. Calculate the new capital and show your work.",model:"New Capital = Opening Capital + Net Income − Drawings\nNew Capital = $45,000 + $12,000 − $4,000\nNew Capital = $53,000\n\nThe business grew by $8,000 net (net income of $12,000 minus drawings of $4,000)."},
    ],
    L3:[
      {type:'mcq',q:"A business performs $5,000 of services in January but collects payment in February. Under accrual basis, revenue is recorded in:",opts:["February - when cash is received","January - when the service was earned","Either month","Not recorded until payment is confirmed"],ans:1,exp:"Accrual basis: revenue is recorded when EARNED. The service was performed in January → record $5,000 revenue in January regardless of when payment arrives."},
      {type:'mcq',q:"A business pays $6,000 rent in January covering February and March. Under matching principle, how is this handled?",opts:["All $6,000 expensed in January when paid","$3,000 per month - matched to February and March when the benefit is used","$6,000 as an asset in January","$2,000 per month over three months"],ans:1,exp:"Matching Principle: expenses must match the period they benefit. The rent covers Feb and March → $3,000 per month expensed in each of those months, not when paid."},
      {type:'mcq',q:"Opening Capital $60,000. Net Loss $7,000. Drawings $2,500. New Capital is:",opts:["$64,500","$50,500","$54,500","$69,500"],ans:1,exp:"New Capital = $60,000 − $7,000 (net loss is subtracted) − $2,500 = $50,500. Both net loss AND drawings reduce capital."},
      {type:'mcq',q:"A business has Revenue $18,000 and Expenses $18,000. Owner's equity:",opts:["Increases by $18,000","Decreases by $18,000","Is unchanged - net income is $0","Equals $18,000"],ans:2,exp:"Net Income = $18,000 − $18,000 = $0. No profit, no loss. Owner's equity is unchanged by operations (though drawings would still reduce it)."},
      {type:'mcq',q:"Which of the following would NOT appear on an income statement?",opts:["Rent Expense","Service Revenue","Owner's Drawings","Advertising Expense"],ans:2,exp:"Drawings NEVER appear on the income statement. They appear only in the Owner's Equity section of the balance sheet. The income statement only shows revenue and expense accounts."},
      {type:'mcq',q:"A business receives $2,000 cash in advance for services not yet performed. Under accrual basis:",opts:["Record $2,000 revenue immediately","Record $2,000 as a liability (unearned revenue) until the service is performed","Record as owner's equity","Ignore it until services are done"],ans:1,exp:"Revenue Recognition: revenue is recorded WHEN EARNED. If the service hasn't been performed yet, the cash received is unearned - it's a liability until the work is done."},
      {type:'mcq',q:"Why must the income statement be prepared before the balance sheet?",opts:["It's easier to prepare first","Net income/loss from the income statement is needed to update owner's equity on the balance sheet","The balance sheet depends on revenue accounts","Trial balance comes after balance sheet"],ans:1,exp:"Net income (or loss) from the income statement is ADDED TO (or subtracted from) owner's equity. Without it, the equity section of the balance sheet is incomplete."},
      {type:'mcq',q:"Revenue $22,000 | Rent Expense $4,000 | Wages Expense $9,500 | Supplies Expense $1,200 | Opening Capital $40,000 | Drawings $3,000. New Capital is:",opts:["$44,300","$37,000","$47,300","$54,300"],ans:0,exp:"Net Income = $22,000 − ($4,000+$9,500+$1,200) = $22,000 − $14,700 = $7,300.\nNew Capital = $40,000 + $7,300 − $3,000 = $44,300."},
      {type:'mcq',q:"Which best explains why cost of goods sold is NOT treated as a regular expense account?",opts:["It's too large to be an expense","Cost of goods sold is a direct cost of the product sold - it's categorized separately from operating expenses","It appears on the balance sheet","It reduces revenue directly"],ans:1,exp:"Cost of Goods Sold (COGS) is a direct cost tied to products sold - it's listed separately from operating expenses on the income statement because it directly reduces gross profit."},
      {type:'mcq',q:"A business records rent paid in advance as an expense immediately. This violates:",opts:["Business Entity Principle","Revenue Recognition Principle","Matching Principle - the expense should be spread over the periods it benefits","Time-Period Principle"],ans:2,exp:"Matching Principle: expenses must be matched to the periods they benefit. Recording rent in advance as an immediate expense overstates current expenses and understates future periods."},
      {type:'match',pairs:[
        {term:"Revenue recognition principle",def:"Record revenue when earned - not when cash arrives."},
        {term:"Matching principle",def:"Expenses matched to the revenue and period they help generate."},
        {term:"Accrual basis",def:"Revenue when earned + expenses when incurred - regardless of cash timing."},
        {term:"Net income adds to equity",def:"Opening Capital + Net Income − Drawings = New Capital."},
        {term:"Net loss subtracts from equity",def:"Opening Capital − Net Loss − Drawings = New Capital."},
        {term:"Drawings - income statement",def:"Never appears on the income statement."},
        {term:"Unearned revenue",def:"Cash received before the service is performed - recorded as a liability."},
        {term:"Cost of goods sold",def:"Direct product cost - listed separately from operating expenses, not a regular expense account."},
        {term:"Cash basis weakness",def:"Does not match revenue with expenses - gives inaccurate profitability."},
        {term:"Income statement prepared",def:"After trial balance and before balance sheet."},
        {term:"Profit definition",def:"An increase in owner's equity from successful business operations."},
        {term:"Loss definition",def:"A decrease in owner's equity when expenses exceed revenue."},
      ]},
      {type:'sa',q:"A business has: Service Revenue $28,000 | Rent Expense $6,000 | Wages Expense $14,000 | Supplies Expense $1,800 | Opening Capital $55,000 | Drawings $5,000. Prepare the income statement result and the owner's equity section.",model:"Income Statement:\nRevenue: Service Revenue $28,000\nExpenses: Rent $6,000 + Wages $14,000 + Supplies $1,800 = $21,800\nNet Income = $28,000 − $21,800 = $6,200\n\nOwner's Equity Section:\nOpening Capital:         $55,000\nAdd: Net Income:         $6,200\n                         $61,200\nLess: Drawings:          $5,000\nNew Capital:             $56,200"},
      {type:'sa',q:"Explain why a business might prefer the accrual basis over the cash basis, using the revenue recognition and matching principles in your answer.",model:"Accrual basis records revenue when EARNED (revenue recognition principle) and expenses when INCURRED (matching principle) - regardless of cash timing. This ensures revenues and expenses for the same period are compared against each other, giving an accurate picture of profitability.\n\nCash basis distorts results: a business might receive payment late (understating one period's revenue) or pay expenses early (overstating expenses in another period). This makes it impossible to accurately judge how profitable the business really was in any given period."},
    ]
  }
},
{
  id:'C4',
  title:'The Journal, Posting to the Ledger & Source Documents',
  units:'Units 6, 7 & 8',
  color:'#e06b9a', bg:'rgba(224,107,154,0.12)',
  levels:{
    L1:[
      {type:'mcq',q:"TRUE or FALSE: A journal records transactions in chronological (date) order.",opts:["True","False"],ans:0,exp:"True. The general journal records all transactions in the order they occur."},
      {type:'mcq',q:"TRUE or FALSE: The credited account in a journal entry is written flush against the left margin.",opts:["True","False"],ans:1,exp:"False. The DEBITED account is at the left margin. The credited account is INDENTED."},
      {type:'mcq',q:"TRUE or FALSE: A journal entry must always have exactly one debit and one credit.",opts:["True","False"],ans:1,exp:"False. Compound entries can have multiple debits or credits - as long as total debits equal total credits."},
      {type:'mcq',q:"TRUE or FALSE: The explanation in a journal entry should include cheque or invoice numbers.",opts:["True","False"],ans:0,exp:"True. Including these numbers creates an audit trail linking the entry to the source document."},
      {type:'mcq',q:"TRUE or FALSE: The journal is called the book of original entry.",opts:["True","False"],ans:0,exp:"True. Transactions are FIRST recorded in the journal, making it the book of original entry."},
      {type:'mcq',q:"Which is NOT an advantage of using a journal?",opts:["Chronological record","Full transaction in one place","Automatically posts to ledger","Reduces recording errors"],ans:2,exp:"A journal does NOT automatically post to the ledger - that is a separate manual step."},
      {type:'mcq',q:"What is a journal?",opts:["A list of all account balances","A chronological record of all business transactions","A type of T-account","The same as a balance sheet"],ans:1,exp:"A journal is a chronological record of transactions - it's called the 'book of original entry' because transactions are recorded here FIRST before being transferred anywhere else."},
      {type:'mcq',q:"Why is a journal called the 'book of original entry'?",opts:["Because it is the oldest accounting book","Because transactions are recorded in the journal FIRST, before the ledger","Because it records assets only","Because it contains the chart of accounts"],ans:1,exp:"Transactions are recorded in the journal FIRST - it is the original source of every entry before it is posted to the ledger."},
      {type:'mcq',q:"What is journalizing?",opts:["Transferring entries from ledger to journal","The process of recording transactions in a journal","Preparing a trial balance","Listing all account balances"],ans:1,exp:"Journalizing = the process of recording transactions in a journal. Each recorded transaction is called a journal entry."},
      {type:'mcq',q:"What is a journal entry?",opts:["A list of all ledger accounts","One transaction recorded in the journal - date, accounts debited/credited, amounts, and explanation","A type of trial balance","A summary of monthly revenue"],ans:1,exp:"A journal entry = one transaction recorded in the journal. It includes: date, account(s) debited, account(s) credited (indented), amounts, and an explanation."},
      {type:'mcq',q:"Which part of a journal entry is indented?",opts:["The date","The debit account","The credit account","The explanation"],ans:2,exp:"The CREDIT account is always indented in a journal entry to visually distinguish it from the debit account."},
      {type:'mcq',q:"What are the four parts of a journal entry?",opts:["Date, account name, balance, signature","Date, debit account+amount, credit account+amount (indented), explanation","Account number, amount, date, ledger page","Debit, credit, total, balance"],ans:1,exp:"Four parts: (1) Date, (2) Account debited + amount, (3) Account credited + amount (indented), (4) Explanation (includes cheque/invoice number)."},
      {type:'mcq',q:"In what order are journal entries recorded?",opts:["Alphabetical by account name","Largest dollar amount first","Chronological order (by date)","By account number"],ans:2,exp:"Journal entries are recorded in CHRONOLOGICAL order - earliest date first, just like a diary of business transactions."},
      {type:'mcq',q:"What is posting?",opts:["Recording transactions in the journal","Transferring information from the journal to the ledger","Preparing a trial balance","Creating a chart of accounts"],ans:1,exp:"Posting = transferring transaction information from the journal to the individual accounts in the general ledger."},
      {type:'mcq',q:"What is a chart of accounts?",opts:["A list of all journal entries","A numbered list of all account names in a ledger, organized by category","A type of balance sheet","The same as a trial balance"],ans:1,exp:"A chart of accounts = a numbered list of all account names, organized by category (assets, liabilities, equity, revenue, expenses). Used when journalizing and posting."},
      {type:'mcq',q:"What is an opening entry?",opts:["The first entry each month","A special journal entry recording a business's assets, liabilities, and equity when it first begins operations","An entry for a new expense account","The closing entry at year end"],ans:1,exp:"An opening entry is the FIRST journal entry ever made for a new business. It records all opening assets (debited), liabilities (credited), and owner's equity (credited)."},
      {type:'mcq',q:"What is a source document?",opts:["A journal entry","A physical form that proves a transaction occurred","A type of ledger","The trial balance"],ans:1,exp:"A source document = a physical form that serves as original evidence that a transaction occurred. Examples: sales slips, invoices, cheques, bank memos."},
      {type:'mcq',q:"What source document is used for a cash sale?",opts:["Sales Invoice","Purchase Invoice","Cash Sales Slip","Bank Debit Memo"],ans:2,exp:"A Cash Sales Slip is the source document for a CASH sale. A Sales Invoice is used for credit sales (sales on account)."},
      {type:'mcq',q:"What source document is used for a sale on account (credit sale)?",opts:["Cash Sales Slip","Purchase Invoice","Sales Invoice","Bank Credit Memo"],ans:2,exp:"A Sales Invoice is prepared by the seller for a sale on account (credit sale). The buyer calls it a Purchase Invoice."},
      {type:'mcq',q:"What source document does the BUYER use for a purchase on account?",opts:["Cash Sales Slip","Sales Invoice","Bank Debit Memo","Purchase Invoice"],ans:3,exp:"The Purchase Invoice = the buyer's copy of the seller's Sales Invoice. It proves the buyer received goods/services on credit."},
      {type:'mcq',q:"Why are source documents prenumbered?",opts:["To make them look professional","As a control procedure - prevents errors, theft, omissions, and duplications","To identify the seller","Because the government requires it"],ans:1,exp:"Prenumbering = a control procedure. Each document gets a unique number, preventing loss, theft, duplication, and making every transaction traceable."},
      {type:'mcq',q:"What is a transposition error?",opts:["Posting to the wrong account","Recording a debit as a credit","Reversing digits when recording a number (e.g., writing 81 instead of 18)","Adding instead of subtracting"],ans:2,exp:"Transposition error = reversing/swapping digits. Example: recording $542 as $452. Key clue: if the difference in a trial balance is divisible by 9, it's likely a transposition error."},
      {type:'mcq',q:"What is a compound journal entry?",opts:["An entry with two debits and two credits that cancel out","A journal entry with more than two accounts - multiple debits, multiple credits, or both","An entry that spans two accounting periods","An entry made in two different journals"],ans:1,exp:"A compound entry = a journal entry that involves more than two accounts. It may have multiple debits, multiple credits, or both, but total debits must still equal total credits."},
      {type:'mcq',q:"What is the Principle of Objectivity?",opts:["All accounting records must be completely private","Accounting records must be based on objective, verifiable evidence - free from bias","Assets must always be recorded at cost","Revenue must be recognized immediately"],ans:1,exp:"Principle of Objectivity: accounting records must be based on OBJECTIVE (unbiased, verifiable) evidence. Source documents provide this evidence."},
      {type:'mcq',q:"What is a balance-column ledger?",opts:["A ledger with only credit balances","A three-column ledger that shows a running balance after each entry","A ledger sorted alphabetically","A ledger with only one account"],ans:1,exp:"Balance-column ledger = a three-column ledger (debit | credit | balance) that shows a running balance after every entry. Most commonly used ledger format."},
      {type:'mcq',q:"What is a Bank Debit Memo?",opts:["A memo from the bank increasing your account (e.g., interest earned)","A memo from the bank decreasing your account (e.g., a service fee)","A cheque written to a supplier","A sales invoice from the bank"],ans:1,exp:"Bank Debit Memo = a notice from the bank that DECREASES your bank account (e.g., service charges, fees). A Bank Credit Memo INCREASES it (e.g., interest earned)."},
      {type:'match',pairs:[
        {term:"Journal",def:"Chronological record of all business transactions - book of original entry."},
        {term:"Journalizing",def:"The process of recording transactions in a journal."},
        {term:"Journal entry",def:"One transaction recorded in the journal with date, accounts, amounts, and explanation."},

        {term:"Source document",def:"Physical form proving a transaction occurred (e.g., invoice, cheque)."},
        {term:"Prenumbered",def:"Control procedure - each document has a unique number to prevent errors and fraud."},
        {term:"Transposition error",def:"Digits reversed when recording (e.g., $18 written as $81)."},
        {term:"Compound entry",def:"Journal entry with more than two accounts - multiple debits and/or credits."},
        {term:"Principle of Objectivity",def:"Accounting records must be based on verifiable, unbiased evidence."},
