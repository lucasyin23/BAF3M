  {type:'mcq',q:"TRUE or FALSE: The Matching Principle is the basis for accrual accounting.",opts:["True","False"],ans:0,exp:"True. The Matching Principle requires recording revenues when earned and expenses when incurred (not when cash changes hands) - which is exactly what accrual accounting does."},
  {type:'mcq',q:"Which principle explains why adjusting entries are needed for prepaid expenses and depreciation?",opts:["Business Entity Principle","Cost Principle","Matching Principle","Time Period Principle"],ans:2,exp:"Adjusting entries for prepaid insurance, supplies, and depreciation are needed to MATCH the expense to the period in which the benefit was received - applying the Matching Principle."},
  {type:'mcq',q:"Under the Matching Principle, when should wages expense be recorded?",opts:["When the employee is hired","When the work is performed (even if paycheques are issued later)","When the paycheque is written","At year end only"],ans:1,exp:"Wages should be recorded when the WORK IS PERFORMED because that is when the expense was incurred and the related revenue was earned - not when cash is paid."},

  // ── Conservatism Principle ────────────────────────────────
  {type:'mcq',q:"What does the Conservatism Principle state?",opts:["Always choose the accounting method that gives the highest net income","When multiple accounting methods are acceptable, choose the one least likely to overstate assets or income","Always use the most expensive method","Record only confirmed revenues, not potential ones"],ans:1,exp:"Conservatism means when in doubt, choose the method that gives LOWER income and LOWER asset values. This protects users of financial statements from being misled by overstated results."},
  {type:'mcq',q:"A business is choosing between two depreciation methods. Method A gives $5,000 depreciation; Method B gives $8,000. Under the Conservatism Principle, which should be chosen?",opts:["Method A - lower depreciation, higher net income","Method B - higher depreciation, lower net income (more conservative)","Either method is fine","The method that gives the highest asset value"],ans:1,exp:"Conservatism requires choosing Method B - higher depreciation means lower net income and lower asset book value, which avoids overstating the financial results."},
  {type:'mcq',q:"TRUE or FALSE: The Conservatism Principle means a business should always understate its profits.",opts:["True","False"],ans:1,exp:"False. Conservatism does NOT mean deliberately understating profits - it means choosing the more cautious option when alternatives exist, to avoid OVERSTATING assets or income."},
  {type:'mcq',q:"Which principle is most relevant when an accountant must choose between two equally acceptable accounting methods?",opts:["Time Period Principle","Conservatism Principle","Matching Principle","Objectivity Principle"],ans:1,exp:"The Conservatism Principle guides accountants when alternatives exist - choose the method that is less likely to overstate assets or income."},

  // ── Materiality Principle ─────────────────────────────────
  {type:'mcq',q:"What does the Materiality Principle allow?",opts:["Businesses to ignore large errors","Insignificant items to be handled in the most practical way, even if it bends strict accounting rules","All expenses to be recorded as assets","Businesses to skip preparing financial statements"],ans:1,exp:"Materiality recognizes that strict accounting treatment of trivial items wastes time. A $3 stapler can be expensed immediately rather than depreciated over 5 years."},
  {type:'mcq',q:"A business buys a $4 stapler. Under the Materiality Principle, what is the most practical treatment?",opts:["Capitalize it as a fixed asset and depreciate over 5 years","Record it as a long-term liability","Expense it immediately as a supplies expense","Ignore it entirely"],ans:0,exp:"Because the stapler's cost is immaterial (insignificant), it is practical to expense it immediately rather than going through the full depreciation process. Materiality allows this shortcut."},
  {type:'mcq',q:"TRUE or FALSE: The Materiality Principle allows businesses to ignore large, significant accounting errors.",opts:["True","False"],ans:1,exp:"False. Materiality applies only to INSIGNIFICANT items. Large, significant items must always be treated with full accounting rigour. Only trivial amounts can be handled informally."},
  {type:'mcq',q:"An item is considered 'material' if it would:",opts:["Cost less than $100","Change a user's decision if it were reported differently","Be recorded as an asset","Appear on the income statement"],ans:1,exp:"An item is material if its misstatement or omission would change the decision of a reasonable user of the financial statements. Size alone does not determine materiality."},

  // ── Principle of Objectivity ──────────────────────────────
  {type:'mcq',q:"What does the Principle of Objectivity (Objective Evidence) require?",opts:["All accounting estimates must be exact","All accounting entries must be supported by verifiable, objective evidence","Accountants must never use estimates","Financial statements must be audited every year"],ans:1,exp:"The Objectivity Principle requires that accounting entries be based on objective, verifiable evidence - such as invoices, receipts, and contracts - not opinions or estimates."},
  {type:'mcq',q:"Which of the following BEST satisfies the Principle of Objectivity?",opts:["The owner's estimate of how much sales will grow next year","A supplier's invoice for $500 of supplies purchased","The accountant's opinion on asset value","A verbal agreement with a customer"],ans:1,exp:"A supplier's invoice is objective, verifiable evidence. Estimates, opinions, and verbal agreements are subjective and do not satisfy the Objectivity Principle."},
  {type:'mcq',q:"Why are source documents (invoices, receipts, cheques) essential to the Principle of Objectivity?",opts:["They allow businesses to avoid taxes","They provide verifiable, objective proof that transactions actually occurred","They replace the need for a journal","They are required by the government"],ans:1,exp:"Source documents provide objective, verifiable evidence of transactions - supporting the Objectivity Principle. They form the audit trail that proves every entry is based on real events."},
  {type:'mcq',q:"TRUE or FALSE: An accountant's personal opinion about an asset's value satisfies the Principle of Objectivity.",opts:["True","False"],ans:1,exp:"False. The Objectivity Principle requires verifiable, objective evidence - not personal opinions. Original cost (from a source document) is objective; personal opinions are not."},

  // ── Time Period Principle ──────────────────────────────────
  {type:'mcq',q:"What does the Time Period Principle state?",opts:["A business must report financial results every month","A business's life can be divided into specific time periods for accounting and reporting purposes","All transactions must occur within the same calendar year","Financial statements must cover exactly 12 months"],ans:1,exp:"The Time Period Principle allows a business's ongoing operations to be divided into specific periods (monthly, quarterly, annually) so that timely financial reports can be prepared."},
  {type:'mcq',q:"A company prepares financial statements every month. Which principle allows this?",opts:["Matching Principle","Business Entity Principle","Time Period Principle","Cost Principle"],ans:2,exp:"The Time Period Principle recognizes that a business's life can be divided into shorter periods - enabling monthly, quarterly, or annual reporting."},
  {type:'mcq',q:"TRUE or FALSE: A fiscal year must run from January 1 to December 31.",opts:["True","False"],ans:1,exp:"False. A fiscal year is any 12-month period chosen by the business - it does not need to match the calendar year. Many businesses choose fiscal years that match their operating cycle."},
  {type:'mcq',q:"Which principle is the basis for why businesses prepare annual or monthly financial statements?",opts:["Conservatism Principle","Time Period Principle","Matching Principle","Objectivity Principle"],ans:1,exp:"The Time Period Principle allows ongoing business operations to be divided into periods, making regular financial reporting possible and meaningful."},

  // ── IFRS vs ASPE ──────────────────────────────────────────
  {type:'mcq',q:"Which accounting standard is used by publicly traded companies in Canada?",opts:["ASPE","GAAP 1970","IFRS","CPA Standards"],ans:2,exp:"IFRS (International Financial Reporting Standards) is required for publicly traded companies in Canada. It allows investors worldwide to compare financial statements."},
  {type:'mcq',q:"Which accounting standard is designed for private companies in Canada?",opts:["IFRS","ASPE","SEC Standards","Tax Accounting Standards"],ans:1,exp:"ASPE (Accounting Standards for Private Enterprises) is designed specifically for private Canadian companies. It is simpler than IFRS and better suited to smaller businesses."},
  {type:'mcq',q:"Under IFRS, how are certain assets allowed to be reported?",opts:["Only at historical cost","At fair (market) value in some cases","At the owner's estimated value","At replacement cost only"],ans:1,exp:"A key difference: IFRS allows fair value accounting for some assets (e.g., investment properties), whereas ASPE typically uses historical cost. This is why large public companies may show different values than smaller private ones."},
  {type:'mcq',q:"TRUE or FALSE: IFRS and ASPE are the same standard, just different names.",opts:["True","False"],ans:1,exp:"False. IFRS and ASPE are two distinct accounting frameworks with different rules. IFRS is international and used by public companies; ASPE is Canadian and used by private companies."},
  {type:'mcq',q:"What does GAAP stand for?",opts:["Generally Accepted Accounting Principles","Government Authorized Accounting Procedures","General Annual Accounting Practices","Gross Asset Accounting Policies"],ans:0,exp:"GAAP = Generally Accepted Accounting Principles. These are the standard rules and guidelines that accountants follow when preparing financial statements."},
  {type:'mcq',q:"Which of the following is NOT an accounting principle covered by GAAPs?",opts:["Business Entity Principle","Matching Principle","Profit Maximization Principle","Cost Principle"],ans:2,exp:"Profit Maximization is a business finance concept, not an accounting principle. GAAPs include Business Entity, Cost, Matching, Conservatism, Materiality, Objectivity, and Time Period principles."},

  // ── Revenue Recognition Principle ────────────────────────────────
  {type:'mcq',q:"What does the Revenue Recognition Principle state?",opts:["Revenue is recorded when cash is received","Revenue is recorded when it is earned, regardless of when cash is received","Revenue is recorded at the end of the accounting period","Revenue is recorded when the invoice is mailed"],ans:1,exp:"The Revenue Recognition Principle: record revenue when it is EARNED - the service has been performed or goods delivered. Cash does not need to have been received yet."},
  {type:'mcq',q:"A business completes a $3,000 job in December but the customer pays in January. When is the revenue recorded?",opts:["January - when cash is received","December - when the service was earned/performed","Either month is fine","At year end only"],ans:1,exp:"Revenue Recognition: the service was EARNED in December (work was done), so revenue is recorded in December - even though cash arrives in January."},
  {type:'mcq',q:"A customer pays $1,200 in advance for 6 months of services. How should this be recorded initially?",opts:["Revenue of $1,200 immediately","As Unearned Revenue (a liability) until each month's service is performed","As owner's equity","As a current asset"],ans:1,exp:"Revenue is not yet EARNED - the service hasn't been performed. The cash is Unearned Revenue (a liability) until each month's service is completed, at which point 1/6 is recognized as revenue."},
  {type:'mcq',q:"TRUE or FALSE: Under the Revenue Recognition Principle, revenue is recorded when cash is received.",opts:["True","False"],ans:1,exp:"False. Revenue is recorded when EARNED (service performed or goods delivered) - not when cash is received. This is what distinguishes accrual from cash basis."},
  {type:'mcq',q:"The Revenue Recognition Principle is a core feature of which basis of accounting?",opts:["Cash basis","Accrual basis","Tax basis","Single-entry basis"],ans:1,exp:"The Revenue Recognition Principle is central to ACCRUAL basis - record revenue when earned, not when cash arrives. Cash basis ignores this by recording revenue only when cash is received."},

  // ── Mixed / compare ───────────────────────────────────────
  {type:'mcq',q:"Which principle explains why adjusting entries are made for prepaid insurance each month?",opts:["Business Entity Principle","Cost Principle","Matching Principle","Conservatism Principle"],ans:2,exp:"Prepaid insurance adjustments match the insurance expense to the period in which the coverage was used - this is the Matching Principle."},
  {type:'mcq',q:"Which principle explains why land is still recorded at $50,000 even though it is now worth $200,000?",opts:["Matching Principle","Cost Principle","Conservatism Principle","Materiality Principle"],ans:1,exp:"The Cost Principle requires assets to be recorded at their original purchase price. Current market value is not used in historical cost accounting."},
  {type:'mcq',q:"An accountant is unsure whether to include a $50 discrepancy. Which principle would allow them to ignore it?",opts:["Business Entity Principle","Conservatism Principle","Materiality Principle","Objectivity Principle"],ans:2,exp:"The Materiality Principle allows insignificant items to be handled practically. A $50 discrepancy is typically immaterial and may be adjusted without strict accounting treatment."},
  {type:'mcq',q:"Which principle is violated when an accountant records an entry based on a verbal agreement with no supporting documentation?",opts:["Matching Principle","Objectivity Principle","Time Period Principle","Cost Principle"],ans:1,exp:"The Objectivity Principle requires verifiable, objective evidence (like invoices or contracts). A verbal agreement with no documentation is not objective evidence."},
  {type:'mcq',q:"A business records its owner's personal car as a company asset. Which two principles are violated?",opts:["Cost Principle and Matching Principle","Business Entity Principle and Objectivity Principle","Time Period Principle and Conservatism Principle","Matching Principle and Materiality Principle"],ans:1,exp:"Business Entity Principle: personal assets must be separate from business assets. Objectivity Principle: there is no objective business transaction to support recording a personal car as a company asset."},
  {type:'mcq',q:"TRUE or FALSE: The Matching Principle is only relevant for large corporations.",opts:["True","False"],ans:1,exp:"False. The Matching Principle applies to ALL businesses regardless of size. Whenever a business has prepaid expenses, depreciation, or accrued items, the Matching Principle is at work."},
  {type:'mcq',q:"Which of the following is an example of applying the Conservatism Principle?",opts:["Recording revenue before it is earned","Choosing the depreciation method that gives the highest income","Estimating bad debts to avoid overstating Accounts Receivable","Recording assets at market value"],ans:2,exp:"Estimating bad debts (amounts unlikely to be collected) reduces Accounts Receivable to a more conservative, realistic amount - avoiding overstating assets. This is Conservatism in action."},
];

function buildStepsSection(key){
  var steps = STEP_SETS[key];
  // Randomly blank out roughly half the steps
  var indices = shuffle(steps.map(function(_,i){return i;}));
  var blanks = indices.slice(0, Math.ceil(steps.length/2)).sort(function(a,b){return a-b;});
  examState.stepKey = key;
  examState.stepBlanks = blanks;
  var html='<div class="cycle-wrap">';
  steps.forEach(function(step,i){
    var isBlank = blanks.indexOf(i)>=0;
    html+='<div class="cycle-item">'
      +'<div class="cycle-num">'+( i+1)+'</div>'
      +'<div class="cycle-box'+(isBlank?' cycle-blank':' cycle-given')+'">'
      +(isBlank
        ? '<input class="cycle-input" type="text" id="step_'+i+'" placeholder="Write step '+( i+1)+'...">'
        : '<span>'+step+'</span>'
      )
      +'</div>'
      +(i<steps.length-1?'<div class="cycle-arrow">↓</div>':'')
      +'</div>';
  });
  html+='</div>';
  return html;
}

function checkSteps(){
  var steps = STEP_SETS[examState.stepKey];
  var blanks = examState.stepBlanks;
  var correct=0; var lines=[];
  blanks.forEach(function(i){
    var el=document.getElementById('step_'+i);
    var val=(el?el.value:'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
    var expected = steps[i].toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
    // Check any 3 key words from expected appear in answer
    var words = expected.split(' ').filter(function(w){return w.length>3;});
    var matches = words.filter(function(w){return val.indexOf(w)>=0;}).length;
    var ok = matches >= Math.min(2, words.length);
    if(ok){correct++;lines.push('<span style="color:var(--green)">\u2713 Step '+(i+1)+': '+steps[i]+'</span>');}
    else lines.push('<span style="color:var(--red)">\u2717 Step '+(i+1)+': '+steps[i]+'</span>');
  });
  var fb=document.getElementById('stepsFeedback');
  fb.innerHTML='<div class="exam-result"><b>'+correct+' / '+blanks.length+'</b> correct</div>'+lines.join('<br>');
  fb.className='exam-feedback show';
}

function buildClosingJournal(sc){
  var rows=[];
  // Step 1: revenues
  sc.revenues.forEach(function(r,i){rows.push({date:i===0?'Dec 31':'',desc:'('+( i===0?'1':'')+') '+r.name,dr:'',cr:''}); });
  rows.push({date:'',desc:'Income Summary',dr:'',cr:''});
  // Step 2: expenses
  rows.push({date:'Dec 31',desc:'(2) Income Summary',dr:'',cr:''});
  sc.expenses.forEach(function(e){rows.push({date:'',desc:e.name,dr:'',cr:''}); });
  // Step 3
  rows.push({date:'Dec 31',desc:'(3) Income Summary',dr:'',cr:''});
  rows.push({date:'',desc:sc.owner+', Capital',dr:'',cr:''});
  // Step 4
  rows.push({date:'Dec 31',desc:'(4) '+sc.owner+', Capital',dr:'',cr:''});
  rows.push({date:'',desc:sc.owner+', Drawings',dr:'',cr:''});
  return buildJournal('cls',rows);
}

function checkAdjEntries(){
  var sc=examState.adjSc;
  var sup_exp = sc.supplies_bal - sc.supplies_hand;
  var ins_exp = sc.ins_monthly;
  var dep_exp = Math.round((sc.equip_cost - sc.equip_res) / sc.equip_life);
  var sal_pay = sc.sal_unpaid;
  var checks=[
    [sup_exp,'adj_dr_0','adj_cr_1','Supplies ('+fmt(sup_exp)+')'],
    [ins_exp,'adj_dr_2','adj_cr_3','Insurance ('+fmt(ins_exp)+')'],
    [dep_exp,'adj_dr_4','adj_cr_5','Depreciation ('+fmt(dep_exp)+')'],
    [sal_pay,'adj_dr_6','adj_cr_7','Salaries ('+fmt(sal_pay)+')'],
  ];
  var correct=0; var lines=[];
  checks.forEach(function(ck){
    var drOk=Math.abs(numVal(ck[1])-ck[0])<1;
    var crOk=Math.abs(numVal(ck[2])-ck[0])<1;
    if(drOk&&crOk){correct++;lines.push('<span style="color:var(--green)">\u2713 '+ck[3]+'</span>');}
    else lines.push('<span style="color:var(--red)">\u2717 '+ck[3]+': Dr. $'+fmt(ck[0])+' / Cr. $'+fmt(ck[0])+'</span>');
  });
  var fb=document.getElementById('adjFeedback');
  fb.innerHTML='<div class="exam-result"><b>'+correct+' / 4</b> entries correct</div>'+lines.join('<br>');
  fb.className='exam-feedback show';
}

function checkClosingEntries(){
  var sc=examState.clsSc;
  var totalRev=sc.revenues.reduce(function(s,r){return s+r.amt;},0);
  var totalExp=sc.expenses.reduce(function(s,e){return s+e.amt;},0);
  var ni=totalRev-totalExp;
  var revRow=sc.revenues.length; // IS row index
  var expRow=revRow+1+sc.expenses.length; // after IS summary
  // Check rev credit to IS
  var isCredit=numVal('cls_cr_'+(sc.revenues.length));
  var revOk=Math.abs(isCredit-totalRev)<1;
  var expDebit=numVal('cls_dr_'+(sc.revenues.length+1));
  var expOk=Math.abs(expDebit-totalExp)<1;
  var niRow=sc.revenues.length+1+sc.expenses.length;
  var niOk=Math.abs(numVal('cls_dr_'+niRow)-ni)<1;
  var drawRow=niRow+2;
  var drawOk=Math.abs(numVal('cls_dr_'+drawRow)-sc.drawings)<1;
  var results=[[revOk,'Close Revenue: $'+fmt(totalRev)+' to Income Summary'],[expOk,'Close Expenses: $'+fmt(totalExp)+' from Income Summary'],[niOk,'Close Income Summary: $'+fmt(ni)+' to Capital'],[drawOk,'Close Drawings: $'+fmt(sc.drawings)+' from Capital']];
  var correct=results.filter(function(r){return r[0];}).length;
  var lines=results.map(function(r){return '<span style="color:'+(r[0]?'var(--green)':' var(--red)')+'">'+( r[0]?' \u2713':' \u2717')+' '+r[1]+'</span>';});
  var fb=document.getElementById('clsFeedback');
  fb.innerHTML='<div class="exam-result"><b>'+correct+' / 4</b> closing entries correct</div>'+lines.join('<br>');
  fb.className='exam-feedback show';
}

function checkFinancials(){
  var sc=examState.bsSc;
  var endCap=sc.opening_cap+sc.net_income-sc.drawings;
  var currAssets=sc.cash+sc.ar+sc.supplies+sc.prepaid;
  var bvEquip=sc.equip-sc.accum_dep;
  var totalAssets=currAssets+bvEquip;
  var currLiab=sc.ap+sc.sal_pay;
  var totalLiab=currLiab+sc.mortgage;
  var checks=[
    [Math.abs(numVal('eq_end')-endCap)<1,'Ending Capital: $'+fmt(endCap)],
    [Math.abs(numVal('bs_curr_tot')-currAssets)<1,'Total Current Assets: $'+fmt(currAssets)],
    [Math.abs(numVal('bs_total_assets')-totalAssets)<1,'Total Assets: $'+fmt(totalAssets)],
    [Math.abs(numVal('bs_total_liab')-totalLiab)<1,'Total Liabilities: $'+fmt(totalLiab)],
    [Math.abs(numVal('bs_total_le')-(totalLiab+endCap))<1,'Total L + OE: $'+fmt(totalLiab+endCap)],
  ];
  var correct=checks.filter(function(r){return r[0];}).length;
  var lines=checks.map(function(r){return '<span style="color:'+(r[0]?'var(--green)':' var(--red)')+'">'+( r[0]?' \u2713':' \u2717')+' '+r[1]+'</span>';});
  var fb=document.getElementById('bsFeedback');
  fb.innerHTML='<div class="exam-result"><b>'+correct+' / 5</b> key totals correct</div>'+lines.join('<br>');
  fb.className='exam-feedback show';
}

var CYCLE_STEPS = [
  "Transfer opening balances to ledger",
  "Record transactions in T-accounts",
  "Determine T-account balances",
  "Prepare the trial balance",
  "Complete the worksheet",
  "Prepare financial statements",
  "Journalize and post adjusting entries",
  "Journalize and post closing entries",
  "Prepare post-closing trial balance",
  "Prepare new balance sheet"
];
// Steps that are blank (student fills in) - we hide steps 2,4,5,7,8,10 (0-indexed 1,3,4,6,7,9)
var CYCLE_BLANKS = [1,3,4,6,7,9];

function buildAccountingCycle(){
  var html='<div class="cycle-wrap">';
  CYCLE_STEPS.forEach(function(step,i){
    var isBlank = CYCLE_BLANKS.indexOf(i) >= 0;
    html+='<div class="cycle-item">'
      +'<div class="cycle-num">'+(i+1)+'</div>'
      +'<div class="cycle-box'+(isBlank?' cycle-blank':' cycle-given')+'">'
      +(isBlank
        ? '<input class="cycle-input" type="text" id="cyc_'+i+'" placeholder="Write the step...">'
        : '<span>'+step+'</span>'
      )
      +'</div>'
      +(i < CYCLE_STEPS.length-1 ? '<div class="cycle-arrow">↓</div>' : '')
      +'</div>';
  });
  html+='</div>';
  return html;
}

function checkCycle(){
  var keywords = {
    1:['t-account','transactions','record','journal entry'],
    3:['trial balance','tb'],
    4:['worksheet','work sheet'],
    6:['adjusting','adjust'],
    7:['closing','close'],
    9:['balance sheet','new balance']
  };
  var correct=0; var lines=[];
  CYCLE_BLANKS.forEach(function(i){
    var el=document.getElementById('cyc_'+i);
    var val=(el?el.value:'').toLowerCase().replace(/[^a-z0-9 ]/g,'').trim();
    var kws=keywords[i]||[];
    var ok=kws.some(function(k){return val.indexOf(k)>=0;});
    if(ok){correct++;lines.push('<span style="color:var(--green)">✓ Step '+(i+1)+': '+CYCLE_STEPS[i]+'</span>');}
    else lines.push('<span style="color:var(--red)">✗ Step '+(i+1)+': '+CYCLE_STEPS[i]+'</span>');
  });
  var fb=document.getElementById('cycleFeedback');
  fb.innerHTML='<div class="exam-result"><b>'+correct+' / '+CYCLE_BLANKS.length+'</b> steps correct</div>'+lines.join('<br>');
  fb.className='exam-feedback show';
}

var ptState = {count:20, timer:20, diffLevels:['L1','L2','L3']};

function ptToggle(el){
  el.classList.toggle('active');
}
function ptCount(el){
  document.querySelectorAll('.pt-btn-row')[1].querySelectorAll('.pt-toggle').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  ptState.count = el.dataset.val==='all' ? 9999 : parseInt(el.dataset.val);
}
function ptTimer(el){
  document.querySelectorAll('.pt-btn-row')[2].querySelectorAll('.pt-toggle').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  ptState.timer = parseInt(el.dataset.val);
}

function startPracticeTest(){
  // Gather selections
  var selectedChs = [];
  document.querySelectorAll('.pt-ch-check:checked').forEach(function(cb){ selectedChs.push(parseInt(cb.value)); });
  var selectedLevels = [];
  document.querySelectorAll('#ptDiffRow .pt-toggle.active').forEach(function(b){ selectedLevels.push(b.dataset.val); });

  if(selectedChs.length===0 || selectedLevels.length===0){
    document.getElementById('ptError').style.display='block';
    return;
  }
  document.getElementById('ptError').style.display='none';

  // Build question pool
  var pool=[];
  selectedChs.forEach(function(ci){
    selectedLevels.forEach(function(lk){
      var qs = CHAPTERS[ci].levels[lk] || [];
      expandMatching(qs).forEach(function(q){ pool.push(q); });
    });
  });
  pool=shuffle(pool);

  var countSetting = ptState.count;
  // Get count from active button
  var countBtns = document.querySelectorAll('.pt-btn-row')[1];
  if(countBtns){
    var activeBtn = countBtns.querySelector('.pt-toggle.active');
    if(activeBtn) countSetting = activeBtn.dataset.val==='all' ? 9999 : parseInt(activeBtn.dataset.val);
  }
  var timerMins = ptState.timer;
  var timerBtns = document.querySelectorAll('.pt-btn-row')[2];
  if(timerBtns){
    var activeTimer = timerBtns.querySelector('.pt-toggle.active');
    if(activeTimer) timerMins = parseInt(activeTimer.dataset.val);
  }

  var questions = pool.slice(0, Math.min(countSetting, pool.length));
  if(questions.length===0){
    document.getElementById('ptError').style.display='block';
    return;
  }

  // Set up state like a normal quiz session
  state.chIdx=0; state.level='PT'; state.unitIdx=null;
  state.questions=questions;
  state.idx=0; state.correct=0; state.wrong=0; state.skipped=[];
  state.screen='quiz';

  setBreadcrumb(['Practice Test']);
  pushRoute(BASE+'/practice-test/session');

  // Show sub bar with timer
  var sb=document.getElementById('subBar');
  sb.classList.add('on');
  var badge=document.getElementById('lvlBadge');
  badge.textContent='Practice Test - '+questions.length+' questions';
  badge.className='q-mode-tag';
  document.getElementById('subProgBar').style.background='var(--accent)';
  var tog=document.getElementById('saveToggle');
  if(tog) tog.checked=false;
  sessionSaveEnabled=false;
  setSubProg(0);
  showTopStats(true);
  updateTopStats();

  // Start countdown timer if set
  if(window._ptTimerInterval) clearInterval(window._ptTimerInterval);
  if(timerMins>0){
    var endTime = Date.now() + timerMins*60*1000;
    window._ptTimerInterval = setInterval(function(){
      var remaining = Math.max(0, endTime - Date.now());
      var mins = Math.floor(remaining/60000);
      var secs = Math.floor((remaining%60000)/1000);
      var pct=document.getElementById('subPct');
      if(pct) pct.textContent = mins+':'+(secs<10?'0':'')+secs;
      if(remaining<=0){
        clearInterval(window._ptTimerInterval);
        showComplete();
      }
    },500);
  }

  renderQuestion();
}

function stopPtTimer(){
  if(window._ptTimerInterval){ clearInterval(window._ptTimerInterval); window._ptTimerInterval=null; }
}

// ── Question renderer ────────────────────────────────────────────
function renderQuestion(){
  var q=state.questions[state.idx];
  if(q.type==='mcq') renderMCQ(q);
  else if(q.type==='sa') renderSA(q);
  else if(q.type==='fitb') renderFITB(q);
  else renderMatch(q);
}

function setBox(html){
  document.getElementById('app').innerHTML='<div class="wrap"><div class="inner">'+html+'</div></div>';
}

function renderMCQ(q){
  var letters=['A','B','C','D'];
  var opts=q.opts.map(function(o,i){
    return '<button class="opt-btn" onclick="checkMCQ('+i+')"><span class="opt-key">'+letters[i]+'</span>'+o+'</button>';
  }).join('');
  setBox('<div class="pop"><div class="ttag ttag-mcq">Multiple Choice</div>'
    +'<div class="qcard" id="card">'
    +'<div class="q-num">Question '+(state.idx+1)+' of '+state.questions.length+'</div>'
    +'<div class="q-body">'+q.q+'</div>'
    +'<div class="opts">'+opts+'</div>'
    +'<div class="fb" id="fb"></div>'
    +'<div class="act-row">'
    +'<button class="btn-skip" onclick="skipQ()">Skip →</button>'
    +'<button class="btn-next" id="btnNext" onclick="nextQ()">Next →</button>'
    +'</div></div></div>');
}

function checkMCQ(chosen){
  var card=document.getElementById('card');
  if(card.dataset.done)return;
  card.dataset.done='1';
  var q=state.questions[state.idx];
  var opts=card.querySelectorAll('.opt-btn');
  opts.forEach(function(o){o.setAttribute('disabled','');});
  document.getElementById('btnNext').style.display='block';
  card.querySelector('.btn-skip').style.display='none';
  var fb=document.getElementById('fb');
  if(chosen===q.ans){
    opts[chosen].classList.add('ans-ok');
    card.classList.add('c-ok');
    fb.className='fb fb-ok show';
    fb.innerHTML='<strong>&#10003; Correct!</strong> '+q.exp;
    state.correct++;
  } else {
    opts[chosen].classList.add('ans-no');
    opts[q.ans].classList.add('ans-ok');
    card.classList.add('c-no');
    fb.className='fb fb-no show';
    fb.innerHTML='<strong>&#10007; Incorrect.</strong> The right answer is <strong>'+['A','B','C','D'][q.ans]+': '+q.opts[q.ans]+'</strong>.<br><br>'+q.exp;
    state.wrong++;
  }
  updateTopStats();
}

function renderSA(q){
  setBox('<div class="pop"><div class="ttag ttag-sa">Short Answer</div>'
    +'<div class="qcard" id="card">'

// ── MATCH STATE ──────────────────────────────────────────────────
var matchState = { selectedTerm: null, selectedDef: null, pairs: [], connections: {} };

function renderFITB(q){
  setBox('<div class="pop"><div class="ttag ttag-fitb">Fill in the Blank</div>'
    +'<div class="qcard" id="card">'
    +'<div class="q-num">Question '+(state.idx+1)+' of '+state.questions.length+'</div>'
    +'<div class="q-body fitb-q">'+q.q+'</div>'
    +'<div class="fitb-wrap">'
    +'<input class="fitb-input" id="fitbInput" type="text" placeholder="Type your answer..." autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key===\'Enter\')checkFITB()">'
    +'<button class="fitb-check-btn" onclick="checkFITB()">Check</button>'
    +'</div>'
    +'<div class="fb" id="fb"></div>'
    +'<div class="act-row">'
    +'<button class="btn-skip" onclick="skipQ()">Skip →</button>'
    +'<button class="btn-next" id="btnNext" onclick="nextQ()" style="display:none">Next →</button>'
    +'</div></div></div>');
  setTimeout(function(){ var el=document.getElementById('fitbInput'); if(el) el.focus(); },80);
}

function checkFITB(){
  var card=document.getElementById('card');
  if(card.dataset.done) return;
  var input=document.getElementById('fitbInput');
  var val=input.value.trim();
  if(!val) return;
  card.dataset.done='1';
  input.disabled=true;

  var q=state.questions[state.idx];
  var grade=gradeFITBAnswer(val, q.ans);
  var fb=document.getElementById('fb');

  if(grade==='exact'){
    state.correct++;
    card.classList.add('c-ok');
    fb.className='fb fb-ok show';
    fb.innerHTML='<strong>Correct!</strong> '+q.exp;
  } else if(grade==='close'){
    state.correct++;
    card.classList.add('c-close');
    fb.className='fb fb-close show';
    fb.innerHTML='<strong>Close enough!</strong> Accepted — the ideal answer is: <strong>'+q.ans[0]+'</strong>. '+q.exp;
  } else {
    state.wrong++;
    card.classList.add('c-no');
    fb.className='fb fb-no show';
    fb.innerHTML='<strong>Not quite.</strong> The answer is: <strong>'+q.ans[0]+'</strong>. '+q.exp;
  }
  document.getElementById('btnNext').style.display='block';
  document.querySelector('.btn-skip').style.display='none';
  updateTopStats();
  sessionSave();
}

function renderMatch(q){
  var pairs = q.pairs;
  var shuffledDefs = shuffle(pairs.map(function(p,i){ return {def:p.def, origIdx:i}; }));
  matchState = { selectedTerm:null, selectedDef:null, pairs:pairs, shuffledDefs:shuffledDefs, connections:{} };

  var termItems = pairs.map(function(p,i){
    return '<div class="mc-term" id="mct-'+i+'" onclick="matchSelectTerm('+i+')">'
      +'<span class="mc-badge">'+String.fromCharCode(65+i)+'</span>'
      +'<span class="mc-text">'+p.term+'</span>'
      +'<span class="mc-arrow" id="mca-'+i+'"></span>'
      +'</div>';
  }).join('');

  var defItems = shuffledDefs.map(function(d,i){
    return '<div class="mc-def" id="mcd-'+i+'" onclick="matchSelectDef('+i+')">'
      +'<span class="mc-dnum">'+( i+1)+'</span>'
      +'<span class="mc-text">'+d.def+'</span>'
      +'</div>';
  }).join('');

  setBox('<div class="pop"><div class="ttag ttag-match">Matching</div>'
    +'<div class="qcard" id="card">'
    +'<div class="q-num">Question '+(state.idx+1)+' of '+state.questions.length+'</div>'
    +'<div class="mc-instr">Select a term on the left, then its definition on the right.</div>'
    +'<div class="mc-grid">'
    +'<div class="mc-col"><div class="mc-col-head">Terms</div>'+termItems+'</div>'
    +'<div class="mc-col"><div class="mc-col-head">Definitions</div>'+defItems+'</div>'
    +'</div>'
    +'<div class="fb" id="fb"></div>'
    +'<div class="act-row">'
    +'<button class="btn-skip" onclick="skipQ()">Skip →</button>'
    +'<button class="btn-reveal" id="btnReveal" onclick="submitMatch()" disabled>Submit</button>'
    +'<button class="btn-next" id="btnNext" onclick="nextQ()" style="display:none">Next →</button>'
    +'</div></div></div>');
}

function matchSelectTerm(i){
  var card = document.getElementById('card');
  if(card.dataset.done) return;
  // Deselect if already selected
  if(matchState.selectedTerm===i){ matchState.selectedTerm=null; refreshMatchUI(); return; }
  matchState.selectedTerm=i;
  // If a def is already selected, make the connection
  if(matchState.selectedDef!==null){ matchMakePair(); return; }
  refreshMatchUI();
}

function matchSelectDef(i){
  var card = document.getElementById('card');
  if(card.dataset.done) return;
  if(matchState.selectedDef===i){ matchState.selectedDef=null; refreshMatchUI(); return; }
  matchState.selectedDef=i;
  if(matchState.selectedTerm!==null){ matchMakePair(); return; }
  refreshMatchUI();
}

function matchMakePair(){
  var ti = matchState.selectedTerm;
  var di = matchState.selectedDef;
  // Remove any existing connection for this term or def
  Object.keys(matchState.connections).forEach(function(k){
    if(parseInt(k)===ti || matchState.connections[k]===di) delete matchState.connections[k];
  });
  matchState.connections[ti] = di;
  matchState.selectedTerm = null;
  matchState.selectedDef = null;
  refreshMatchUI();
  // Enable submit if all terms matched
  var submitBtn = document.getElementById('btnReveal');
  if(submitBtn) submitBtn.disabled = Object.keys(matchState.connections).length < matchState.pairs.length;
}

function refreshMatchUI(){
  var pairs = matchState.pairs;
  var conns = matchState.connections;
  // Reset all
  pairs.forEach(function(_,i){
    var t = document.getElementById('mct-'+i);
    var a = document.getElementById('mca-'+i);
    if(!t) return;
    t.className='mc-term';
    if(a) a.textContent='';
    if(conns[i]!==undefined){
      t.classList.add('mc-connected');
      if(a) a.textContent = (conns[i]+1)+'';
    }
    if(matchState.selectedTerm===i) t.classList.add('mc-selected');
  });
  matchState.shuffledDefs.forEach(function(_,i){
    var d = document.getElementById('mcd-'+i);
    if(!d) return;
    d.className='mc-def';
    // Check if this def is connected
    var isConn = Object.values(conns).indexOf(i) >= 0;
    if(isConn) d.classList.add('mc-connected');
    if(matchState.selectedDef===i) d.classList.add('mc-selected');
  });
}

function submitMatch(){
  var card = document.getElementById('card');
  if(card.dataset.done) return;
  card.dataset.done='1';
  document.getElementById('btnReveal').style.display='none';
  document.getElementById('btnNext').style.display='block';
  card.querySelector('.btn-skip').style.display='none';

  var pairs = matchState.pairs;
  var conns = matchState.connections;
  var shuffledDefs = matchState.shuffledDefs;
  var got = 0;
  var keyParts = [];

  pairs.forEach(function(p,i){
    var t = document.getElementById('mct-'+i);
    var connDefIdx = conns[i];
    var correctDefIdx = shuffledDefs.findIndex(function(d){ return d.origIdx===i; });
    var correctNum = correctDefIdx + 1;
    keyParts.push(String.fromCharCode(65+i)+'='+correctNum);
    if(connDefIdx===correctDefIdx){
      got++;
      if(t){ t.className='mc-term mc-correct'; }
      var d = document.getElementById('mcd-'+correctDefIdx);
      if(d) d.className='mc-def mc-def-correct';
    } else {
      if(t){ t.className='mc-term mc-wrong'; }
      if(connDefIdx!==undefined){
        var wd = document.getElementById('mcd-'+connDefIdx);
        if(wd) wd.className='mc-def mc-def-wrong';
      }
      // Show correct def
      var cd = document.getElementById('mcd-'+correctDefIdx);
      if(cd) cd.classList.add('mc-def-correct');
    }
  });

  var pct = got/pairs.length;
  var fb = document.getElementById('fb');
  fb.className='fb '+(pct>=0.7?'fb-ok':'fb-no')+' show';
  fb.innerHTML='You matched <strong>'+got+'/'+pairs.length+'</strong> correctly. '
    +'<span style="font-size:12px;color:var(--text3);font-family:var(--mono)">Key: '+keyParts.join(' ')+'</span>';
  if(pct>=0.7) state.correct+=got; else state.wrong+=(pairs.length-got);
  updateTopStats();
}

function skipQ(){
  var card=document.getElementById('card');
  if(card.dataset.done)return;
  card.dataset.done='1';
  var q=state.questions[state.idx];
  card.classList.add('c-skip');
  state.skipped.push({num:state.idx+1,q:q.q||'Matching block'});
  var fb=document.getElementById('fb');
  fb.className='fb fb-skip show';
  if(q.type==='mcq'){
    fb.innerHTML='<strong>Skipped.</strong> Correct: <strong>'+['A','B','C','D'][q.ans]+': '+q.opts[q.ans]+'</strong>.<br>'+q.exp;
  } else {
    fb.innerHTML='<strong>Skipped.</strong> Review your notes on this topic.';
  }
  card.querySelector('.btn-skip').style.display='none';
  document.getElementById('btnNext').style.display='block';
  var bc=document.getElementById('btnReveal'); if(bc)bc.style.display='none';
  var sa=document.getElementById('saInput'); if(sa)sa.disabled=true;
}

function nextQ(){
  state.idx++;
  sessionSave();
  if(state.idx>=state.questions.length){sessionClear();showComplete();return;}
  updateTopStats();
  renderQuestion();
}

// ── SESSION SAVE / RESUME ─────────────────────────────────────────
var SESSION_KEY = 'baf3m-session';
var sessionSaveEnabled = false;

function getSessionStoreKey(){
  return 'ch'+state.chIdx+'_'+state.level+(state.unitIdx!=null?'_u'+state.unitIdx:'');
}

function sessionSave(){
  if(!sessionSaveEnabled) return;
  try{
    var data = {
      chIdx: state.chIdx,
      level: state.level,
      unitIdx: state.unitIdx,
      idx: state.idx,
      correct: state.correct,
      wrong: state.wrong,
      skipped: state.skipped,
      // Store only question indices (not full objects) to keep it light
      // We store the question text array so we can restore order
      qTexts: state.questions.map(function(q){ return q.q || (q.type==='match'?'match':'sa'); }),
      savedAt: Date.now()
    };
    var all = {};
    try{ all = JSON.parse(localStorage.getItem(SESSION_KEY)) || {}; }catch(e){}
    all[getSessionStoreKey()] = data;
    localStorage.setItem(SESSION_KEY, JSON.stringify(all));
  }catch(e){}
}

function sessionClear(){
  try{
    var all = {};
    try{ all = JSON.parse(localStorage.getItem(SESSION_KEY)) || {}; }catch(e){}
    delete all[getSessionStoreKey()];
    localStorage.setItem(SESSION_KEY, JSON.stringify(all));
  }catch(e){}
}

function getResumableSession(chIdx, level, unitIdx){
  try{
    var all = JSON.parse(localStorage.getItem(SESSION_KEY)) || {};
    var key = 'ch'+chIdx+'_'+level+(unitIdx!=null?'_u'+unitIdx:'');
    var data = all[key];
    if(!data) return null;
    // Only offer resume if saved within 7 days and not at the start
    var age = (Date.now() - data.savedAt) / 1000 / 60 / 60 / 24;
    if(age > 7 || data.idx === 0) return null;
    return data;
  }catch(e){ return null; }
}

function checkAndOfferResume(launchFn, chIdx, level, unitIdx){
  var saved = getResumableSession(chIdx, level, unitIdx);
  if(!saved){ launchFn(false); return; }

  // Show resume prompt
  var app = document.getElementById('app');
  var pct = Math.round(saved.idx / saved.qTexts.length * 100);
  app.innerHTML = '<div class="wrap"><div class="inner pop">'
    +'<div class="resume-card">'
    +'<div class="resume-icon">📌</div>'
    +'<div class="resume-title">Resume where you left off?</div>'
    +'<div class="resume-sub">You were on question <strong>'+saved.idx+'</strong> of <strong>'+saved.qTexts.length+'</strong> ('+pct+'% through) with <strong>'+saved.correct+'</strong> correct.</div>'
    +'<div class="resume-btns">'
    +'<button class="btn-fill" onclick="doResume()">Resume from Q'+saved.idx+'</button>'
    +'<button class="btn-outline" onclick="doFreshStart()">Start fresh</button>'
    +'</div>'
    +'</div>'
    +'</div></div>';

  // Store the pending launch so the buttons can call it
  window._pendingLaunch = launchFn;
  window._pendingResume = saved;
}

function doResume(){
  var saved = window._pendingResume;
  if(!saved) return;
  sessionSaveEnabled = true;
  // Restore state — re-generate questions with the same seed isn't possible,
  // so we re-run the launch (which shuffles again) then fast-forward idx
  window._pendingLaunch(false); // launches fresh
  // Now override idx/scores from saved
  state.idx = saved.idx;
  state.correct = saved.correct;
  state.wrong = saved.wrong;
  state.skipped = saved.skipped || [];
  updateTopStats();
  renderQuestion();
}

function doFreshStart(){
  // Clear the saved session then start fresh
  var old = window._pendingResume;
  if(old){
    // Temporarily set state to get the right key
    state.chIdx = old.chIdx; state.level = old.level; state.unitIdx = old.unitIdx;
    sessionClear();
  }
  window._pendingLaunch(false);
}

function toggleSessionSave(el){
  sessionSaveEnabled = el.checked;
  if(!sessionSaveEnabled) sessionClear();
}
var PROGRESS_KEY = 'baf3m-progress';

function loadProgress(){
  try{ return JSON.parse(localStorage.getItem(PROGRESS_KEY)) || {}; }catch(e){ return {}; }
}

function saveProgress(entry){
  try{
    var all = loadProgress();
    var chName = CHAPTERS[state.chIdx].title;
    if(!all[state.chIdx]) all[state.chIdx] = {};
    var modeKey = state.level==='UNIT' ? 'unit-'+state.unitIdx : state.level;
    if(!all[state.chIdx][modeKey]) all[state.chIdx][modeKey] = [];
    all[state.chIdx][modeKey].unshift(entry);
    // Keep only last 5 entries per mode
    if(all[state.chIdx][modeKey].length > 5) all[state.chIdx][modeKey] = all[state.chIdx][modeKey].slice(0,5);
    localStorage.setItem(PROGRESS_KEY, JSON.stringify(all));
    return true;
  }catch(e){ return false; }
}

function getProgressSummary(){
  var all = loadProgress();
  var rows = [];
  CHAPTERS.forEach(function(ch, ci){
    if(!all[ci]) return;
    Object.keys(all[ci]).forEach(function(modeKey){
      var entries = all[ci][modeKey];
      if(!entries || !entries.length) return;
      var last = entries[0];
      var modeName = modeKey==='L1'?'Level 1':modeKey==='L2'?'Level 2':modeKey==='L3'?'Level 3':modeKey==='ALL'?'All Mixed':'Unit Review';
      rows.push({ch:ci+1, chName:ch.title, mode:modeName, pct:last.pct, correct:last.correct, total:last.attempted, date:last.date});
    });
  });
  return rows;
}

function clearProgress(){
  try{ localStorage.removeItem(PROGRESS_KEY); }catch(e){}
}

function showComplete(){
  stopPtTimer();
  setSubProg(100);
  var ch=CHAPTERS[state.chIdx];
  var attempted=state.correct+state.wrong;
  var pct=attempted>0?Math.round(state.correct/attempted*100):0;
  var grade='';
  if(pct>=90)grade='Excellent work!';
  else if(pct>=80)grade='Great job!';
  else if(pct>=70)grade='Good effort';
  else if(pct>=60)grade='Almost there';
  else grade='Keep studying - you\'ve got this!';

  var modeIcon='📗', modeColor='var(--l1)', modeTitle='';
  if(state.level==='ALL'){modeIcon='📚';modeColor='var(--lpink)';modeTitle='Chapter Review Complete!';}
  else if(state.level==='UNIT'){
    modeIcon='📄';modeColor='var(--amber)';
    var uname=CHAPTER_UNITS[state.chIdx][state.unitIdx].name;
    modeTitle=uname+' Complete!';
  } else {
    var m=LEVEL_META[state.level];
    modeIcon=m.icon;modeColor=m.bar;modeTitle=m.name+' Complete!';
  }

  var nextLvl=state.level==='L1'?'L2':state.level==='L2'?'L3':null;

  var skippedHtml='';
  if(state.skipped.length){
    skippedHtml='<div class="skip-log"><div class="skip-log-head">⚠ Skipped ('+state.skipped.length+')</div>'
      +state.skipped.map(function(s){return '<div class="skip-row"><strong>Q'+s.num+'</strong>'+s.q+'</div>';}).join('')+'</div>';
  }

  var retryBtn='';
  if(state.level==='ALL') retryBtn='<button class="btn-outline" onclick="startChapterReview()">↺ Retry</button>';
  else if(state.level==='UNIT') retryBtn='<button class="btn-outline" onclick="startUnitReview('+state.unitIdx+')">↺ Retry</button>';
  else retryBtn='<button class="btn-outline" onclick="startLevel(\''+state.level+'\')">↺ Retry</button>';

  // Build save entry
  var entry = {pct:pct, correct:state.correct, attempted:attempted, skipped:state.skipped.length, date:new Date().toLocaleDateString()};

  var entryJson = JSON.stringify(entry).replace(/"/g,'&quot;');

  setBox('<div class="pop done">'
    +'<div class="done-ring" style="border-color:'+modeColor+'">'+modeIcon+'</div>'
    +'<div class="done-title" style="color:'+modeColor+'">'+modeTitle+'</div>'
    +'<div class="done-sub">'+grade+' You scored <strong>'+pct+'%</strong> on attempted questions.</div>'
    +'<div class="done-grid">'
    +'<div class="done-stat"><div class="done-n" style="color:var(--green)">'+state.correct+'</div><div class="done-l">Correct</div></div>'
    +'<div class="done-stat"><div class="done-n" style="color:var(--red)">'+state.wrong+'</div><div class="done-l">Incorrect</div></div>'
    +'<div class="done-stat"><div class="done-n" style="color:var(--amber)">'+state.skipped.length+'</div><div class="done-l">Skipped</div></div>'
    +'<div class="done-stat"><div class="done-n" style="color:'+modeColor+'">'+pct+'%</div><div class="done-l">Score</div></div>'
    +'</div>'
    +'<div class="save-bar" id="saveBar">'
    +'<button class="save-btn" onclick="doSaveProgress(\''+entryJson+'\')">💾 Save this result</button>'
    +'<div class="save-hint">Saved results appear in your progress log</div>'
    +'</div>'
    +skippedHtml
    +'<div class="done-btns">'
    +retryBtn
    +(nextLvl?'<button class="btn-fill" onclick="startLevel(\''+nextLvl+'\')">'+LEVEL_META[nextLvl].name+' →</button>':'')
    +'<button class="btn-outline" onclick="goLevels()">All Modes</button>'
    +'<button class="btn-outline" onclick="renderProgress()">My Progress</button>'
    +'</div>'
    +'</div>');
}

function doSaveProgress(entryStr){
  var entry = typeof entryStr === 'string' ? JSON.parse(entryStr.replace(/&quot;/g,'"')) : entryStr;
  var ok = saveProgress(entry);
  var bar = document.getElementById('saveBar');
  if(bar){
    bar.innerHTML = ok
      ? '<div class="save-confirm">✓ Result saved to your progress log</div>'
      : '<div class="save-confirm" style="color:var(--red)">Could not save — storage may be disabled</div>';
  }
}

function renderProgress(){
  hideSubBar(); showTopStats(false);
  setBreadcrumb(['My Progress']);
  window.scrollTo(0,0);
  if(true) pushRoute(BASE+'/progress');
  var rows = getProgressSummary();
  var app = document.getElementById('app');
  var body='';
  if(!rows.length){
    body='<div class="prog-empty">No saved results yet. Complete a session and click "Save this result" to track your progress.</div>';
  } else {
    body='<div class="prog-table">'
      +'<div class="prog-row prog-header">'
      +'<div class="prog-cell">Chapter</div>'
      +'<div class="prog-cell">Mode</div>'
      +'<div class="prog-cell">Score</div>'
      +'<div class="prog-cell">Date</div>'
      +'</div>'
      +rows.map(function(r){
        var col = r.pct>=80?'var(--green)':r.pct>=60?'var(--amber)':'var(--red)';
        return '<div class="prog-row">'
          +'<div class="prog-cell"><span class="prog-ch">Ch'+r.ch+'</span> '+r.chName+'</div>'
          +'<div class="prog-cell">'+r.mode+'</div>'
          +'<div class="prog-cell"><span style="font-weight:700;color:'+col+'">'+r.pct+'%</span> <span style="color:var(--text3);font-size:12px">('+r.correct+'/'+r.total+')</span></div>'
          +'<div class="prog-cell" style="color:var(--text3)">'+r.date+'</div>'
          +'</div>';
      }).join('')
      +'</div>'
      +'<button class="btn-outline" onclick="clearProgress();renderProgress()" style="margin-top:16px;color:var(--red);border-color:var(--red)">Clear all progress</button>';
  }
  app.innerHTML='<div class="wrap"><div class="inner pop">'
    +'<div class="chapter-list-header">'
    +'<div class="chapter-list-title">My Progress</div>'
    +'<div class="chapter-list-sub">Your saved session results</div>'
    +'</div>'
    +body
    +'<button class="back-nav" onclick="renderChapterList()">← Back to chapters</button>'
    +'</div></div>';
}
