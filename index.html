      {type:'mcq',q:"What is the FIRST step of journalizing a transaction?",opts:["Write the account credited","Record the explanation","Record the date of the transaction","Write the account debited"],ans:2,exp:"Step 1 of journalizing: record the DATE of the transaction in the date column. This ensures transactions are in chronological order."},
      {type:'mcq',q:"What is the SECOND step of journalizing a transaction?",opts:["Write the explanation","Record the account(s) credited and amount","Write the date","Record the account(s) debited and the debit amount"],ans:3,exp:"Step 2: Record the account(s) DEBITED and the debit amount on the first line. The debit account is written at the left margin."},
      {type:'mcq',q:"What is the THIRD step of journalizing a transaction?",opts:["Record the date","Write the account(s) credited (indented) and the credit amount","Write the posting reference","Prepare the trial balance"],ans:1,exp:"Step 3: Record the account(s) CREDITED and the credit amount. The credit account is INDENTED to visually distinguish it from the debit."},
      {type:'mcq',q:"What is the FOURTH (final) step of journalizing a transaction?",opts:["Record the date","Post to the ledger","Write the explanation (including cheque or invoice number)","Calculate the balance"],ans:2,exp:"Step 4: Write the EXPLANATION - a brief description of the transaction including the cheque number or invoice number for reference and audit purposes."},
      {type:'mcq',q:"Which part of a journal entry comes LAST?",opts:["The debit account","The date","The credit account","The explanation"],ans:3,exp:"The EXPLANATION is the last part written in a journal entry. It comes after the date, debit account, and credit account, and includes the cheque or invoice number."},
      {type:'sa',q:"What is the difference between a journal and a ledger? Why do we need both?",model:"Journal: records transactions in CHRONOLOGICAL order (by date) - the 'book of original entry.' Shows what happened and when.\nLedger: organizes transactions by ACCOUNT - shows the running balance of each individual account (Cash, A/P, Equipment, etc.).\n\nWe need both: the journal is the complete record of each transaction, while the ledger shows the balance of each account at any time. Together they allow verification through posting references."},
      {type:'sa',q:"List the four parts of a journal entry and explain why the credit account is indented.",model:"Four parts of a journal entry:\n1. Date of the transaction\n2. Account(s) debited + amount\n3. Account(s) credited + amount (indented)\n4. Explanation (includes cheque or invoice number)\n\nThe credit account is indented to visually distinguish it from the debit - making it easy to see which account is being debited and which is being credited at a glance."},
    ],
    L2:[
      {type:'mcq',q:"TRUE or FALSE: Posting means transferring journal entries to the ledger accounts.",opts:["True","False"],ans:0,exp:"True. Posting copies each debit and credit from the journal into the matching T-account."},
      {type:'mcq',q:"TRUE or FALSE: Posting references are optional and serve no real purpose.",opts:["True","False"],ans:1,exp:"False. PRs cross-reference journal and ledger, confirm posting is done, and prevent double-posting."},
      {type:'mcq',q:"TRUE or FALSE: After posting, the journal's PR column should be blank.",opts:["True","False"],ans:1,exp:"False. After posting, the PR column should contain the ACCOUNT NUMBER - a blank means it has not been posted."},
      {type:'mcq',q:"TRUE or FALSE: A transposition error involves swapping two digits (e.g., 54 instead of 45).",opts:["True","False"],ans:0,exp:"True. Transposition errors reverse two digits and are always divisible by 9."},
      {type:'mcq',q:"TRUE or FALSE: Opening entries are made at the end of the accounting period.",opts:["True","False"],ans:1,exp:"False. Opening entries are made at the START of a new period to enter the opening balances."},
      {type:'mcq',q:"TRUE or FALSE: The last step of posting is writing the account number in the journal's PR column.",opts:["True","False"],ans:0,exp:"True. Step 6 confirms posting is complete - preventing the entry from being posted again."},
      {type:'mcq',q:"Which is NOT one of the six posting steps?",opts:["Locate the account","Record the date","Prepare the adjusting entry","Calculate the new balance"],ans:2,exp:"Preparing adjusting entries is a separate end-of-period task - not one of the six posting steps."},
      {type:'mcq',q:"The six steps of posting, in order, are:",opts:["Date → debit/credit → balance → PR journal → PR ledger → explanation","Locate account → date → debit/credit amount → new balance → ledger PR (journal page) → journal PR (account number)","Account number → date → balance → explanation → journal page → ledger","Date → account → post → verify → balance → PR"],ans:1,exp:"6 steps: (1) Locate the ledger account, (2) Record the date, (3) Enter debit/credit amount, (4) Calculate new balance (DR. or CR.), (5) Write journal page number in ledger PR, (6) Write account number in journal PR."},
      {type:'mcq',q:"What is written in the journal's posting reference (PR) column after posting?",opts:["The date of the transaction","The balance of the account","The ledger account number","The journal page number"],ans:2,exp:"After posting, the ACCOUNT NUMBER is written in the journal PR column - confirming that entry has been posted to the correct ledger account."},
      {type:'mcq',q:"What is written in the ledger's posting reference (PR) column?",opts:["The account balance","The journal page number (J#) from which the entry was posted","The account number","The date of the next transaction"],ans:1,exp:"The JOURNAL PAGE NUMBER (J1, J2, etc.) is written in the ledger PR column - showing exactly where in the journal this entry came from."},
      {type:'mcq',q:"Why are posting references important?",opts:["They make the ledger look organized","They cross-reference journal and ledger, prevent double-posting, and help locate transactions quickly - especially during audits","They are required by the government","They replace the explanation in the journal"],ans:1,exp:"Posting references (PRs): cross-reference journal and ledger, prevent double-posting, help locate any transaction quickly, and are essential during audits."},
      {type:'mcq',q:"What is the forwarding procedure?",opts:["Moving old journals to storage","When a ledger account page is full - balances are carried to a new page with 'Forwarded' written in particulars","Creating a new journal entry","Preparing a new trial balance"],ans:1,exp:"Forwarding: when a ledger page is full, write 'Forwarded' on the old page, then open a new page for the same account with the previous balance carried forward."},
      {type:'mcq',q:"A trial balance shows $2,500 total debits and $2,230 total credits. The difference of $270 suggests:",opts:["An addition error","A transposition error - $270 is divisible by 9","A missing account","A posting to the wrong side"],ans:1,exp:"$270 ÷ 9 = 30 - exactly divisible by 9. This is the key indicator of a TRANSPOSITION error (digits were reversed somewhere in the records)."},
      {type:'mcq',q:"A $600 debit balance is accidentally placed in the credit column of the trial balance. The trial balance difference will be:",opts:["$600","$1,200","$300","$0 - still balances"],ans:1,exp:"If $600 is on the wrong side, debits are short $600 AND credits are over $600. Total difference = $600 + $600 = $1,200. Divide by 2 to find the misplaced amount."},
      {type:'mcq',q:"The difference between debit and credit totals on a trial balance is $100. This likely indicates:",opts:["A transposition error","An addition or subtraction arithmetic error","A missing account","A wrong account used"],ans:1,exp:"A difference of $100 (or $1, $10, $1,000 - powers of 10) suggests an ARITHMETIC error in adding up a column, not a transposition."},
      {type:'mcq',q:"How do you correct an error in a journal entry without erasing?",opts:["Use correction fluid","Cross out the entire page","Draw a single line through the incorrect amount and write the correct amount above","Rewrite the journal from the beginning"],ans:2,exp:"Never erase - draw a SINGLE LINE through the incorrect amount and write the correct amount above it. This preserves the original record and shows the correction."},
      {type:'mcq',q:"When an entire journal entry is incorrect, what is the proper correction method?",opts:["Erase and redo","Write 'VOID' and skip to next entry","Record a correcting entry: cancel the incorrect entry, then re-enter the correct one","Change the amounts in the ledger only"],ans:2,exp:"For an incorrect journal entry: (1) Record a cancelling entry (note it's a correction in the explanation), (2) Re-enter the correct entry. Never just alter the original."},
      {type:'mcq',q:"In the balance-column ledger, if debits exceed credits, the balance is shown as:",opts:["CR. (credit)","DR. (debit)","Zero","Negative"],ans:1,exp:"If debits > credits → DR. balance. If credits > debits → CR. balance. The balance column shows the running net balance after each entry."},
      {type:'mcq',q:"What does an audit involve?",opts:["Preparing the annual budget","A systematic check of accounting records to ensure accuracy of journalizing and posting","A review of employee performance","A comparison of budgets to actual spending"],ans:1,exp:"An audit = a systematic examination of accounting records to verify that journalizing and posting have been done accurately and completely."},
      {type:'mcq',q:"In an opening entry, assets are recorded as:",opts:["Credits - they increase the business","Debits - assets increase on the debit side","Either debit or credit","Not recorded in the opening entry"],ans:1,exp:"Opening entry: DEBIT all assets (they are increasing), CREDIT all liabilities and Owner's Equity. Follows A = L + OE."},
      {type:'mcq',q:"A Bank Credit Memo means:",opts:["The bank charged your account a fee","The bank increased your account (e.g., interest earned)","A cheque was bounced","A payment was sent to a supplier"],ans:1,exp:"Bank Credit Memo = the bank INCREASED your account. Example: interest earned on your account. Bank Debit Memo = bank decreased your account (e.g., service fee)."},
      {type:'mcq',q:"What is a restrictive endorsement on a cheque?",opts:["A signature proving the cheque is valid","Instructions written on the back of a cheque limiting how it can be used (e.g., 'For deposit only')","A number printed on the front of the cheque","The bank's stamp on a deposited cheque"],ans:1,exp:"Restrictive endorsement = instructions on the back of a cheque that limit its use. Example: 'For deposit only to account #12345' prevents the cheque being cashed by someone else."},
      {type:'match',pairs:[
        {term:"Ledger PR column",def:"Contains the journal page number - shows where the entry came from."},
        {term:"Journal PR column",def:"Contains the account number - confirms the entry was posted."},
        {term:"Forwarding procedure",def:"Carrying forward a balance when a ledger page is full."},
        {term:"Opening entry",def:"Assets debited; liabilities and owner's equity credited - first entry for a new business."},
        {term:"Audit",def:"A systematic check of accounting records for accuracy."},
        {term:"Transposition error",def:"Digits reversed - difference divisible by 9 is the clue."},
        {term:"Balance-column ledger",def:"Three columns (debit, credit, balance) with running balance after each entry."},
        {term:"Bank Credit Memo",def:"Bank notice that your account balance increased (e.g., interest earned)."},
        {term:"Bank Debit Memo",def:"Bank notice that your account balance decreased (e.g., service fee)."},
        {term:"Restrictive endorsement",def:"Instructions on back of cheque limiting how it can be used."},
        {term:"Correcting errors",def:"Draw a line through incorrect amount; write correct amount above - never erase."},
        {term:"Compound entry",def:"Journal entry with more than two accounts."},
      ]},
      {type:'mcq',q:"What is the FIRST step of posting a journal entry to the ledger?",opts:["Record the date in the ledger account","Write the journal page number in the ledger PR column","Locate the account in the ledger","Calculate the new balance"],ans:2,exp:"Step 1 of posting: LOCATE the correct account in the ledger. You need to find the right T-account before you can post anything to it."},
      {type:'mcq',q:"What is the SECOND step of posting?",opts:["Calculate the new balance","Record the date of the transaction in the ledger account","Write the account number in the journal","Locate the account"],ans:1,exp:"Step 2: Record the DATE of the transaction in the ledger account. This keeps the ledger entries in chronological order."},
      {type:'mcq',q:"What is the THIRD step of posting?",opts:["Complete the journal posting reference","Calculate the new balance","Enter the debit or credit amount in the ledger account","Locate the account"],ans:2,exp:"Step 3: Enter the DEBIT or CREDIT AMOUNT from the journal into the appropriate column of the ledger account."},
      {type:'mcq',q:"What is the FOURTH step of posting?",opts:["Write the journal page number in the ledger","Locate the account","Calculate the new balance and indicate DR. or CR.","Enter the amount"],ans:2,exp:"Step 4: Calculate the NEW BALANCE and indicate whether it is a debit (DR.) or credit (CR.) balance. This keeps the running balance up to date."},
      {type:'mcq',q:"What is the FIFTH step of posting?",opts:["Locate the account","Complete the ledger Posting Reference column by writing the journal page number (J#)","Record the date","Calculate the balance"],ans:1,exp:"Step 5: Complete the LEDGER posting reference (PR) column by writing the journal page number (e.g., J1). This cross-references back to where the entry came from."},
      {type:'mcq',q:"What is the SIXTH and FINAL step of posting?",opts:["Calculate the balance","Write the date in the ledger","Complete the journal Posting Reference column by writing the account number","Locate the next account"],ans:2,exp:"Step 6: Complete the JOURNAL posting reference (PR) column by writing the account number. This confirms the entry has been fully posted and prevents double-posting."},
      {type:'mcq',q:"What is the LAST step of posting and why is it important?",opts:["Calculating the balance - to know how much is in the account","Writing the journal page number in the ledger - to trace entries","Writing the account number in the journal PR column - to confirm posting is complete and prevent double-posting","Recording the date - to keep things chronological"],ans:2,exp:"The last step is writing the ACCOUNT NUMBER in the journal PR column. This is important because it signals that the entry has been fully posted - preventing it from being accidentally posted again."},
      {type:'sa',q:"Explain the six steps of posting. Why are posting references (PRs) important?",model:"Six steps of posting:\n1. Locate the account in the ledger\n2. Record the date\n3. Enter the debit or credit amount\n4. Calculate the new balance (write DR. or CR.)\n5. Write the journal page number in the ledger PR column\n6. Write the account number in the journal PR column\n\nPRs are important because they cross-reference the journal and ledger - you can trace any entry back to its source. They prevent double-posting and are essential during audits."},
      {type:'sa',q:"A trial balance doesn't balance. The difference is $810. What type of error likely occurred? How would you find it?",model:"$810 ÷ 9 = 90 - divisible by 9, so this is likely a TRANSPOSITION error (digits reversed).\n\nHow to find it:\n1. Recheck the trial balance addition first\n2. Look for any amount where the digits could be reversed to create an $810 difference (e.g., $910 recorded as $190 → difference = $720... keep checking)\n3. Trace back through the ledger and journal for any transposed numbers\n4. Compare ledger balances to journal entries line by line"},
